<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ待ち受けイラストカレンダーメーカー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Shippori+Mincho&family=Yomogi&family=Potta+One&family=Mochiy+Pop+P+One&family=Kiwi+Maru&family=Zen+Maru+Gothic&family=Hachi+Maru+Pop&family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
    <style>
        .font-gothic { font-family: 'Kosugi Maru', sans-serif; }
        .font-mincho { font-family: 'Shippori Mincho', serif; }
        .font-yomogi { font-family: 'Yomogi', cursive; }
        .font-potta { font-family: 'Potta One', cursive; }
        .font-mochiy { font-family: 'Mochiy Pop P One', sans-serif; }
        .font-kiwi { font-family: 'Kiwi Maru', serif; }
        .font-zenmaru { font-family: 'Zen Maru Gothic', sans-serif; }
        .font-hachimaru { font-family: 'Hachi Maru Pop', cursive; }
        .font-mplus { font-family: 'M PLUS Rounded 1c', sans-serif; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; font-size: 36px; }
        #captureArea { display: flex; flex-direction: column; overflow: hidden; position: relative; cursor: default; transform-origin: top left; }
        #imageContainer, #bgContainer { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
        #previewImage, #bgImage { position: absolute; cursor: move; touch-action: none; max-width: none; left: 0; top: 0; pointer-events: auto; }
        #calendarContainer { backdrop-filter: blur(10px); z-index: 20; pointer-events: auto; }
    </style>
</head>
<body class="bg-slate-50 p-4 lg:p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-slate-800 text-center lg:text-left">✨ カレンダーメーカー</h1>
        
        <div class="flex flex-col lg:flex-row gap-6 lg:gap-8 items-start">
            <!-- 左側：操作メニュー -->
            <div class="w-full lg:w-[450px] flex-shrink-0 bg-white p-6 rounded-3xl shadow-xl">
                <div class="space-y-4 text-sm">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 font-semibold text-slate-600">メインイラスト</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full text-xs">
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-slate-600">背景画像</label>
                    <input type="file" id="bgImageInput" accept="image/*" class="w-full text-xs">
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block mb-1 font-semibold text-slate-600">年月</label>
                    <div class="flex gap-1">
                        <select id="yearSelect" class="p-1 border rounded"></select>
                        <select id="monthSelect" class="p-1 border rounded"></select>
                    </div>
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-slate-600">背景色</label>
                    <input type="color" id="bgColorInput" value="#ffffff" class="w-full h-8 p-1 rounded border">
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-slate-600">フォント</label>
                    <div class="flex flex-col gap-1">
                        <select id="fontSelect" class="w-full p-1 border rounded">
                            <option value="font-gothic">丸ゴシック</option>
                            <option value="font-mincho">明朝体</option>
                            <option value="font-yomogi">よもぎフォント (手書き風)</option>
                            <option value="font-potta">ぽったワン (ポップ)</option>
                            <option value="font-mochiy">モッチーポップ (極太)</option>
                            <option value="font-kiwi">キウイ丸 (丸み明朝)</option>
                            <option value="font-zenmaru">Zen丸ゴシック</option>
                            <option value="font-hachimaru">八丸ポップ (レトロ)</option>
                            <option value="font-mplus">M PLUS Rounded</option>
                        </select>
                        <label class="flex items-center text-xs text-slate-600 cursor-pointer">
                            <input type="checkbox" id="boldCheck" class="mr-1">
                            太字にする
                        </label>
                    </div>
                </div>
            </div>
            <div>
                <label class="block mb-1 font-semibold text-slate-600">端末 / レイアウト</label>
                <div class="grid grid-cols-1 gap-2">
                    <select id="layoutSelect" class="p-2 border rounded-lg w-full">
                        <optgroup label="スマホ用 (縦長 9:19.5)">
                            <option value="mobile-img-top">上：イラスト、下：カレンダー</option>
                            <option value="mobile-cal-top">上：カレンダー、下：イラスト</option>
                            <option value="mobile-bg">画像を背景（カレンダーを重ねる）</option>
                        </optgroup>
                        <optgroup label="パソコン用 (横長 16:9)">
                            <option value="pc-img-left">左：イラスト、右：カレンダー</option>
                            <option value="pc-cal-left">左：カレンダー、右：イラスト</option>
                            <option value="pc-bg">画像を背景（カレンダーを重ねる）</option>
                        </optgroup>
                        <optgroup label="タブレット用 (横長 4:3)">
                            <option value="tablet-img-left">左：イラスト、右：カレンダー</option>
                            <option value="tablet-cal-left">左：カレンダー、右：イラスト</option>
                            <option value="tablet-bg">画像を背景（カレンダーを重ねる）</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-slate-100 grid grid-cols-3 gap-2">
                <div>
                    <label class="block mb-1 font-semibold text-slate-600 text-xs">メイン画像サイズ</label>
                    <input type="range" id="imageSize" min="10" max="300" value="100" class="w-full">
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-slate-600 text-xs">背景サイズ</label>
                    <input type="range" id="bgSize" min="10" max="300" value="100" class="w-full">
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-slate-600 text-xs">カレンダー背景</label>
                    <input type="range" id="calOpacity" min="0" max="100" value="80" class="w-full">
                </div>
            </div>
            
            <div class="mt-2 grid grid-cols-4 gap-2">
                <div>
                    <label class="block mb-1 font-semibold text-slate-600 text-[10px]">メイン位置 X</label>
                    <input type="range" id="imageX" min="-100" max="100" value="0" class="w-full">
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-slate-600 text-[10px]">メイン位置 Y</label>
                    <input type="range" id="imageY" min="-100" max="100" value="0" class="w-full">
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-slate-600 text-[10px]">背景位置 X</label>
                    <input type="range" id="bgX" min="-100" max="100" value="0" class="w-full">
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-slate-600 text-[10px]">背景位置 Y</label>
                    <input type="range" id="bgY" min="-100" max="100" value="0" class="w-full">
                </div>
            </div>
        </div>
                <button id="downloadBtn" class="mt-8 w-full bg-slate-900 text-white py-3 rounded-2xl font-bold hover:bg-slate-800 transition">画像として保存</button>
            </div>
            
            <!-- 右側：プレビュー領域 -->
            <div class="w-full flex-grow bg-white p-6 rounded-3xl shadow-xl flex justify-center items-center overflow-hidden min-h-[400px] lg:min-h-[800px] lg:sticky lg:top-8">
                <div class="flex justify-center w-full overflow-hidden" id="previewWrapper">
                    <div id="captureArea" class="shadow-inner" style="background-color: #ffffff;">
                        <div id="bgContainer" style="z-index: 1;"><img id="bgImage" src="" style="display:none"></div>
                        
                        <div id="layoutContainer" class="flex h-full z-20 relative pointer-events-none">
                            <div id="imageWrapper" class="flex-grow relative overflow-hidden pointer-events-none z-10">
                                <img id="previewImage" src="" style="display:none; pointer-events: auto;">
                            </div>
                            <div id="calendarWrapper" class="p-8 flex-shrink-0 flex items-center justify-center pointer-events-none z-20">
                                <div id="calendarContainer" class="pointer-events-auto shadow-xl flex-shrink-0 w-full" style="padding: 40px; border-radius: 32px; min-width: 500px; max-width: 600px;">
                                    <h2 id="monthTitle" class="font-bold text-slate-800 text-center" style="font-size: 48px; margin-bottom: 24px;">YYYY年M月</h2>
                                    <div class="calendar-grid text-center font-bold mb-4" style="font-size: 32px;">
                                        <div class="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-500">土</div>
                                    </div>
                                    <div id="calendarDays" class="calendar-grid text-center text-slate-700"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button id="downloadBtn" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold hover:bg-slate-800 transition">画像として保存</button>
    </div>

    <script>
        const previewImage = document.getElementById('previewImage'), bgImage = document.getElementById('bgImage');
        const captureArea = document.getElementById('captureArea'), layoutContainer = document.getElementById('layoutContainer');
        const layoutSelect = document.getElementById('layoutSelect');

        function setupDrag(el) {
            let active = false, startMouse = { x: 0, y: 0 }, startPos = { x: 0, y: 0 };
            const getPx = (val, max) => val.toString().endsWith('%') ? (parseFloat(val) / 100) * max : parseFloat(val) || 0;
            
            el.addEventListener('pointerdown', (e) => { 
                active = true; 
                startMouse = { x: e.clientX, y: e.clientY };
                startPos = { 
                    x: getPx(el.style.left, el.parentElement.offsetWidth), 
                    y: getPx(el.style.top, el.parentElement.offsetHeight) 
                };
                el.setPointerCapture(e.pointerId);
            });
            el.addEventListener('pointermove', (e) => {
                if (active) {
                    const scale = captureArea.getBoundingClientRect().width / captureArea.offsetWidth || 1;
                    const newX = startPos.x + (e.clientX - startMouse.x) / scale;
                    const newY = startPos.y + (e.clientY - startMouse.y) / scale;
                    
                    const pxX = (newX / el.parentElement.offsetWidth) * 100;
                    const pxY = (newY / el.parentElement.offsetHeight) * 100;
                    
                    el.style.left = pxX + '%';
                    el.style.top = pxY + '%';
                    
                    if(el.id === 'previewImage') {
                        document.getElementById('imageX').value = pxX;
                        document.getElementById('imageY').value = pxY;
                    } else {
                        document.getElementById('bgX').value = pxX;
                        document.getElementById('bgY').value = pxY;
                    }
                }
            });
            el.addEventListener('pointerup', () => active = false);
            el.addEventListener('pointercancel', () => active = false);
        }
        setupDrag(previewImage); setupDrag(bgImage);

        document.getElementById('imageInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { previewImage.src = ev.target.result; previewImage.style.display = 'block'; };
            reader.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('bgImageInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { bgImage.src = ev.target.result; bgImage.style.display = 'block'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        function updateLayout() {
            const selection = document.getElementById('layoutSelect').value;
            let targetWidth, targetHeight, layoutClass = 'flex-col';

            if (selection.startsWith('mobile')) {
                targetWidth = 720; targetHeight = 1560;
                if (selection === 'mobile-img-top') layoutClass = 'flex-col';
                else if (selection === 'mobile-cal-top') layoutClass = 'flex-col-reverse';
                else if (selection === 'mobile-bg') layoutClass = 'flex-col justify-center items-center';
            } else if (selection.startsWith('pc')) {
                targetWidth = 1280; targetHeight = 720;
                if (selection === 'pc-img-left') layoutClass = 'flex-row';
                else if (selection === 'pc-cal-left') layoutClass = 'flex-row-reverse';
                else if (selection === 'pc-bg') layoutClass = 'flex-row justify-center items-center';
            } else if (selection.startsWith('tablet')) {
                targetWidth = 1024; targetHeight = 768;
                if (selection === 'tablet-img-left') layoutClass = 'flex-row';
                else if (selection === 'tablet-cal-left') layoutClass = 'flex-row-reverse';
                else if (selection === 'tablet-bg') layoutClass = 'flex-row justify-center items-center';
            }

            captureArea.style.width = targetWidth + 'px';
            captureArea.style.height = targetHeight + 'px';
            captureArea.style.aspectRatio = 'unset';

            const wrapperWidth = captureArea.parentElement.clientWidth;
            const scale = wrapperWidth / targetWidth;
            captureArea.style.transform = `scale(${scale})`;
            captureArea.parentElement.style.height = (targetHeight * scale) + 'px';
            
            const imgWrap = document.getElementById('imageWrapper');
            if (selection.endsWith('-bg')) {
                layoutContainer.className = 'flex h-full z-20 relative pointer-events-none justify-center items-center';
                imgWrap.className = 'absolute w-full h-full overflow-hidden pointer-events-none z-10';
            } else {
                layoutContainer.className = `flex h-full z-20 relative pointer-events-none ${layoutClass}`;
                imgWrap.className = 'flex-grow relative overflow-hidden pointer-events-none z-10';
            }
            
            const font = document.getElementById('fontSelect').value;
            const isBold = document.getElementById('boldCheck').checked;
            const calendarContainer = document.getElementById('calendarContainer');
            calendarContainer.className = `pointer-events-auto shadow-xl flex-shrink-0 ${font} ${isBold ? 'font-bold' : ''}`;
            updateSizesAndOpacity();
            
            captureArea.style.backgroundColor = document.getElementById('bgColorInput').value;
        }
        
        window.addEventListener('resize', updateLayout);

        [layoutSelect, document.getElementById('fontSelect'), document.getElementById('boldCheck'), document.getElementById('bgColorInput')].forEach(el => el.addEventListener('input', updateLayout));
        [layoutSelect, document.getElementById('fontSelect'), document.getElementById('boldCheck'), document.getElementById('bgColorInput')].forEach(el => el.addEventListener('change', updateLayout));

        function updateSizesAndOpacity() {
            previewImage.style.width = document.getElementById('imageSize').value + '%';
            bgImage.style.width = document.getElementById('bgSize').value + '%';
            
            previewImage.style.left = document.getElementById('imageX').value + '%';
            previewImage.style.top = document.getElementById('imageY').value + '%';
            
            bgImage.style.left = document.getElementById('bgX').value + '%';
            bgImage.style.top = document.getElementById('bgY').value + '%';
            
            const opacity = document.getElementById('calOpacity').value / 100;
            document.getElementById('calendarContainer').style.backgroundColor = `rgba(255, 255, 255, ${opacity})`;
        }
        
        ['imageSize', 'bgSize', 'calOpacity', 'imageX', 'imageY', 'bgX', 'bgY'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', updateSizesAndOpacity);
            el.addEventListener('change', updateSizesAndOpacity);
        });

        function updateCalendar() {
            const year = parseInt(document.getElementById('yearSelect').value), month = parseInt(document.getElementById('monthSelect').value);
            document.getElementById('monthTitle').textContent = `${year}年 ${month + 1}月`;
            const first = new Date(year, month, 1).getDay(), days = new Date(year, month + 1, 0).getDate();
            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';
            for(let i=0; i<first; i++) calendarDays.appendChild(document.createElement('div'));
            for(let i=1; i<=days; i++) {
                const d = document.createElement('div');
                d.textContent = i;
                const dw = (first + i - 1) % 7;
                if(dw === 0) d.classList.add('text-red-500');
                if(dw === 6) d.classList.add('text-blue-500');
                calendarDays.appendChild(d);
            }
        }

        document.getElementById('downloadBtn').onclick = async () => {
            const btn = document.getElementById('downloadBtn');
            const prevText = btn.textContent;
            btn.textContent = '保存中...';
            
            const prevBorder = captureArea.style.border;
            captureArea.style.border = 'none';
            
            try {
                const canvas = await html2canvas(captureArea, {useCORS: true, scale: 2});
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    
                    let resultImg = document.getElementById('resultImageNode');
                    if (!resultImg) {
                        resultImg = document.createElement('img');
                        resultImg.id = 'resultImageNode';
                        resultImg.className = 'mt-6 w-full rounded-3xl shadow-lg border-2 border-slate-200';
                        document.getElementById('captureArea').parentNode.parentNode.appendChild(resultImg);
                    }
                    resultImg.src = url;
                    
                    const a = document.createElement('a');
                    a.download = 'calendar.png';
                    a.href = url;
                    a.click();
                    
                    btn.textContent = '保存できない場合は下の画像を長押し保存';
                }, 'image/png');
            } catch (err) {
                console.error(err);
                btn.textContent = prevText;
            } finally {
                captureArea.style.border = prevBorder;
            }
        };
        
        const now = new Date();
        [0, 1].forEach(i => {
            const y = now.getFullYear() + i;
            document.getElementById('yearSelect').innerHTML += `<option value="${y}">${y}年</option>`;
        });
        for(let i=1; i<=12; i++) {
            const m = i - 1;
            document.getElementById('monthSelect').innerHTML += `<option value="${m}" ${m === now.getMonth() ? 'selected' : ''}>${i}月</option>`;
        }
        
        [document.getElementById('yearSelect'), document.getElementById('monthSelect')].forEach(el => el.onchange = updateCalendar);
        updateCalendar();
        updateLayout();
    </script>
</body>
</html>

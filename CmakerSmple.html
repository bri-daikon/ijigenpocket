<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ待ち受けイラストカレンダーメーカー（サンプル）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        .font-gothic { font-family: 'Kosugi Maru', sans-serif; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; font-size: 36px; }
        #captureArea { display: flex; flex-direction: column; overflow: hidden; position: relative; cursor: default; transform-origin: top left; }
        #imageContainer { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
        #previewImage { position: absolute; cursor: move; touch-action: none; max-width: none; left: 0; top: 0; pointer-events: auto; user-select: none; -webkit-user-drag: none; }
        #calendarContainer { backdrop-filter: blur(10px); z-index: 20; pointer-events: auto; }
    </style>
</head>
<body class="bg-slate-50 p-4 lg:p-8 font-gothic">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-slate-800 text-center lg:text-left">✨ カレンダーメーカー（サンプル版）</h1>
        
        <div class="flex flex-col lg:flex-row gap-6 lg:gap-8 items-start">
            <!-- 左側：操作メニュー -->
            <div class="w-full lg:w-[450px] flex-shrink-0 bg-white p-6 rounded-3xl shadow-xl lg:sticky lg:top-8 lg:max-h-[calc(100vh-4rem)] overflow-y-auto custom-scrollbar">
                <div class="space-y-4 text-sm">
                    <div class="grid grid-cols-1 gap-4">
                        <div>
                            <label class="block mb-1 font-semibold text-slate-600">メインイラスト</label>
                            <input type="file" id="imageInput" accept="image/*" class="w-full text-xs">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block mb-1 font-semibold text-slate-600">年月（当月のみ）</label>
                            <div class="flex gap-1">
                                <select id="yearSelect" class="p-1 border rounded" disabled></select>
                                <select id="monthSelect" class="p-1 border rounded" disabled></select>
                            </div>
                        </div>
                        <div>
                            <label class="block mb-1 font-semibold text-slate-600">背景色</label>
                            <input type="color" id="bgColorInput" value="#ffffff" class="w-full h-8 p-1 rounded border">
                        </div>
                    </div>
                    <div>
                        <label class="block mb-1 font-semibold text-slate-600">端末 / レイアウト（スマホ専用）</label>
                        <div class="grid grid-cols-1 gap-2">
                            <select id="layoutSelect" class="p-2 border rounded-lg w-full">
                                <option value="mobile-img-top">上：イラスト、下：カレンダー</option>
                                <option value="mobile-cal-top">上：カレンダー、下：イラスト</option>
                                <option value="mobile-bg">画像を背景（カレンダーを重ねる）</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4 pt-4 border-t border-slate-100 grid grid-cols-1 gap-2">
                        <div>
                            <label class="block mb-1 font-semibold text-slate-600 text-[10px]">画像サイズ</label>
                            <input type="range" id="imageSize" min="10" max="300" value="100" class="w-full">
                        </div>
                    </div>
                    
                    <div class="mt-2 grid grid-cols-2 gap-2">
                        <div>
                            <label class="block mb-1 font-semibold text-slate-600 text-[10px]">メイン位置 X</label>
                            <input type="range" id="imageX" min="-100" max="100" value="0" class="w-full">
                        </div>
                        <div>
                            <label class="block mb-1 font-semibold text-slate-600 text-[10px]">メイン位置 Y</label>
                            <input type="range" id="imageY" min="-100" max="100" value="0" class="w-full">
                        </div>
                    </div>
                </div>
                <button id="downloadBtn" class="mt-8 w-full bg-slate-400 text-white py-3 rounded-2xl font-bold hover:bg-slate-500 transition">画像として保存（機能制限中）</button>
            </div>
            
            <!-- 右側：プレビュー領域 -->
            <div class="w-full flex-grow bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center min-h-[400px] lg:min-h-[800px]">
                <div class="w-full relative overflow-hidden" id="previewWrapper">
                    <div id="captureArea" style="background-color: #ffffff; position: absolute; left: 0; top: 0;">
                        <div id="layoutContainer" class="flex w-full h-full z-20 relative pointer-events-none flex-col justify-end items-center">
                            <div id="imageWrapper" class="absolute w-full h-full overflow-hidden pointer-events-none z-10 left-0 top-0">
                                <img id="previewImage" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" style="display:none; pointer-events: auto;" draggable="false">
                            </div>
                            <div id="calendarWrapper" class="relative p-8 flex-shrink-0 flex items-center justify-center pointer-events-none z-20">
                                <div id="calendarContainer" class="pointer-events-auto shadow-xl flex-shrink-0 w-full font-gothic" style="padding: 40px; border-radius: 32px; min-width: 500px; max-width: 600px; background-color: rgba(255, 255, 255, 0.8);">
                                    <h2 id="monthTitle" class="font-bold text-slate-800 text-center" style="font-size: 48px; margin-bottom: 24px;">YYYY年M月</h2>
                                    <div class="calendar-grid text-center font-bold mb-4" style="font-size: 32px;">
                                        <div class="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-500">土</div>
                                    </div>
                                    <div id="calendarDays" class="calendar-grid text-center text-slate-700"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const previewImage = document.getElementById('previewImage');
        const captureArea = document.getElementById('captureArea');
        const layoutContainer = document.getElementById('layoutContainer');
        const layoutSelect = document.getElementById('layoutSelect');

        function setupDrag(el) {
            let active = false, startMouse = { x: 0, y: 0 }, startPos = { x: 0, y: 0 };
            const getPx = (val, max) => val.toString().endsWith('%') ? (parseFloat(val) / 100) * max : parseFloat(val) || 0;
            
            el.addEventListener('pointerdown', (e) => { 
                active = true; 
                startMouse = { x: e.clientX, y: e.clientY };
                startPos = { 
                    x: getPx(el.style.left, el.parentElement.offsetWidth), 
                    y: getPx(el.style.top, el.parentElement.offsetHeight) 
                };
                el.setPointerCapture(e.pointerId);
            });
            el.addEventListener('pointermove', (e) => {
                if (active) {
                    const scale = captureArea.getBoundingClientRect().width / captureArea.offsetWidth || 1;
                    const newX = startPos.x + (e.clientX - startMouse.x) / scale;
                    const newY = startPos.y + (e.clientY - startMouse.y) / scale;
                    
                    const pxX = (newX / el.parentElement.offsetWidth) * 100;
                    const pxY = (newY / el.parentElement.offsetHeight) * 100;
                    
                    el.style.left = pxX + '%';
                    el.style.top = pxY + '%';
                    
                    document.getElementById('imageX').value = pxX;
                    document.getElementById('imageY').value = pxY;
                }
            });
            el.addEventListener('pointerup', () => active = false);
            el.addEventListener('pointercancel', () => active = false);
        }
        setupDrag(previewImage);

        document.getElementById('imageInput').onchange = (e) => {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = (ev) => { previewImage.src = ev.target.result; previewImage.style.display = 'block'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        function updateLayout() {
            const selection = document.getElementById('layoutSelect').value;
            let targetWidth = 720, targetHeight = 1560;
            let layoutClass = 'flex-col';
            let wrapperClass = 'relative p-8 flex-shrink-0 flex items-center justify-center pointer-events-none z-20';

            document.getElementById('calendarContainer').style.transformOrigin = 'center';
            if (selection === 'mobile-img-top') {
                layoutClass = 'flex-col justify-end items-center';
                wrapperClass += ' pb-64';
            }
            else if (selection === 'mobile-cal-top') {
                layoutClass = 'flex-col justify-start items-center';
                wrapperClass += ' pt-48';
            }
            else if (selection === 'mobile-bg') {
                layoutClass = 'flex-col justify-center items-center';
            }

            captureArea.style.width = targetWidth + 'px';
            captureArea.style.height = targetHeight + 'px';
            captureArea.style.aspectRatio = 'unset';

            const previewWrapper = document.getElementById('previewWrapper');
            const wrapperWidth = previewWrapper.clientWidth;
            const scale = wrapperWidth / targetWidth;
            captureArea.style.transform = `scale(${scale})`;
            previewWrapper.style.height = (targetHeight * scale) + 'px';
            
            const imgWrap = document.getElementById('imageWrapper');
            const calWrap = document.getElementById('calendarWrapper');
            layoutContainer.className = `flex w-full h-full z-20 relative pointer-events-none ${layoutClass}`;
            imgWrap.className = 'absolute w-full h-full overflow-hidden pointer-events-none z-10 left-0 top-0';
            calWrap.className = wrapperClass;
            
            updateSizesAndOpacity();
            captureArea.style.backgroundColor = document.getElementById('bgColorInput').value;
        }
        
        window.addEventListener('resize', updateLayout);
        [layoutSelect, document.getElementById('bgColorInput')].forEach(el => el.addEventListener('input', updateLayout));
        [layoutSelect, document.getElementById('bgColorInput')].forEach(el => el.addEventListener('change', updateLayout));

        function updateSizesAndOpacity() {
            previewImage.style.width = document.getElementById('imageSize').value + '%';
            previewImage.style.left = document.getElementById('imageX').value + '%';
            previewImage.style.top = document.getElementById('imageY').value + '%';
            document.getElementById('calendarContainer').style.transform = `scale(1)`; // 固定サイズ
        }
        
        ['imageSize', 'imageX', 'imageY'].forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('input', updateSizesAndOpacity);
                el.addEventListener('change', updateSizesAndOpacity);
            }
        });

        function updateCalendar() {
            const year = parseInt(document.getElementById('yearSelect').value), month = parseInt(document.getElementById('monthSelect').value);
            document.getElementById('monthTitle').textContent = `${year}年 ${month + 1}月`;
            const first = new Date(year, month, 1).getDay(), days = new Date(year, month + 1, 0).getDate();
            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';
            for(let i=0; i<first; i++) calendarDays.appendChild(document.createElement('div'));
            for(let i=1; i<=days; i++) {
                const d = document.createElement('div');
                d.textContent = i;
                const dw = (first + i - 1) % 7;
                if(dw === 0) d.classList.add('text-red-500');
                if(dw === 6) d.classList.add('text-blue-500');
                calendarDays.appendChild(d);
            }
        }

        document.getElementById('downloadBtn').onclick = () => {
            alert('こちらはサンプル版ツールのため、画像の保存機能は利用できません。');
        };
        
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth();
        
        document.getElementById('yearSelect').innerHTML = `<option value="${currentYear}">${currentYear}年</option>`;
        document.getElementById('monthSelect').innerHTML = `<option value="${currentMonth}">${currentMonth + 1}月</option>`;
        
        updateCalendar();
        updateLayout();
    </script>
</body>
</html>

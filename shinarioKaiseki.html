<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シナリオ一覧解析ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        [contenteditable]:focus {
            outline: 2px solid #3b82f6;
            background-color: #f8fafc;
            border-radius: 4px;
        }
        .img-preview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #e2e8f0;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-[1400px] mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">シナリオ一覧マネージャー</h1>
                <p class="text-slate-600">URLから情報を自動抽出します。※利用にはGemini APIキーが必要です。</p>
            </div>
            <!-- APIキー設定エリア -->
            <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 text-sm">
                <label class="block text-slate-500 mb-1 font-semibold">Gemini API Key</label>
                <div class="flex gap-2">
                    <input type="password" id="apiKeyInput" placeholder="キーを入力して保存" 
                        class="p-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 w-48">
                    <button id="saveKeyBtn" class="bg-slate-700 hover:bg-slate-800 text-white px-3 py-1 rounded transition-colors">
                        保存
                    </button>
                </div>
                <p id="keyStatus" class="text-[10px] mt-1 text-slate-400">キーはブラウザにのみ保存されます</p>
            </div>
        </header>

        <!-- 入力エリア -->
        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-slate-200">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="urlInput" placeholder="https://booth.pm/ja/items/..." 
                    class="flex-1 p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="analyzeBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-colors flex items-center justify-center min-w-[160px]">
                    解析して追加
                </button>
            </div>
            <div id="statusMessage" class="mt-4 hidden flex items-center gap-3 text-blue-600">
                <div class="loading-spinner"></div>
                <span id="statusText">指定されたURLから正確な情報を抽出中...</span>
            </div>
        </div>

        <!-- 一覧表 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-white font-semibold">
                        <tr>
                            <th class="p-4 border-b w-20 text-center">画像</th>
                            <th class="p-4 border-b w-32">システム</th>
                            <th class="p-4 border-b w-48">タイトル</th>
                            <th class="p-4 border-b min-w-[200px]">概要</th>
                            <th class="p-4 border-b w-20 text-center">人数</th>
                            <th class="p-4 border-b w-24 text-center">時間</th>
                            <th class="p-4 border-b min-w-[150px]">自由メモ</th>
                            <th class="p-4 border-b w-16 text-center">URL</th>
                            <th class="p-4 border-b w-16"></th>
                        </tr>
                    </thead>
                    <tbody id="scenarioList" class="divide-y divide-slate-200">
                        <tr id="emptyRow">
                            <td colspan="9" class="p-12 text-center text-slate-400 italic">まだデータがありません。URLを入力してください。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- メッセージボックス -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl max-w-md w-full shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold mb-2">通知</h3>
            <p id="modalContent" class="text-slate-600 mb-6 text-sm break-words"></p>
            <button onclick="document.getElementById('modalOverlay').classList.add('hidden')" 
                class="w-full bg-slate-800 text-white py-2 rounded-lg font-bold">閉じる</button>
        </div>
    </div>

    <script>
        let currentApiKey = "";
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const keyStatus = document.getElementById('keyStatus');

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                currentApiKey = savedKey;
                apiKeyInput.value = savedKey;
                keyStatus.innerText = "キーが保存されています";
                keyStatus.classList.add('text-green-600');
            }
        });

        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                currentApiKey = key;
                showMessage("設定保存", "APIキーを保存しました。");
                keyStatus.innerText = "キーが保存されています";
                keyStatus.classList.remove('text-slate-400');
                keyStatus.classList.add('text-green-600');
            } else {
                localStorage.removeItem('gemini_api_key');
                currentApiKey = "";
                showMessage("設定解除", "APIキーを削除しました。");
                keyStatus.innerText = "キーはブラウザにのみ保存されます";
                keyStatus.classList.remove('text-green-600');
                keyStatus.classList.add('text-slate-400');
            }
        });

        function showMessage(title, content) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalContent').innerText = content;
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        const analyzeBtn = document.getElementById('analyzeBtn');
        const urlInput = document.getElementById('urlInput');
        const scenarioList = document.getElementById('scenarioList');
        const statusMessage = document.getElementById('statusMessage');
        const emptyRow = document.getElementById('emptyRow');

        async function analyzeUrl(targetUrl) {
            if (!currentApiKey) {
                throw new Error("APIキーが設定されていません。右上の設定欄に入力してください。");
            }

            const systemPrompt = `You are a professional librarian specialized in TRPG scenarios. 
Access the provided URL using the search tool, read the description carefully, and extract information.
Ensure accuracy and format your response as JSON based on the schema.
Required fields: system, title, summary, players, playtime, imageUrl.`;

            const userQuery = `Search for this URL and extract scenario info: ${targetUrl}`;

            // 公開用APIで最も安定している gemini-1.5-flash を使用
            const modelName = "gemini-1.5-flash";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${currentApiKey}`;

            const responseSchema = {
                type: "OBJECT",
                properties: {
                    system: { type: "STRING" },
                    title: { type: "STRING" },
                    summary: { type: "STRING" },
                    players: { type: "STRING" },
                    playtime: { type: "STRING" },
                    imageUrl: { type: "STRING" }
                },
                required: ["system", "title", "summary", "players", "playtime", "imageUrl"]
            };

            let response;
            try {
                response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        tools: [{ "google_search": {} }],
                        generationConfig: { 
                            responseMimeType: "application/json",
                            responseSchema: responseSchema
                        }
                    })
                });
            } catch (e) {
                throw new Error("ネットワークエラーが発生しました。インターネット接続を確認してください。");
            }

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                const msg = errorData.error?.message || response.statusText || "不明なエラー";
                throw new Error(`APIエラー: ${msg} (Status: ${response.status})`);
            }
            
            const result = await response.json();
            const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!text) throw new Error("情報が取得できませんでした。");
            
            return JSON.parse(text);
        }

        function addRowToTable(data, originalUrl) {
            if (emptyRow && emptyRow.parentNode) emptyRow.remove();

            const tr = document.createElement('tr');
            tr.className = "hover:bg-blue-50/50 transition-colors group";
            
            const imgHtml = data.imageUrl && data.imageUrl.startsWith('http')
                ? `<img src="${data.imageUrl}" class="img-preview mx-auto" onerror="this.src='https://placehold.jp/24/e2e8f0/64748b/60x60.png?text=NO+IMG'">`
                : `<div class="img-preview mx-auto flex items-center justify-center bg-slate-100 text-slate-400 text-[10px]">No Image</div>`;

            tr.innerHTML = `
                <td class="p-4 align-middle">${imgHtml}</td>
                <td class="p-4 align-top" contenteditable="true">${data.system || '-'}</td>
                <td class="p-4 align-top font-bold" contenteditable="true">${data.title || '-'}</td>
                <td class="p-4 align-top text-sm leading-relaxed" contenteditable="true">${data.summary || '-'}</td>
                <td class="p-4 align-top text-center" contenteditable="true">${data.players || '-'}</td>
                <td class="p-4 align-top text-center" contenteditable="true">${data.playtime || '-'}</td>
                <td class="p-4 align-top text-sm bg-amber-50/10" contenteditable="true"></td>
                <td class="p-4 align-top text-center">
                    <a href="${originalUrl}" target="_blank" class="text-blue-600 hover:text-blue-800 inline-block p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
                            <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z" />
                        </svg>
                    </a>
                </td>
                <td class="p-4 align-top text-right">
                    <button onclick="this.closest('tr').remove()" class="text-slate-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </td>
            `;
            scenarioList.prepend(tr);
        }

        analyzeBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerText = "解析中...";
            statusMessage.classList.remove('hidden');
            
            try {
                const data = await analyzeUrl(url);
                addRowToTable(data, url);
                urlInput.value = "";
            } catch (error) {
                showMessage("解析エラー", error.message);
                const manualData = {
                    system: "取得失敗",
                    title: "手動入力",
                    summary: "AI解析に失敗しました。手動で補完してください。",
                    players: "-",
                    playtime: "-",
                    imageUrl: ""
                };
                addRowToTable(manualData, url);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerText = "解析して追加";
                statusMessage.classList.add('hidden');
            }
        });
    </script>
</body>
</html>

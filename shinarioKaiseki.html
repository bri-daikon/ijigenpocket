<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シナリオ一覧解析ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        [contenteditable]:focus {
            outline: 2px solid #3b82f6;
            background-color: #f8fafc;
            border-radius: 4px;
        }
        .img-preview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #e2e8f0;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-[1400px] mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold">シナリオ一覧マネージャー</h1>
            <p class="text-slate-600">入力されたURLの内容を正確に抽出します。URLと内容の不一致を防ぐよう改善しました。</p>
        </header>

        <!-- 入力エリア -->
        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-slate-200">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="urlInput" placeholder="https://booth.pm/ja/items/..." 
                    class="flex-1 p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="analyzeBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-colors flex items-center justify-center min-w-[160px]">
                    解析して追加
                </button>
            </div>
            <div id="statusMessage" class="mt-4 hidden flex items-center gap-3 text-blue-600">
                <div class="loading-spinner"></div>
                <span id="statusText">指定されたURLから正確な情報を抽出中...</span>
            </div>
        </div>

        <!-- 一覧表 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-white font-semibold">
                        <tr>
                            <th class="p-4 border-b w-20 text-center">画像</th>
                            <th class="p-4 border-b w-32">システム</th>
                            <th class="p-4 border-b w-48">タイトル</th>
                            <th class="p-4 border-b min-w-[200px]">概要</th>
                            <th class="p-4 border-b w-20 text-center">人数</th>
                            <th class="p-4 border-b w-24 text-center">時間</th>
                            <th class="p-4 border-b min-w-[150px]">自由メモ</th>
                            <th class="p-4 border-b w-16 text-center">URL</th>
                            <th class="p-4 border-b w-16"></th>
                        </tr>
                    </thead>
                    <tbody id="scenarioList" class="divide-y divide-slate-200">
                        <tr id="emptyRow">
                            <td colspan="9" class="p-12 text-center text-slate-400 italic">まだデータがありません。URLを入力してください。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // 実行環境から提供
        const analyzeBtn = document.getElementById('analyzeBtn');
        const urlInput = document.getElementById('urlInput');
        const scenarioList = document.getElementById('scenarioList');
        const statusMessage = document.getElementById('statusMessage');
        const emptyRow = document.getElementById('emptyRow');

        async function analyzeUrl(targetUrl) {
            // プロンプトを強化：指定されたURL「そのもの」の情報を出すように強調
            const systemPrompt = `あなたはTRPGシナリオの情報を抽出する正確なアシスタントです。
指定されたURL（特にBOOTHの商品ページ）の内容を読み取り、正確な情報をJSONで返してください。
他の似たようなシナリオと混同しないでください。

抽出ルール:
1. system: システム名（CoC 6th、エモクロア等）
2. title: 正確な商品名
3. summary: そのページに記載されている導入やあらすじを100文字程度で要約
4. players: プレイ人数（例：3〜4人）
5. playtime: プレイ時間（例：5時間）
6. imageUrl: 商品のメイン画像URL

返却形式 (JSONのみ):
{
  "system": "...",
  "title": "...",
  "summary": "...",
  "players": "...",
  "playtime": "...",
  "imageUrl": "..."
}`;

            const userQuery = `以下のURLのページ内容だけを正確に解析してください: ${targetUrl}`;

            try {
                let response;
                let retries = 0;
                const maxRetries = 5;

                while (retries < maxRetries) {
                    try {
                        response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                tools: [{ "google_search": {} }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        if (response.ok) break;
                    } catch (e) {}
                    await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                    retries++;
                }

                if (!response?.ok) throw new Error("APIエラー");
                const result = await response.json();
                const data = JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text);
                
                // AIが返したデータに、元のURLを確実に上書きする
                data.url = targetUrl;
                return data;

            } catch (error) {
                console.error(error);
                throw error;
            }
        }

        function addRowToTable(data, originalUrl) {
            if (emptyRow && emptyRow.parentNode) emptyRow.remove();

            const tr = document.createElement('tr');
            tr.className = "hover:bg-blue-50/50 transition-colors group";
            
            // 画像のフォールバック
            const imgHtml = data.imageUrl 
                ? `<img src="${data.imageUrl}" class="img-preview mx-auto" onerror="this.src='https://placehold.jp/24/e2e8f0/64748b/60x60.png?text=NO+IMG'">`
                : `<div class="img-preview mx-auto flex items-center justify-center bg-slate-100 text-slate-400 text-[10px]">No Image</div>`;

            // URLは必ず originalUrl を使用する
            tr.innerHTML = `
                <td class="p-4 align-middle">${imgHtml}</td>
                <td class="p-4 align-top" contenteditable="true">${data.system || '-'}</td>
                <td class="p-4 align-top font-bold" contenteditable="true">${data.title || '-'}</td>
                <td class="p-4 align-top text-sm leading-relaxed" contenteditable="true">${data.summary || '-'}</td>
                <td class="p-4 align-top text-center" contenteditable="true">${data.players || '-'}</td>
                <td class="p-4 align-top text-center" contenteditable="true">${data.playtime || '-'}</td>
                <td class="p-4 align-top text-sm bg-amber-50/10" contenteditable="true"></td>
                <td class="p-4 align-top text-center">
                    <a href="${originalUrl}" target="_blank" class="text-blue-600 hover:text-blue-800 inline-block p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
                            <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z" />
                        </svg>
                    </a>
                </td>
                <td class="p-4 align-top text-right">
                    <button onclick="this.closest('tr').remove()" class="text-slate-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </td>
            `;
            scenarioList.prepend(tr);
        }

        analyzeBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerText = "解析中...";
            statusMessage.classList.remove('hidden');
            
            try {
                const data = await analyzeUrl(url);
                // 成功時：AIデータと、ユーザーが入力した「元のURL」を渡す
                addRowToTable(data, url);
                urlInput.value = "";
            } catch (error) {
                // 失敗時：URLだけは正しくセットした空行を追加する
                const manualData = {
                    system: "取得失敗",
                    title: "手動入力",
                    summary: "AIが情報を取得できませんでした。URL先を確認して手動で補完してください。",
                    players: "-",
                    playtime: "-",
                    imageUrl: null
                };
                addRowToTable(manualData, url);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerText = "解析して追加";
                statusMessage.classList.add('hidden');
            }
        });
    </script>
</body>
</html>

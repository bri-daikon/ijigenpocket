<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>クリファンチェック表</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --muted:#9aa4b2;
      --accent:#5eead4;
      --accent-2:#60a5fa;
      --glass: rgba(255,255,255,0.04);
      --glass-2: rgba(255,255,255,0.02);
      --danger:#ff7b7b;
      --radius:12px;
      --gap:14px;
    }
    html,body{height:100%;margin:0;background:
      radial-gradient(1200px 600px at 10% 10%, rgba(96,165,250,0.08), transparent 8%),
      radial-gradient(1000px 500px at 90% 90%, rgba(94,234,212,0.04), transparent 8%),
      linear-gradient(180deg,#071025 0%, #071827 60%);
      color:#e6eef6;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;padding:28px 18px;
    }

    .container{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .title {
      display:flex;flex-direction:column;gap:4px;
    }
    .title h1{margin:0;font-size:20px;font-weight:700;letter-spacing:0.2px}
    .title p{margin:0;color:var(--muted);font-size:13px}

    .controlsCard{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.04);
      padding:14px;border-radius:var(--radius);display:flex;gap:12px;align-items:center;flex-wrap:wrap;
      box-shadow: 0 6px 18px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:var(--muted)}
    .field input[type="text"], .field input[type="number"], select{
      background:var(--glass);border:1px solid rgba(255,255,255,0.03);color:#eaf6ff;padding:8px 10px;border-radius:8px;
      min-width:120px;font-size:14px;outline:none;
    }
    .field input[type="number"]::-webkit-outer-spin-button, .field input[type="number"]::-webkit-inner-spin-button{ -webkit-appearance: none; margin: 0; }

    .btn {
      display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:0;background:linear-gradient(90deg,var(--accent-2),var(--accent));
      color:#04202b;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(96,165,250,0.08);
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s;
    }
    .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--accent-2);font-weight:600}
    .btn.ghost{background:transparent;border:1px dashed rgba(255,255,255,0.03);color:var(--muted)}
    .btn:active{transform:translateY(1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    .summaryCard{
      display:flex;gap:12px;align-items:center;padding:12px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.03);
    }
    .stat{padding:10px 14px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));min-width:140px}
    .stat .label{font-size:12px;color:var(--muted)}
    .stat .value{font-size:18px;font-weight:700;color:#eaf6ff;margin-top:6px}

    .layout{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
    .gridsWrap{display:flex;gap:18px;flex-wrap:wrap;flex:1;min-width:320px}
    .gridCard{flex:1;min-width:300px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,0.03)}
    .gridTitleRow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .gridTitleRow h3{margin:0;font-size:14px}
    .grid{width:100%;border-collapse:collapse}
    .grid td{width:64px;height:64px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);text-align:center;vertical-align:middle;padding:6px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));transition:transform .12s ease, box-shadow .12s ease}
    .grid td.empty{color:rgba(255,255,255,0.18);background:transparent;cursor:default}
    .grid td.filled{background:linear-gradient(180deg, rgba(96,165,250,0.08), rgba(94,234,212,0.03));box-shadow:0 6px 18px rgba(2,6,23,0.45);cursor:pointer}
    .grid td.filled:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(2,6,23,0.6)}
    .cell-value{font-size:16px;font-weight:700;color:#04202b}
    .cell-meta{font-size:11px;color:#04202b;opacity:0.85;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .pager{display:flex;gap:8px;align-items:center;margin-top:12px}
    .pager .pageInfo{color:var(--muted);font-size:13px}
    .icon{width:16px;height:16px;display:inline-block;vertical-align:middle}

    footer{margin-top:18px;color:var(--muted);font-size:13px;text-align:center}

    /* responsive */
    @media (max-width:880px){
      .grid td{width:56px;height:56px}
      .field input[type="text"], .field input[type="number"]{min-width:90px}
      .summaryCard{flex-direction:column;align-items:flex-start}
    }
	/* クリティカル（左列）: 数値は白、メタは淡い黄色 */
	#gridCritical td.filled .cell-value { color: #ffffff !important; }
	#gridCritical td.filled .cell-meta  { color: #fff7a8 !important; }

	/* ファンブル（右列）: 数値は白、メタはやや暖かい黄色 */
	#gridFumble td.filled .cell-value  { color: #ffffff !important; }
	#gridFumble td.filled .cell-meta   { color: #fff1a8 !important; }

	/* 空セルの色も明るく（必要なら） */
	#gridCritical td.empty, #gridFumble td.empty {
	  color: rgba(255,255,255,0.28) !important;
	}

	/* 強調（ホバー時）で文字をさらに明るく */
	#gridCritical td.filled:hover .cell-value,
	#gridFumble td.filled:hover .cell-value {
	  color: #ffffff;
	  text-shadow: 0 1px 2px rgba(0,0,0,0.45);
	}
  </style>

  <!-- head 内に追加 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>
<body>
  <div class="container">
    <header>
      <div class="title">
        <h1>クリファンチェック表</h1>
      </div>

      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn ghost" id="exportAllBtn" title="CSV出力（全件）">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3v12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 11l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          全件CSV
        </button>
        <button class="btn ghost" id="exportPageBtn" title="CSV出力（このページ）">
          <svg class="icon" viewBox="0 0 24 24" fill="none"><path d="M12 3v12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 11l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          ページCSV
        </button>
      </div>
    </header>

    <div class="controlsCard">
      <div class="field"><label>キャラクター名</label><input id="charName" type="text" placeholder="例：太郎"></div>
      <div class="field"><label>クリティカル</label><input id="critical" type="number" step="any" min="0" value="0" oninput="this.value = this.value === '' ? '' : Math.max(0, Number(this.value))"></div>
      <div class="field"><label>ファンブル</label><input id="fumble" type="number" step="any" min="0" value="0" oninput="this.value = this.value === '' ? '' : Math.max(0, Number(this.value))"></div>
      <div class="field" style="flex:1;min-width:180px"><label>備考 シナリオ名</label><input id="scenario" type="text" placeholder="シナリオ名"></div>

      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <button class="btn" id="addBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#04202b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          追加
        </button>
        <button class="btn secondary" id="clearBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6v12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          全クリア
        </button>
      </div>
    </div>

    <div class="layout">
      <div style="flex:1;min-width:260px">
        <div class="summaryCard">
          <div class="stat"><div class="label">件数</div><div class="value" id="count">0</div></div>
          <div class="stat"><div class="label">クリティカル 合計</div><div class="value" id="sumCritical">0</div></div>
          <div class="stat"><div class="label">ファンブル 合計</div><div class="value" id="sumFumble">0</div></div>
          <div class="stat"><div class="label">ページサイズ</div>
            <div style="margin-top:6px">
              <select id="pageSizeSelect" style="background:transparent;border:1px solid rgba(255,255,255,0.04);padding:6px;border-radius:8px;color:#eaf6ff">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
              </select>
            </div>
          </div>
        </div>

        <div class="pager" style="margin-top:12px">
          <button class="btn ghost" id="firstPage">|&lt;</button>
          <button class="btn ghost" id="prevPage">&lt; 前</button>
          <div class="pageInfo">ページ <strong id="currentPage">1</strong> / <strong id="totalPages">1</strong></div>
          <button class="btn ghost" id="nextPage">次 &gt;</button>
          <button class="btn ghost" id="lastPage">&gt;|</button>
          <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
            <input id="jumpInput" type="number" min="1" placeholder="ページ" style="width:84px;padding:8px;border-radius:8px;background:var(--glass);border:1px solid rgba(255,255,255,0.03);color:#eaf6ff">
            <button class="btn ghost" id="jumpBtn">移動</button>
	    <!-- 画像保存ボタン（既存のコントロール群に追加） -->
	    <button class="btn ghost" id="saveImageBtn">画像で保存（PNG）</button>  

          </div>
        </div>
      </div>
<!-- 画像化したい領域を囲む（既存の summary と grids をこの div に入れる） -->
<div id="captureArea">

      <div class="gridsWrap">
        <div class="gridCard">
          <div class="gridTitleRow">
            <h3>クリティカル</h3>
            <div class="small">クリックで削除</div>
          </div>
          <table id="gridCritical" class="grid" aria-label="クリティカルグリッド"></table>
        </div>

        <div class="gridCard">
          <div class="gridTitleRow">
            <h3>ファンブル</h3>
            <div class="small">同じ順序で埋まります</div>
          </div>
          <table id="gridFumble" class="grid" aria-label="ファンブルグリッド"></table>
        </div>
      </div>
    </div>
</div>

    <footer>データはブラウザの localStorage に保存されます。別ブラウザでは共有されません。</footer>
  </div>

  <script>
    // ページング対応・既存ロジック（機能はそのまま）
    const ROWS = 5, COLS = 10;
    const STORAGE_KEY = 'crit_fumble_paged_v1';
    const charNameEl = document.getElementById('charName');
    const criticalEl = document.getElementById('critical');
    const fumbleEl = document.getElementById('fumble');
    const scenarioEl = document.getElementById('scenario');
    const addBtn = document.getElementById('addBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exportAllBtn = document.getElementById('exportAllBtn');
    const exportPageBtn = document.getElementById('exportPageBtn');
    const gridCritical = document.getElementById('gridCritical');
    const gridFumble = document.getElementById('gridFumble');
    const countEl = document.getElementById('count');
    const sumCriticalEl = document.getElementById('sumCritical');
    const sumFumbleEl = document.getElementById('sumFumble');
    const pageSizeSelect = document.getElementById('pageSizeSelect');
    const firstPageBtn = document.getElementById('firstPage');
    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');
    const lastPageBtn = document.getElementById('lastPage');
    const currentPageEl = document.getElementById('currentPage');
    const totalPagesEl = document.getElementById('totalPages');
    const jumpInput = document.getElementById('jumpInput');
    const jumpBtn = document.getElementById('jumpBtn');
    let data = load();
    let pageSize = Number(pageSizeSelect.value);
    let currentPage = 1;

    function buildGrid(table, cols = COLS, rows = ROWS) {
      table.innerHTML = '';
      for (let r = 0; r < rows; r++) {
        const tr = document.createElement('tr');
        for (let c = 0; c < cols; c++) {
          const td = document.createElement('td');
          td.classList.add('empty');
          td.dataset.slot = r * cols + c;
          tr.appendChild(td);
        }
        table.appendChild(tr);
      }
    }
    buildGrid(gridCritical); buildGrid(gridFumble);

    function totalPages(){ return Math.max(1, Math.ceil(data.length / pageSize)); }
    function pageRangeIndices(page){ const start = (page-1)*pageSize; const end = Math.min(data.length, start+pageSize); return {start,end}; }
    function computeTotals(){ const count = data.length; const sumC = data.reduce((s,e)=>s+Number(e.critical||0),0); const sumF = data.reduce((s,e)=>s+Number(e.fumble||0),0); return {count,sumC,sumF}; }
    function updateSummary(){ const t = computeTotals(); countEl.textContent = t.count; sumCriticalEl.textContent = t.sumC; sumFumbleEl.textContent = t.sumF; }

    function renderPage(){
      gridCritical.querySelectorAll('td').forEach(td=>{ td.innerHTML=''; td.title=''; td.className=''; td.classList.add('empty'); });
      gridFumble.querySelectorAll('td').forEach(td=>{ td.innerHTML=''; td.title=''; td.className=''; td.classList.add('empty'); });
      const tp = totalPages(); if (currentPage>tp) currentPage=tp;
      const {start,end} = pageRangeIndices(currentPage);
      for (let i=start;i<end;i++){
        const pageIdx = i-start;
        const tdC = gridCritical.querySelector(`td[data-slot="${pageIdx}"]`);
        const tdF = gridFumble.querySelector(`td[data-slot="${pageIdx}"]`);
        const entry = data[i];
        const metaText = `${entry.character || '(無名)'}${entry.scenario ? ' / ' + entry.scenario : ''}`;
        const titleText = `#${i+1} ${metaText}\n${entry.time}`;
        if (tdC){ tdC.innerHTML = `<div class="cell-value">${escapeHtml(entry.critical)}</div><div class="cell-meta">${escapeHtml(metaText)}</div>`; tdC.title = titleText; tdC.classList.remove('empty'); tdC.classList.add('filled'); tdC.dataset.globalIndex = i; }
        if (tdF){ tdF.innerHTML = `<div class="cell-value">${escapeHtml(entry.fumble)}</div><div class="cell-meta">${escapeHtml(metaText)}</div>`; tdF.title = titleText; tdF.classList.remove('empty'); tdF.classList.add('filled'); tdF.dataset.globalIndex = i; }
      }
      currentPageEl.textContent = currentPage; totalPagesEl.textContent = tp; updateSummary();
    }

    addBtn.addEventListener('click', ()=>{
      const aRaw = criticalEl.value.trim(); const bRaw = fumbleEl.value.trim();
      if (aRaw === '' || bRaw === '') return alert('クリティカルとファンブルの両方に数値を入力してください');
      const normalize = s => String(s).replace(/－/g,'-').trim();
      const aNum = Number(normalize(aRaw)); const bNum = Number(normalize(bRaw));
      if (Number.isNaN(aNum) || Number.isNaN(bNum)) return alert('有効な数値を入力してください');
      if (aNum < 0 || bNum < 0) return alert('負の数は入力できません');
      const entry = { critical: aNum, fumble: bNum, character: charNameEl.value.trim(), scenario: scenarioEl.value.trim(), time: new Date().toLocaleString() };
      data.push(entry); save(); pageSize = Number(pageSizeSelect.value); currentPage = totalPages(); renderPage();
      criticalEl.value = '0'; fumbleEl.value = '0'; charNameEl.value = ''; scenarioEl.value = '';
    });

    function onCellClick(e){
      const td = e.target.closest('td'); if (!td) return; const gIdx = td.dataset.globalIndex; if (gIdx === undefined) return;
      const idx = Number(gIdx); if (Number.isNaN(idx)) return;
      if (!confirm(`#${idx+1} のエントリを削除しますか？\nキャラ: ${data[idx].character || '(無名)'}\nシナリオ: ${data[idx].scenario || ''}`)) return;
      data.splice(idx,1); save(); const tp = totalPages(); if (currentPage>tp) currentPage=tp; renderPage();
    }
    gridCritical.addEventListener('click', onCellClick); gridFumble.addEventListener('click', onCellClick);

    firstPageBtn.addEventListener('click', ()=>{ currentPage=1; renderPage(); });
    prevPageBtn.addEventListener('click', ()=>{ if (currentPage>1) currentPage--; renderPage(); });
    nextPageBtn.addEventListener('click', ()=>{ if (currentPage<totalPages()) currentPage++; renderPage(); });
    lastPageBtn.addEventListener('click', ()=>{ currentPage = totalPages(); renderPage(); });
    jumpBtn.addEventListener('click', ()=>{ const v = Number(jumpInput.value); if (!v || v<1) return; const tp = totalPages(); currentPage = Math.min(tp, Math.max(1, Math.floor(v))); renderPage(); });

    pageSizeSelect.addEventListener('change', ()=>{
      const old = Number(pageSizeSelect.oldValue || pageSize);
      pageSize = Number(pageSizeSelect.value);
      const globalStart = (currentPage - 1) * old;
      currentPage = Math.floor(globalStart / pageSize) + 1;
      if (currentPage < 1) currentPage = 1;
      renderPage();
    });
    pageSizeSelect.addEventListener('focus', ()=>{ pageSizeSelect.oldValue = pageSizeSelect.value; });

    clearBtn.addEventListener('click', ()=>{
      if (!confirm('全データを削除しますか？')) return;
      data = []; save(); currentPage = 1; renderPage(); criticalEl.value='0'; fumbleEl.value='0'; charNameEl.value=''; scenarioEl.value='';
    });

    function downloadCsv(rows, filename){
      const header = ['index','time','character','scenario','critical','fumble'];
      const csv = [header, ...rows].map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    }

    exportAllBtn.addEventListener('click', ()=>{ if (data.length===0) return alert('データがありません'); const rows = data.map((d,i)=>[i+1,d.time,d.character,d.scenario,d.critical,d.fumble]); downloadCsv(rows,'crit_fumble_all.csv'); });
    exportPageBtn.addEventListener('click', ()=>{ const {start,end} = pageRangeIndices(currentPage); if (start>=end) return alert('このページにデータがありません'); const rows = data.slice(start,end).map((d,idx)=>[start+idx+1,d.time,d.character,d.scenario,d.critical,d.fumble]); downloadCsv(rows,`crit_fumble_page${currentPage}.csv`); });

    function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    function load(){ try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }catch(e){ return []; } }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    // 初期化
    criticalEl.value = criticalEl.value === '' ? '0' : criticalEl.value;
    fumbleEl.value = fumbleEl.value === '' ? '0' : fumbleEl.value;
    pageSize = Number(pageSizeSelect.value);
    currentPage = 1;
    renderPage();
  </script>

<!-- スクリプト（既存の script の下に追加） -->
<script>
  document.getElementById('saveImageBtn').addEventListener('click', async () => {
    const area = document.getElementById('captureArea');
    if (!area) { alert('キャプチャ領域が見つかりません'); return; }

    // オプション: scale を上げると高解像度になるがメモリを使う
    const options = {
      backgroundColor: '#000000', // 背景色を白にする
      scale: 2,                   // 画像解像度を2倍にする
      useCORS: true               // 外部画像がある場合にCORSを試みる
    };

    try {
      const canvas = await html2canvas(area, options);
      // PNG データURL を作成
      const dataUrl = canvas.toDataURL('image/png');

      // ダウンロード用リンクを作ってクリック
      const a = document.createElement('a');
      a.href = dataUrl;
      // ファイル名にページ番号や日時を付ける
      const now = new Date();
      const filename = `crit_fumble_page${currentPage || 1}_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.png`;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
    } catch (err) {
      console.error('画像化でエラー', err);
      alert('画像化に失敗しました。Consoleを確認してください。');
    }
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogStylist Pro - ココフォリアログ整形</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/lstylist.css">
</head>
<body class="flex flex-col h-screen">
    <div class="flex flex-1 overflow-hidden">
        <aside class="sidebar p-6 flex flex-col gap-6 text-sm">
            <header>
                <h1 class="text-2xl font-black text-indigo-500">LogStylist <span class="text-xs font-normal opacity-50">Pro</span></h1>
            </header>

            <section class="space-y-4">
                <h2 class="font-bold border-b pb-1 opacity-60">1. ファイル読込</h2>
                <input type="file" id="fileInput" accept=".html" class="w-full text-xs cursor-pointer">
                <div>
                    <label class="block text-xs mb-1">セッション名</label>
                    <input type="text" id="logTitle" placeholder="セッションログ" class="w-full p-2 border rounded bg-transparent dark:border-gray-600 outline-none">
                </div>
            </section>

            <section class="space-y-4 flex-1 overflow-y-auto pr-2">
                <h2 class="font-bold border-b pb-1 opacity-60">2. カスタマイズ</h2>
                
                <div class="space-y-2 bg-black/5 dark:bg-white/5 p-3 rounded-lg">
                    <div class="flex items-center justify-between">
                        <span>ダークモード</span>
                        <input type="checkbox" id="darkModeToggle" class="accent-indigo-500">
                    </div>
                    <div class="flex items-center justify-between">
                        <span>名前の色を本文に適用</span>
                        <input type="checkbox" id="syncColorToggle" class="accent-indigo-500">
                    </div>
                </div>

                <div class="space-y-2">
                    <p class="text-xs font-bold mt-4 text-indigo-500">タブ設定 (インデント/サイズ)</p>
                    <div id="tabControls" class="space-y-2"></div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center mt-4">
                        <p class="text-xs font-bold text-indigo-500">発言者設定</p>
                    </div>
                    
                    <!-- 一括編集パネル -->
                    <div id="bulkPanel" class="hidden bg-indigo-50 dark:bg-indigo-900/20 p-3 rounded-lg border border-indigo-200 dark:border-indigo-800 space-y-2">
                        <p class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400">選択中の一括編集</p>
                        <div class="flex gap-2">
                            <input type="text" id="bulkNameInput" placeholder="新しい表示名" class="flex-1 p-1 text-xs border rounded bg-white dark:bg-gray-800">
                            <button id="applyBulkName" class="bg-indigo-600 text-white px-2 py-1 rounded text-[10px] hover:bg-indigo-700">適用</button>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px]">一括カラー:</span>
                            <input type="color" id="bulkColorInput" class="w-8 h-5 border-0 bg-transparent cursor-pointer">
                        </div>
                    </div>

                    <div id="userControls" class="space-y-1"></div>
                </div>
            </section>

            <section class="pt-4 border-t space-y-4">
                <button id="downloadBtn" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition shadow-lg">
                    HTMLを書き出し
                </button>
                <footer class="text-[10px] opacity-40 text-center space-y-1">
                    <p>Product by 異次元ポケット</p>
                    <p><a href="https://ijigenpocket.booth.pm/" target="_blank" class="hover:underline">https://ijigenpocket.booth.pm/</a></p>
                </footer>
            </section>
        </aside>

        <main class="flex-1 p-8 lg:p-12 overflow-y-auto h-screen">
            <div class="max-w-4xl mx-auto">
                <div id="statsArea" class="mb-10 hidden">
                    <div class="bg-white/40 dark:bg-black/20 p-6 rounded-2xl border border-white/50 dark:border-white/5 shadow-sm">
                        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">📊 クリティカル・ファンブル集計</h2>
                        <div id="statsContent" class="space-y-4"></div>
                    </div>
                </div>

                <div id="logDisplay" class="bg-white/30 dark:bg-black/10 rounded-3xl shadow-2xl min-h-[600px] border border-white/20 overflow-hidden transition-all duration-300 relative">
                    <div id="dropZone" class="p-20 text-center opacity-30 h-full flex flex-col items-center justify-center pointer-events-none absolute inset-0 z-0">
                        <p class="text-5xl mb-4">📥</p>
                        <p class="font-bold">ログをドロップ</p>
                    </div>
                    <div id="logContentArea" class="relative z-10"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/lstylist.js"></script>
</body>
</html>

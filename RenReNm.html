<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連番リネームツール - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ZIP作成ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- ドラッグ＆ドロップ並び替えライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans">

    <div class="max-w-[95vw] xl:max-w-[1400px] mx-auto py-8 px-4">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-indigo-700 mb-2">連番リネーム</h1>
            <p class="text-slate-500">画像を並び替えて一括保存。特定のファイルは名前を維持します。</p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-8 border border-slate-200">
            
            <!-- ファイル投入エリア -->
            <div id="drop-area" class="group relative border-4 border-dashed border-slate-200 rounded-2xl p-10 text-center transition-all hover:border-indigo-400 hover:bg-indigo-50 cursor-pointer">
                <input type="file" id="file-input" multiple class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                <div class="space-y-4">
                    <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div>
                        <p class="text-lg font-bold text-slate-700">画像をここにドロップ</p>
                        <p class="text-sm text-slate-400">またはクリックして選択</p>
                    </div>
                </div>
            </div>

            <!-- リスト表示エリア -->
            <div id="list-section" class="hidden mt-8 space-y-8">
                
                <!-- 固定ファイルセクション (main.png, tab.png用) -->
                <div id="fixed-section" class="hidden">
                    <h2 class="font-bold text-slate-700 mb-3 flex items-center gap-2">
                        <span class="bg-amber-100 text-amber-700 text-xs px-2 py-1 rounded">名前固定</span>
                        同梱ファイル
                    </h2>
                    <ul id="fixed-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <!-- JSで項目が追加されます -->
                    </ul>
                </div>

                <!-- 連番リストセクション -->
                <div>
                    <div class="flex items-center justify-between mb-4 border-b pb-2">
                        <h2 class="font-bold text-slate-700 flex items-center gap-2">
                            <span class="bg-indigo-500 text-white text-xs px-2 py-1 rounded-full" id="count-badge">0</span>
                            連番リネーム対象
                        </h2>
                        <p class="text-xs text-slate-400 italic">ドラッグして順番を調整</p>
                    </div>

                    <ul id="sortable-list" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 gap-4 mb-8 max-h-[75vh] overflow-y-auto pr-2">
                        <!-- JSで項目が追加されます -->
                    </ul>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button id="download-btn" class="flex items-center justify-center gap-2 bg-indigo-600 text-white py-4 rounded-2xl font-bold text-xl hover:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        ZIPで一括保存
                    </button>
                    <button id="reset-btn" class="text-slate-400 text-sm font-medium hover:text-red-500 py-2 text-center w-full">
                        すべてリセット
                    </button>
                </div>
            </div>
        </div>

        <!-- 補足・フッター -->
        <div class="mt-8 text-center space-y-4">
            <p class="text-slate-400 text-xs">
                ※ main.png, tab.png はそのままの名前で保存されます。<br>
                ※ 画像プレビューはブラウザ内での表示用に縮小されていますが、保存される画像は元の画質です。
            </p>
            <footer class="text-slate-400 text-sm font-medium border-t border-slate-200 pt-6">
                Product by 異次元ポケット <a href="https://ijigenpocket.booth.pm/" target="_blank" class="text-indigo-400 hover:text-indigo-600 underline decoration-indigo-200 transition-colors">https://ijigenpocket.booth.pm/</a>
            </footer>
        </div>
    </div>

    <!-- ローディング用オーバーレイ -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/90 backdrop-blur-md flex items-center justify-center z-50 hidden">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-bold text-indigo-700 text-lg">ZIPファイルを作成中...</p>
            <p class="text-slate-400 text-sm">しばらくお待ちください</p>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/renrenm.js"></script>
</body>
</html>

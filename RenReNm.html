<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連番リネームツール - Numbers Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ZIP作成ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- ドラッグ＆ドロップ並び替えライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans">

    <div class="max-w-2xl mx-auto py-8 px-4">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-indigo-700 mb-2">連番リネーム</h1>
            <p class="text-slate-500">並び替えて「01, 02, 03...」に一括変更！</p>
        </div>

        <!-- メインカード -->
        <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-8 border border-slate-200">
            
            <!-- ファイル投入エリア -->
            <div id="drop-area" class="group relative border-4 border-dashed border-slate-200 rounded-2xl p-10 text-center transition-all hover:border-indigo-400 hover:bg-indigo-50 cursor-pointer">
                <input type="file" id="file-input" multiple class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                <div class="space-y-4">
                    <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div>
                        <p class="text-lg font-bold text-slate-700">画像をここにドロップ</p>
                        <p class="text-sm text-slate-400">またはクリックして選択</p>
                    </div>
                </div>
            </div>

            <!-- リスト表示エリア（ファイルがある時だけ表示） -->
            <div id="list-section" class="hidden mt-8">
                <div class="flex items-center justify-between mb-4 border-b pb-2">
                    <h2 class="font-bold text-slate-700">並び替えリスト <span id="count-badge" class="ml-2 text-xs bg-indigo-500 text-white px-2 py-0.5 rounded-full">0</span></h2>
                    <p class="text-xs text-slate-400 italic">ドラッグして順番を調整してください</p>
                </div>

                <ul id="sortable-list" class="space-y-2 mb-8 max-h-[400px] overflow-y-auto pr-2">
                    <!-- JSで項目が追加されます -->
                </ul>

                <div class="grid grid-cols-1 gap-3">
                    <button id="download-btn" class="flex items-center justify-center gap-2 bg-indigo-600 text-white py-4 rounded-2xl font-bold text-xl hover:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="Path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        ZIPで一括保存
                    </button>
                    <button id="reset-btn" class="text-slate-400 text-sm font-medium hover:text-red-500 py-2">
                        すべてやり直し
                    </button>
                </div>
            </div>
        </div>

        <!-- 補足事項 -->
        <p class="mt-6 text-center text-slate-400 text-xs">
            ※ 拡張子は元のファイルを引き継ぎます。 (例: 01.jpg, 02.png)<br>
            ブラウザ内でのみ処理されるため、データは安全です。
        </p>
    </div>

    <!-- ローディング用オーバーレイ -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-bold text-indigo-700">ZIPファイルを作成中...</p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');
        const sortableList = document.getElementById('sortable-list');
        const listSection = document.getElementById('list-section');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        const countBadge = document.getElementById('count-badge');
        const loadingOverlay = document.getElementById('loading-overlay');

        // ファイルを保持する配列
        let fileRegistry = new Map();
        let nextId = 0;

        // Sortableの初期化
        const sortable = new Sortable(sortableList, {
            animation: 250,
            handle: '.drag-handle',
            ghostClass: 'bg-indigo-50',
            onEnd: updateNumbers // 並び替えが終わったら数字を更新
        });

        // イベント設定
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('border-indigo-400', 'bg-indigo-50');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('border-indigo-400', 'bg-indigo-50');
        });

        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('border-indigo-400', 'bg-indigo-50');
            handleFiles(e.dataTransfer.files);
        });

        resetBtn.addEventListener('click', () => {
            if(confirm('リストをクリアしますか？')) {
                fileRegistry.clear();
                sortableList.innerHTML = '';
                listSection.classList.add('hidden');
                dropArea.classList.remove('hidden');
                fileInput.value = '';
            }
        });

        // ファイル受付処理
        function handleFiles(files) {
            const fileList = Array.from(files);
            if (fileList.length === 0) return;

            fileList.forEach(file => {
                if (!file.type.startsWith('image/')) return;
                
                const id = `file-${nextId++}`;
                fileRegistry.set(id, file);
                addToList(id, file);
            });

            listSection.classList.remove('hidden');
            dropArea.classList.add('hidden');
            updateNumbers();
        }

        // リストに項目を追加
        function addToList(id, file) {
            const li = document.createElement('li');
            li.className = 'flex items-center gap-4 bg-slate-50 p-3 rounded-xl border border-slate-100 shadow-sm drag-handle cursor-grab active:cursor-grabbing hover:bg-white transition-colors';
            li.dataset.id = id;

            // 簡易プレビューURL作成
            const previewUrl = URL.createObjectURL(file);

            li.innerHTML = `
                <div class="flex-shrink-0 w-10 h-10 bg-indigo-600 text-white rounded-lg flex items-center justify-center font-mono font-bold num-display">
                    --
                </div>
                <img src="${previewUrl}" class="w-12 h-12 object-cover rounded-md bg-slate-200">
                <div class="flex-grow min-w-0">
                    <p class="text-xs text-slate-400 truncate">${file.name}</p>
                    <p class="text-sm font-bold text-indigo-600 font-mono new-name-display">00.ext</p>
                </div>
                <button class="text-slate-300 hover:text-red-500 p-2" onclick="removeItem('${id}')">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            sortableList.appendChild(li);
        }

        // 番号表示の更新
        function updateNumbers() {
            const items = sortableList.querySelectorAll('li');
            countBadge.textContent = items.length;

            items.forEach((item, index) => {
                const num = (index + 1).toString().padStart(2, '0');
                const fileId = item.dataset.id;
                const file = fileRegistry.get(fileId);
                const ext = file.name.split('.').pop();

                item.querySelector('.num-display').textContent = num;
                item.querySelector('.new-name-display').textContent = `${num}.${ext}`;
            });
        }

        // 個別削除
        window.removeItem = function(id) {
            const el = sortableList.querySelector(`[data-id="${id}"]`);
            if (el) {
                // メモリ解放
                const img = el.querySelector('img');
                URL.revokeObjectURL(img.src);
                
                el.remove();
                fileRegistry.delete(id);
            }
            
            if (fileRegistry.size === 0) {
                listSection.classList.add('hidden');
                dropArea.classList.remove('hidden');
            } else {
                updateNumbers();
            }
        };

        // ダウンロード実行
        downloadBtn.addEventListener('click', async () => {
            const items = sortableList.querySelectorAll('li');
            if (items.length === 0) return;

            loadingOverlay.classList.remove('hidden');
            const zip = new JSZip();

            try {
                items.forEach((item, index) => {
                    const fileId = item.dataset.id;
                    const file = fileRegistry.get(fileId);
                    const ext = file.name.split('.').pop();
                    
                    // 新しいファイル名：数字のみ (例: 01.jpg)
                    const newName = `${(index + 1).toString().padStart(2, '0')}.${ext}`;
                    zip.file(newName, file);
                });

                const content = await zip.generateAsync({ type: 'blob' });
                const downloadUrl = URL.createObjectURL(content);
                
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `renamed_images_${new Date().getTime()}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);

            } catch (error) {
                console.error(error);
                alert('ZIPの作成中にエラーが発生しました。');
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        });
    </script>
</body>
</html>

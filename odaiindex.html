<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日のお題 | 異次元ポケット工房</title>
    <meta name="description" content="創作のインスピレーションを刺激する「今日のお題」を生成。画像保存やXポストも可能です。">
    
    <!-- Google Fonts: エレガントな明朝体を使用 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 画像生成ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <main class="container">
        <!-- 撮影対象となるエリア -->
        <div id="capture-area" class="capture-frame">
            <div class="capture-wrapper">
                <header class="capture-header">
                    <p class="subtitle">Creative Inspiration</p>
                    <h1>今日のお題</h1>
                </header>

                <section class="card glass">
                    <div id="theme-display" class="theme-text">
                        <span class="placeholder">準備中...</span>
                    </div>
                    
                    <!-- 撮影時にはJSで隠すボタン -->
                    <button id="generate-btn" class="generate-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                        新しいお題を引く
                    </button>
                </section>

                <footer class="capture-footer">
                    <p>Product by 異次元ポケット工房</p>
                </footer>
            </div>
        </div>

        <!-- 操作パネル（ここは画像に含まれない） -->
        <div class="flex flex-wrap justify-center gap-4 mt-12">
            <button onclick="shareOnX()" class="action-btn bg-slate-900 text-white px-8 py-4 rounded-full font-bold hover:bg-slate-800 transition-all flex items-center gap-2 shadow-xl">
                <svg class="h-4 w-4 fill-current" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                結果をポスト
            </button>
            
            <button onclick="saveAsImage(event)" class="action-btn bg-amber-600 text-white px-8 py-4 rounded-full font-bold hover:bg-amber-700 transition-all flex items-center gap-2 shadow-xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                画像を保存
            </button>

            <button onclick="copyToClipboard(event)" class="action-btn bg-white/10 text-white border border-white/20 px-8 py-4 rounded-full font-bold hover:bg-white/20 transition-all shadow-lg backdrop-blur-md">
                お題をコピー
            </button>
        </div>
        
        <p id="data-status" class="text-center mt-8 text-xs text-slate-500 opacity-50"></p>
    </main>

    <script src="app.js"></script>
</body>
</html>

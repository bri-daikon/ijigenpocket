<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINEスタンプ売上自動集計ダッシュボード</title>
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (グラフ描画用) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <!-- ヘッダー -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <!-- LINEグリーン風のアイコン -->
                <div class="bg-emerald-500 text-white p-2 rounded-xl shadow-md shadow-emerald-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 tracking-tight">LINEスタンプ売上集計</h1>
                    <p class="text-xs text-slate-500">ドラッグ＆ドロップ自動解析ツール</p>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">
                    <span class="w-1.5 h-1.5 mr-1.5 bg-emerald-500 rounded-full animate-ping"></span>
                    準備完了
                </span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">

        <!-- ファイル読み込みセクション -->
        <section>
            <!-- ファイルドロップゾーン -->
            <div class="w-full bg-white rounded-2xl border-2 border-dashed border-slate-200 hover:border-emerald-500 transition-colors duration-200 p-8 flex flex-col items-center justify-center text-center group cursor-pointer shadow-sm relative" id="drop-zone">
                <input type="file" id="file-input" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                
                <div class="p-3 bg-emerald-50 rounded-full text-emerald-500 group-hover:scale-110 transition-transform duration-200 mb-3">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                </div>
                
                <p class="text-sm font-semibold text-slate-700 mb-1">ここに売上CSVファイルをドラッグ＆ドロップ</p>
                <p class="text-xs text-slate-400">または、クリックしてファイルを選択</p>
            </div>
        </section>

        <!-- メッセージ表示エリア (エラー時など) -->
        <div id="message-container" class="hidden">
            <div class="p-4 rounded-xl text-sm flex items-center space-x-3" id="message-box">
                <!-- アイコンは動的に挿入されます -->
                <div id="message-text"></div>
            </div>
        </div>

        <!-- 集計結果セクション (初期状態は非表示) -->
        <section id="result-section" class="hidden space-y-8 animate-fade-in">
            
            <!-- KPI（主要指標）カード -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <!-- 総分配金 -->
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm relative overflow-hidden">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">合計分配金 (売上)</p>
                    <p class="text-3xl font-extrabold text-slate-950 mt-2 flex items-baseline">
                        <span class="text-emerald-500 mr-1 text-2xl">¥</span>
                        <span id="kpi-total-revenue">0</span>
                    </p>
                    <div class="absolute right-4 bottom-4 text-emerald-100">
                        <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path d="M8.433 7.418c.554-.589 1.448-.589 2.002 0l.207.22 4.317 4.598a1 1 0 001.458-1.372L12.1 6.266a3 3 0 00-4.3 0L3.583 10.864a1 1 0 101.458 1.372l4.317-4.598.075-.08z"/></svg>
                    </div>
                </div>

                <!-- 総販売個数 -->
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm relative overflow-hidden">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">合計販売数</p>
                    <p class="text-3xl font-extrabold text-slate-950 mt-2 flex items-baseline">
                        <span id="kpi-total-units">0</span>
                        <span class="text-slate-400 text-sm ml-1">個</span>
                    </p>
                    <div class="absolute right-4 bottom-4 text-slate-100">
                        <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>
                    </div>
                </div>

                <!-- 集計期間 -->
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm relative overflow-hidden">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">集計期間</p>
                    <p class="text-lg font-bold text-slate-950 mt-2 truncate" id="kpi-period">--</p>
                    <p class="text-xs text-slate-400 mt-1" id="kpi-period-detail">CSVデータより抽出</p>
                </div>

                <!-- トップスタンプ -->
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm relative overflow-hidden">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">一番売れたスタンプ</p>
                    <p class="text-lg font-bold text-slate-950 mt-2 truncate" id="kpi-best-item" title="スタンプ名">--</p>
                    <p class="text-xs text-slate-400 mt-1" id="kpi-best-item-sales">0 個販売</p>
                </div>
            </div>

            <!-- グラフ表示エリア -->
            <div class="grid grid-cols-1 gap-6">
                <!-- スタンプ別売上 (メイン横棒) -->
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-slate-800 flex items-center">
                            <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 mr-2"></span>
                            スタンプごとの売上（分配金）
                        </h3>
                        <span class="text-xs text-slate-400">アイテム別の合計分配金比較</span>
                    </div>
                    <div class="h-96 relative">
                        <canvas id="chart-daily-trend"></canvas>
                    </div>
                </div>
            </div>

            <!-- 詳細データテーブル -->
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="p-6 border-b border-slate-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 bg-slate-50/50">
                    <div>
                        <h3 class="font-bold text-slate-800 flex items-center text-base">
                            <svg class="w-5 h-5 text-slate-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                            売上内訳データ一覧
                        </h3>
                        <p class="text-xs text-slate-400 mt-1">日付やアイテムごとに並び替え・検索ができます</p>
                    </div>
                    <div class="relative max-w-xs">
                        <input type="text" id="table-search" placeholder="スタンプ名で検索..." class="w-full pl-9 pr-4 py-2 text-sm bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors">
                        <div class="absolute left-3 top-2.5 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        </div>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-xs font-semibold tracking-wider border-b border-slate-200 uppercase">
                                <th class="py-3.5 px-6">日付</th>
                                <th class="py-3.5 px-6">スタンプ名</th>
                                <th class="py-3.5 px-6 text-center">販売個数</th>
                                <th class="py-3.5 px-6 text-right">分配金(円)</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100 text-sm text-slate-600">
                            <!-- JSで挿入されます -->
                        </tbody>
                    </table>
                </div>
            </div>

        </section>

    </main>

    <footer class="bg-white border-t border-slate-200 py-6 mt-16 text-center text-xs text-slate-400">
        <p>© 2026 <a href="https://ijigenpocket.booth.pm/" target="_blank" class="hover:text-slate-600 underline">異次元ポケット</a></p>
    </footer>

    <!-- JavaScriptロジック -->
    <script>
        // DOM要素の取得
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultSection = document.getElementById('result-section');
        const msgContainer = document.getElementById('message-container');
        const msgBox = document.getElementById('message-box');
        const msgText = document.getElementById('message-text');
        
        // KPI要素
        const kpiRevenue = document.getElementById('kpi-total-revenue');
        const kpiUnits = document.getElementById('kpi-total-units');
        const kpiPeriod = document.getElementById('kpi-period');
        const kpiPeriodDetail = document.getElementById('kpi-period-detail');
        const kpiBestItem = document.getElementById('kpi-best-item');
        const kpiBestItemSales = document.getElementById('kpi-best-item-sales');
        
        // テーブル検索用
        const searchInput = document.getElementById('table-search');
        let parsedRows = []; // パースされた生データ

        // Chartインスタンス用
        let dailyChart = null;

        // ドラッグ＆ドロップイベントの制御
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-emerald-500', 'bg-emerald-50/30');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-emerald-500', 'bg-emerald-50/30');
            }, false);
        });

        // ファイルドロップ時の処理
        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // ファイル選択時の処理
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // テーブル検索イベント
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            renderTable(parsedRows.filter(row => row.itemName.toLowerCase().includes(keyword)));
        });

        // メッセージ表示関数
        function showMessage(text, type = 'success') {
            msgContainer.classList.remove('hidden');
            msgBox.className = "p-4 rounded-xl text-sm flex items-center space-x-3 ";
            
            if (type === 'error') {
                msgBox.classList.add('bg-rose-50', 'text-rose-800', 'border', 'border-rose-100');
                msgText.innerHTML = `<strong>エラー:</strong> ${text}`;
            } else {
                msgBox.classList.add('bg-emerald-50', 'text-emerald-800', 'border', 'border-emerald-100');
                msgText.innerHTML = `<strong>成功:</strong> ${text}`;
            }
        }

        // CSVファイルの読み込みと処理
        function handleFile(file) {
            if (!file.name.endsWith('.csv')) {
                showMessage('CSV形式(.csv)のファイルをアップロードしてください。', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                processCSVData(text);
            };
            reader.readAsText(file, 'utf-8'); // LINEのCSVは基本的にUTF-8ですが、Excel用Shift-JISの場合を考慮
        }

        // CSVデータのパース処理
        function processCSVData(csvText) {
            try {
                const lines = csvText.split(/\r?\n/);
                let headerIndex = -1;
                
                // ヘッダー行 (日付, アイテム名などの行) を探索
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    if (line.includes('日付') || line.includes('Date') || line.includes('From (GMT') || line.includes('Item ID')) {
                        headerIndex = i;
                        break;
                    }
                }

                if (headerIndex === -1) {
                    throw new Error('CSVの中に「日付」や「From (GMT」列が見つかりませんでした。LINEマイページからダウンロードした正しいCSVか確認してください。');
                }

                // ヘッダーのカラム位置をマッピング
                const headerCols = parseCSVLine(lines[headerIndex]);
                const dateIdx = headerCols.findIndex(c => c.includes('日付') || c.toLowerCase().includes('date') || c.includes('From (GMT'));
                const nameIdx = headerCols.findIndex(c => c.includes('アイテム名') || c.toLowerCase().includes('item name') || c.includes('スタンプ名') || c.includes('Item Title'));
                const unitsIdx = headerCols.findIndex(c => c.includes('個数') || c.toLowerCase().includes('unit') || c.includes('数量') || c.includes('Sales Counts'));
                
                const fromIdx = headerCols.findIndex(c => c.includes('From') || c.includes('開始'));
                const toIdx = headerCols.findIndex(c => c.includes('To') || c.includes('終了'));

                // 「Revenue Share」に完全一致するものを優先して探す
                let revenueIdx = headerCols.findIndex(c => c === 'Revenue Share');
                if (revenueIdx === -1) {
                    revenueIdx = headerCols.findIndex(c => c.includes('分配') || c.includes('金額') || c.includes('円') || c.toLowerCase().includes('revenue'));
                }

                if (dateIdx === -1 || unitsIdx === -1 || revenueIdx === -1) {
                    throw new Error('CSVの項目（日付、個数、分配金など）が不足しています。');
                }

                const rows = [];
                for (let i = headerIndex + 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    const cols = parseCSVLine(line);
                    if (cols.length <= Math.max(dateIdx, nameIdx, unitsIdx, revenueIdx)) continue;

                    let dateStr = cols[dateIdx];
                    if (dateStr && dateStr.includes('.')) {
                        dateStr = dateStr.replace(/\./g, '/');
                    }
                    
                    const itemName = nameIdx !== -1 ? cols[nameIdx] : 'スタンプA';
                    const units = parseInt(cols[unitsIdx].replace(/,/g, '')) || 0;
                    const revenue = parseInt(cols[revenueIdx].replace(/,/g, '')) || 0;

                    const fromDate = fromIdx !== -1 ? cols[fromIdx] : '';
                    const toDate = toIdx !== -1 ? cols[toIdx] : '';

                    if (units === 0 && revenue === 0) continue; // 売上のない行はスキップ

                    rows.push({
                        date: dateStr,
                        fromDate: fromDate,
                        toDate: toDate,
                        itemName: itemName,
                        units: units,
                        revenue: revenue
                    });
                }

                if (rows.length === 0) {
                    throw new Error('集計できる売上データが見つかりませんでした。');
                }

                // 日付順にソート
                rows.sort((a, b) => new Date(a.date) - new Date(b.date));

                parsedRows = rows;
                renderDashboard(rows);
                showMessage(`${rows.length}件の売上データを集計しました！📊`, 'success');

            } catch (error) {
                showMessage(error.message, 'error');
                resultSection.classList.add('hidden');
            }
        }

        // カンマ区切りのパース (ダブルクォーテーション対応)
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim().replace(/^"|"$/g, ''));
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim().replace(/^"|"$/g, ''));
            return result;
        }

        // ダッシュボード全体の描画
        function renderDashboard(data) {
            resultSection.classList.remove('hidden');

            // 1. KPIの計算
            let totalRevenue = 0;
            let totalUnits = 0;
            const dailySummary = {}; // 日付ごとの売上合計
            const itemSummary = {};  // アイテムごとの売上合計
            const itemUnits = {};    // アイテムごとの販売個数

            data.forEach(row => {
                totalRevenue += row.revenue;
                totalUnits += row.units;

                // 日別集計
                dailySummary[row.date] = (dailySummary[row.date] || 0) + row.revenue;

                // スタンプ別集計
                itemSummary[row.itemName] = (itemSummary[row.itemName] || 0) + row.revenue;
                itemUnits[row.itemName] = (itemUnits[row.itemName] || 0) + row.units;
            });

            // 画面のKPIにセット
            kpiRevenue.innerText = totalRevenue.toLocaleString();
            kpiUnits.innerText = totalUnits.toLocaleString();

            // 集計期間の計算
            let periodText = '--';
            if (data.length > 0) {
                const firstRow = data[0];
                if (firstRow.fromDate && firstRow.toDate) {
                    periodText = `${formatDate(firstRow.fromDate)} 〜 ${formatDate(firstRow.toDate)}`;
                } else {
                    const dates = data.map(r => r.date).filter(Boolean);
                    if (dates.length > 0) {
                        const sortedDates = [...dates].sort((a, b) => new Date(a) - new Date(b));
                        periodText = `${formatDate(sortedDates[0])} 〜 ${formatDate(sortedDates[sortedDates.length - 1])}`;
                    }
                }
            }
            kpiPeriod.innerText = periodText;

            // 一番売れたスタンプの算出
            let bestItem = '--';
            let bestUnits = 0;
            Object.keys(itemUnits).forEach(item => {
                if (itemUnits[item] > bestUnits) {
                    bestUnits = itemUnits[item];
                    bestItem = item;
                }
            });
            kpiBestItem.innerText = bestItem;
            kpiBestItem.title = bestItem;
            kpiBestItemSales.innerText = `${bestUnits.toLocaleString()} 個販売 (¥${(itemSummary[bestItem] || 0).toLocaleString()}相当)`;

            // 2. グラフ描画
            drawDailyTrendChart(data);

            // 3. データテーブル描画
            renderTable(data);
        }

        // 日付を「M月D日」のフレンドリーな形式に変換する
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                if (isNaN(date)) return dateStr;
                return `${date.getMonth() + 1}月${date.getDate()}日`;
            } catch {
                return dateStr;
            }
        }

        // データテーブルの生成
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-6 px-6 text-center text-slate-400">データが見つかりません</td></tr>`;
                return;
            }

            // 日付を降順（新しい順）にして並べる
            const sortedData = [...data].reverse();

            sortedData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/50 transition-colors";
                tr.innerHTML = `
                    <td class="py-3 px-6 font-medium text-slate-900">${formatDate(row.date)}</td>
                    <td class="py-3 px-6 text-slate-700">${row.itemName}</td>
                    <td class="py-3 px-6 text-center text-slate-800 font-semibold">${row.units}</td>
                    <td class="py-3 px-6 text-right text-slate-900 font-bold">¥${row.revenue.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // スタンプごとの売上グラフ（横棒グラフ）の描画
        function drawDailyTrendChart(data) {
            if (dailyChart) {
                dailyChart.destroy();
            }

            // スタンプごとの売上合計を計算
            const itemSummary = {};
            data.forEach(row => {
                itemSummary[row.itemName] = (itemSummary[row.itemName] || 0) + row.revenue;
            });

            // 売上金額の降順にソート
            const sortedItems = Object.keys(itemSummary)
                .map(name => ({ name: name, value: itemSummary[name] }))
                .sort((a, b) => b.value - a.value);

            const labels = sortedItems.map(item => item.name);
            const amounts = sortedItems.map(item => item.value);

            const colors = [
                '#10b981', // エメラルド
                '#3b82f6', // ブルー
                '#f59e0b', // アンバー
                '#ec4899', // ピンク
                '#8b5cf6', // バイオレット
                '#06b6d4', // シアン
                '#f43f5e', // ローズ
                '#64748b'  // スレート
            ];
            
            // 各棒に異なる色を割り当てる
            const barColors = labels.map((_, idx) => colors[idx % colors.length]);

            const ctx = document.getElementById('chart-daily-trend').getContext('2d');
            dailyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '分配金 (円)',
                        data: amounts,
                        backgroundColor: barColors,
                        borderWidth: 0,
                        borderRadius: 6,
                        barThickness: 20
                    }]
                },
                options: {
                    indexAxis: 'y', // 横棒グラフにする
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleFont: { family: 'Noto Sans JP', size: 12 },
                            bodyFont: { family: 'Noto Sans JP', size: 13, weight: 'bold' },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    return ` 分配金: ¥${context.raw.toLocaleString()}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: {
                                color: '#f1f5f9'
                            },
                            ticks: {
                                font: { family: 'Noto Sans JP', size: 11 },
                                callback: function(value) {
                                    return '¥' + value;
                                }
                            }
                        },
                        y: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                font: { family: 'Noto Sans JP', size: 12 },
                                callback: function(value) {
                                    const label = this.getLabelForValue(value);
                                    return label.length > 20 ? label.slice(0, 20) + '...' : label;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>

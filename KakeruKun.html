<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シナリオ書けるくん - TRPG制作特化版</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- テーマ変数 --- */
        :root {
            --bg-body: #f1f5f9;
            --bg-editor: #ffffff;
            --text-main: #0f172a;
            --border-editor: #e2e8f0;
            --text-muted: #64748b;
            --sidebar-bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.9);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-editor: #1e293b;
            --text-main: #f1f5f9;
            --border-editor: #334155;
            --text-muted: #94a3b8;
            --sidebar-bg: #1e293b;
            --header-bg: rgba(15, 23, 42, 0.9);
        }

        [data-theme="sepia"] {
            --bg-body: #f4ecd8;
            --bg-editor: #fdf6e3;
            --text-main: #5b4636;
            --border-editor: #e6dfcf;
            --text-muted: #8c786a;
            --sidebar-bg: #fdf6e3;
            --header-bg: rgba(244, 236, 216, 0.9);
        }

        body { background-color: var(--bg-body); color: var(--text-main); transition: background-color 0.3s, color 0.3s; }
        header { background-color: var(--header-bg) !important; border-color: var(--border-editor) !important; }
        aside { background-color: var(--sidebar-bg) !important; border-color: var(--border-editor) !important; }
        #editor { background-color: var(--bg-editor); border-color: var(--border-editor); color: var(--text-main); }
        .bg-slate-50 { background-color: var(--bg-body) !important; }
        .text-slate-500, .text-slate-400 { color: var(--text-muted) !important; }

        /* エディタエリアの基本スタイル */
        #editor {
            min-height: 80vh;
            outline: none;
            line-height: 1.8;
        }
        #editor:focus {
            border-color: #3b82f6;
        }

        /* 画像の調整 */
        #editor img {
            display: inline-block;
            cursor: pointer;
            transition: outline 0.1s;
            max-width: 100%;
            height: auto;
        }
        #editor img:hover {
            outline: 2px solid #6366f1;
        }

        /* インデント操作用: 標準のblockquoteは使用しないが、念のためスタイルのみ定義 */
        #editor blockquote { margin: 0 0 0 1.5em; padding: 0; border: none; display: block; }

        /* --- エディタ内の見出し・階層デザイン --- */
        #editor h1, #editor h2, #editor h3, #editor h4, #editor h5, #editor h6, #editor p, #editor div {
            transition: margin-left 0.2s ease;
        }

        #editor h1 { font-size: 2rem; font-weight: 800; color: #4f46e5; border-bottom: 3px solid #4f46e5; padding-bottom: 0.5rem; margin-top: 2rem; margin-bottom: 1rem; }
        #editor h2 { font-size: 1.5rem; font-weight: 700; border-left: 6px solid #4f46e5; padding-left: 1rem; margin-top: 1.75rem; margin-bottom: 0.75rem; background-color: rgba(79, 70, 229, 0.05); }
        #editor h3 { font-size: 1.25rem; font-weight: 700; border-bottom: 1px solid var(--border-editor); margin-top: 1.5rem; margin-bottom: 0.5rem; }
        #editor h4 { font-size: 1.125rem; font-weight: 700; margin-top: 1.25rem; }
        #editor h5 { font-size: 1rem; font-weight: 700; }
        #editor h6 { font-size: 0.875rem; font-weight: 700; }

        /* --- テーブルスタイル --- */
        #editor table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
        #editor th, #editor td { border: 1px solid var(--border-editor); padding: 8px; min-width: 50px; }

        /* --- TRPG専用枠スタイル --- */
        .kp-info { background-color: rgba(254, 249, 195, 0.2); border: 1px solid #fde047; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; color: #eab308; }
        [data-theme="standard"] .kp-info { background-color: #fef9c3; color: #854d0e; }

        .quote { background-color: rgba(148, 163, 184, 0.1); border-left: 4px solid #94a3b8; padding: 1rem; margin: 1rem 0; font-style: italic; }
        .color-box { padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; border: 1px solid rgba(0,0,0,0.1); }
        
        .box-summary { background-color: rgba(224, 242, 254, 0.2); border: 2px solid #7dd3fc; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; color: #38bdf8; }
        [data-theme="standard"] .box-summary { background-color: #e0f2fe; color: #0369a1; }

        .box-check { background-color: rgba(240, 253, 244, 0.2); border: 2px solid #86efac; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; color: #4ade80; }
        [data-theme="standard"] .box-check { background-color: #f0fdf4; color: #15803d; }

        .box-spot { background-color: rgba(236, 253, 245, 0.2); border: 2px solid #34d399; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; color: #34d399; }
        .box-listen { background-color: rgba(255, 251, 235, 0.2); border: 2px solid #fbbf24; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; color: #fbbf24; }
        .box-library { background-color: rgba(236, 254, 255, 0.2); border: 2px solid #22d3ee; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; color: #22d3ee; }
        .box-san { background-color: rgba(255, 241, 242, 0.2); border: 2px solid #fb7185; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; color: #fb7185; }
        
        .box-secret { background-color: rgba(250, 245, 255, 0.2); border: 2px dashed #d8b4fe; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; color: #c084fc; }
        .box-gimmick { background-color: rgba(255, 247, 237, 0.2); border: 2px solid #fdba74; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; color: #fb923c; }
        
        .box-special { background-color: rgba(248, 250, 252, 0.05); border: 1px solid var(--border-editor); border-top: 4px solid #6366f1; padding: 1rem; border-radius: 0.25rem; margin: 1rem 0; }
        .box-license { border-top-color: #94a3b8; }
        .box-trend { border-top-color: #10b981; }
        .box-warning { border-top-color: #f59e0b; }
        .box-ho { border-top-color: #6366f1; }
        .box-enemy { border-top-color: #ef4444; }
        .box-credit { border-top-color: #64748b; }

        /* 仕切り線 */
        .divider { border: 0; height: 1px; background-image: linear-gradient(to right, rgba(79, 70, 229, 0), rgba(79, 70, 229, 0.75), rgba(79, 70, 229, 0)); margin: 2rem 0; display: block; width: 100%; }

        /* 折りたたみ */
        details { border: 1px solid var(--border-editor); border-radius: 0.5rem; padding: 0.75rem; margin: 1rem 0; background-color: rgba(148, 163, 184, 0.05); }
        summary { cursor: pointer; font-weight: bold; color: #3b82f6; outline: none; }

        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        .modal-content { background-color: var(--bg-editor); color: var(--text-main); }

        /* テーブルピッカーのグリッドスタイル */
        #table-grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; width: 220px; margin: 10px auto; }
        .grid-square { width: 20px; height: 20px; border: 1px solid var(--border-editor); background-color: var(--bg-editor); cursor: pointer; }
        .grid-square.active { background-color: #c7d2fe; border-color: #818cf8; }

        @media print { .no-print { display: none !important; } .main-content { margin: 0; width: 100%; } #editor { border: none; box-shadow: none; padding: 0; } }
        
        /* 検索バーとツールバーのアニメーション */
        #search-replace-bar, #toolbar-wrapper { transition: all 0.3s ease-in-out; overflow: hidden; }
        #search-replace-bar { max-height: 0; opacity: 0; }
        #search-replace-bar.active { max-height: 100px; opacity: 1; margin-top: 1rem; }
        
        #toolbar-wrapper.collapsed { max-height: 0; opacity: 0; margin-top: 0; pointer-events: none; }
        #toolbar-wrapper:not(.collapsed) { max-height: 500px; opacity: 1; margin-top: 1rem; }
    </style>
</head>
<body data-theme="standard" class="font-sans">

    <!-- モーダル類 -->
    <div id="confirm-modal" class="modal-overlay no-print">
        <div class="modal-content p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold mb-2">新規作成しますか？</h3>
            <p class="text-slate-500 text-sm mb-6">現在の内容は失われます。保存していない場合は「保存」からバックアップを取ってください。</p>
            <div class="flex justify-end gap-3">
                <button onclick="closeModal('confirm-modal')" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm transition">キャンセル</button>
                <button onclick="confirmNewProject()" class="px-4 py-2 bg-red-600 text-white hover:bg-red-700 rounded-lg text-sm font-bold transition">新しく作成</button>
            </div>
        </div>
    </div>

    <div id="save-modal" class="modal-overlay no-print">
        <div class="modal-content p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold mb-2">プロジェクトの保存</h3>
            <p class="text-slate-500 text-sm mb-6" id="save-modal-description">ファイルを保存しますか？</p>
            <div class="flex flex-col gap-2">
                <button id="overwrite-btn" onclick="executeSave(true)" class="hidden w-full px-4 py-3 bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg text-sm font-bold transition shadow-sm">現在開いているファイルに上書き</button>
                <button onclick="executeSave(false)" class="w-full px-4 py-3 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 rounded-lg text-sm font-bold transition shadow-sm">名前をつけて新しく保存</button>
                <button onclick="closeModal('save-modal')" class="w-full px-4 py-2 text-slate-400 hover:text-slate-600 rounded-lg text-xs transition">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- リンク設定モーダル -->
    <div id="link-modal" class="modal-overlay no-print">
        <div class="modal-content p-6 rounded-xl shadow-2xl max-w-md w-full mx-4 flex flex-col max-h-[80vh]">
            <h3 class="text-lg font-bold mb-2">リンクを設定</h3>
            <div class="mb-4">
                <label class="block text-xs font-bold text-slate-400 mb-1">外部URL</label>
                <div class="flex gap-2">
                    <input type="text" id="external-url-input" placeholder="https://..." class="flex-1 bg-slate-50 border border-slate-200 rounded px-2 py-1 text-sm outline-none focus:border-indigo-400 text-slate-900">
                    <button onclick="applyExternalLink()" class="px-3 py-1 bg-indigo-600 text-white rounded text-sm font-bold hover:bg-indigo-700 transition">適用</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto">
                <label class="block text-xs font-bold text-slate-400 mb-1">ドキュメント内の見出しへジャンプ</label>
                <div id="heading-link-list" class="space-y-1">
                    <p class="text-xs text-slate-400 italic">見出しが見つかりません</p>
                </div>
            </div>
            <div class="mt-4 pt-4 border-t border-slate-100 flex justify-end">
                <button onclick="closeModal('link-modal')" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm transition">閉じる</button>
            </div>
        </div>
    </div>

    <!-- テーブル作成モーダル -->
    <div id="table-modal" class="modal-overlay no-print">
        <div class="modal-content p-6 rounded-xl shadow-2xl max-w-xs w-full mx-4 text-center">
            <h3 class="text-lg font-bold mb-1">テーブルを挿入</h3>
            <p id="table-size-display" class="text-indigo-600 font-bold mb-4">1 x 1</p>
            <div id="table-grid-container"></div>
            <p class="text-[10px] text-slate-400 mt-4">クリックして確定（最大 10x10）</p>
            <div class="mt-4 pt-4 border-t border-slate-100 flex justify-center">
                <button onclick="closeModal('table-modal')" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm transition">キャンセル</button>
            </div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <!-- 左サイドバー -->
        <aside class="no-print w-64 bg-white border-r border-slate-200 sticky top-0 h-screen overflow-hidden flex flex-col hidden lg:flex">
            <div class="p-4 border-bottom bg-slate-50">
                <h2 class="font-bold text-slate-700 flex items-center gap-2"><span>📋 目次</span><span id="toc-count" class="text-[10px] bg-slate-200 px-1.5 py-0.5 rounded-full text-slate-500">0</span></h2>
            </div>
            <nav id="toc-container" class="flex-1 overflow-y-auto py-4 text-sm"><p class="p-4 text-slate-400 italic">見出しなし</p></nav>
            <div class="p-4 border-t border-slate-100 bg-slate-50 space-y-2">
                <button onclick="openModal('confirm-modal')" class="w-full py-2 bg-white border border-slate-200 rounded text-xs hover:bg-slate-100 transition font-medium">➕ 新規作成</button>
                <button onclick="saveProject()" class="w-full py-2 bg-indigo-50 border border-indigo-100 rounded text-xs text-indigo-600 hover:bg-indigo-100 transition font-medium">💾 プロジェクト保存</button>
                <button onclick="document.getElementById('project-load-sidebar').click()" class="w-full py-2 bg-white border border-slate-200 rounded text-xs hover:bg-slate-100 transition font-medium">📂 ファイル読み込み</button>
                <input type="file" id="project-load-sidebar" class="hidden" accept=".weby" onchange="loadProject(this)">
                
                <!-- クレジット -->
                <div class="pt-2 text-[9px] text-slate-300 text-center font-mono opacity-50 hover:opacity-100 transition">
                    Powered by 異次元ポケット
                </div>
            </div>
        </aside>

        <!-- メイン -->
        <div class="flex-1 flex flex-col main-content">
            <header class="no-print border-b p-4 sticky top-0 z-30">
                <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                    <div class="flex flex-col flex-1">
                        <h1 class="text-xl font-extrabold text-indigo-700 leading-none mb-1">シナリオ書けるくん</h1>
                        <div class="flex items-center gap-2 w-full max-w-sm">
                            <input type="text" id="scenario-title" placeholder="シナリオタイトルを入力..." class="bg-transparent border-b border-transparent hover:border-slate-200 focus:border-indigo-400 outline-none text-sm font-bold text-slate-700 transition-all flex-1" oninput="autoSave()">
                            <button onclick="toggleToolbar()" class="text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-500 px-2 py-1 rounded transition whitespace-nowrap" title="ツールバーの表示/非表示">🛠️ ツールバー切替</button>
                        </div>
                        <!-- 現在のセクション表示 -->
                        <div id="current-section-display" class="text-[10px] text-slate-400 font-medium mt-1">執筆中: <span>本文</span></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <!-- テーマ切替 -->
                        <div class="flex bg-slate-100 rounded-lg p-1 mr-2 no-print border border-slate-200">
                            <button onclick="setTheme('standard')" class="p-2 hover:bg-white rounded transition text-slate-600" title="標準モード">☀️</button>
                            <button onclick="setTheme('dark')" class="p-2 hover:bg-white rounded transition text-slate-600" title="ダークモード">🌙</button>
                            <button onclick="setTheme('sepia')" class="p-2 hover:bg-white rounded transition text-slate-600" title="目に優しいモード">👁️</button>
                        </div>

                        <!-- ヘッダークイックアクション -->
                        <div class="flex bg-slate-100 rounded-lg p-1 mr-2 no-print border border-slate-200">
                            <button onclick="openModal('confirm-modal')" class="p-2 hover:bg-white rounded transition text-slate-600" title="新規作成">➕</button>
                            <button onclick="saveProject()" class="p-2 hover:bg-white rounded transition text-indigo-600" title="保存">💾</button>
                            <button onclick="document.getElementById('project-load-header').click()" class="p-2 hover:bg-white rounded transition text-slate-600" title="読み込み">📂</button>
                            <input type="file" id="project-load-header" class="hidden" accept=".weby" onchange="loadProject(this)">
                        </div>
                        <div class="h-8 w-px bg-slate-200 mx-1 no-print"></div>
                        <button onclick="exportHTML()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2 px-3 rounded shadow transition">HTML出力</button>
                        <button onclick="exportWord()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2 px-3 rounded shadow transition flex items-center gap-1">📄 Word出力</button>
                    </div>
                </div>

                <!-- ツールバーラッパー -->
                <div id="toolbar-wrapper" class="max-w-5xl mx-auto">
                    <!-- ツールバー -->
                    <div class="p-2 bg-slate-50 border border-slate-200 rounded-lg flex flex-wrap gap-2 items-center">
                        <select id="heading-selector" onchange="handleHeadingChange(this.value); this.selectedIndex=0;" class="bg-white border border-slate-200 rounded px-2 py-1 text-xs outline-none text-slate-900">
                            <option value="">見出し...</option>
                            <option value="H1">見出し1</option><option value="H2">見出し2</option><option value="H3">見出し3</option><option value="H4">見出し4</option><option value="H5">見出し5</option><option value="H6">見出し6</option><option value="div_h7">見出し7</option><option value="div_h8">見出し8</option><option value="P">本文</option>
                        </select>

                        <div class="flex items-center gap-1 bg-white border border-slate-200 rounded px-1">
                            <input type="color" id="text-color-picker" oninput="execCommandWithParam('foreColor', this.value)" class="w-6 h-6 border-none cursor-pointer bg-transparent" title="文字色">
                            <input type="color" id="bg-color-picker" value="#f1f5f9" class="w-6 h-6 border-none cursor-pointer bg-transparent" title="枠・表のヘッダー色">
                        </div>
                        
                        <div class="flex bg-white border border-slate-200 rounded p-0.5 gap-0.5">
                            <button onclick="execCommand('justifyLeft')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs text-slate-600">⬅️</button>
                            <button onclick="execCommand('justifyCenter')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs text-slate-600">↔️</button>
                            <button onclick="execCommand('justifyRight')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs text-slate-600">➡️</button>
                            <div class="w-px h-4 bg-slate-200 self-center mx-0.5"></div>
                            <button onclick="manualIndent(false)" class="w-6 h-6 hover:bg-slate-100 rounded text-xs text-slate-600" title="左へ戻す (Shift+Tab)">⇤</button>
                            <button onclick="manualIndent(true)" class="w-6 h-6 hover:bg-slate-100 rounded text-xs text-slate-600" title="右へスライド (Tab)">⇥</button>
                        </div>

                        <div class="flex bg-white border border-slate-200 rounded p-0.5 gap-0.5">
                            <button onclick="execCommand('undo')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs text-slate-600" title="元に戻す (Ctrl+Z)">↩️</button>
                            <button onclick="execCommand('redo')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs text-slate-600" title="やり直し (Ctrl+Y)">↪️</button>
                            <div class="w-px h-4 bg-slate-200 self-center mx-0.5"></div>
                            <button onclick="execCommand('bold')" class="w-6 h-6 hover:bg-slate-100 rounded font-bold text-xs text-slate-600">B</button>
                            <button onclick="insertLink()" class="w-6 h-6 hover:bg-slate-100 rounded text-xs text-slate-600" title="リンク設定">🔗</button>
                            <button onclick="document.getElementById('image-upload').click()" class="w-6 h-6 hover:bg-slate-100 rounded text-xs text-slate-600">🖼️</button>
                        </div>

                        <div class="h-4 w-px bg-slate-300"></div>

                        <!-- TRPG用枠ボタン群 -->
                        <div class="flex flex-wrap gap-1">
                            <button onclick="insertDivider()" class="px-2 h-7 border rounded bg-white hover:bg-slate-100 text-[10px] text-slate-600" title="仕切り線">線 —</button>
                            <button onclick="insertTRPGBox('summary')" class="px-2 h-7 border border-blue-200 bg-blue-50 hover:bg-blue-100 rounded text-[10px] text-blue-700 font-bold">📄 概要</button>
                            <button onclick="insertTRPGBox('check')" class="px-2 h-7 border border-green-200 bg-green-50 hover:bg-green-100 rounded text-[10px] text-green-700 font-bold">🎲 判定</button>
                            
                            <button onclick="insertTRPGBox('spot')" class="px-2 h-7 border border-emerald-300 bg-emerald-50 hover:bg-emerald-100 rounded text-[10px] text-emerald-800 font-bold">👀 目星</button>
                            <button onclick="insertTRPGBox('listen')" class="px-2 h-7 border border-amber-300 bg-amber-50 hover:bg-amber-100 rounded text-[10px] text-amber-800 font-bold">👂 聞き耳</button>
                            <button onclick="insertTRPGBox('library')" class="px-2 h-7 border border-cyan-300 bg-cyan-50 hover:bg-cyan-100 rounded text-[10px] text-cyan-800 font-bold">📚 図書館</button>
                            <button onclick="insertTRPGBox('san')" class="px-2 h-7 border border-rose-300 bg-rose-50 hover:bg-rose-100 rounded text-[10px] text-rose-800 font-bold">🌀 正気度</button>
                            <button onclick="insertTRPGBox('search')" class="px-2 h-7 border border-emerald-300 bg-emerald-50 hover:bg-emerald-100 rounded text-[10px] text-emerald-800 font-bold">🔎 探索箇所</button>

                            <button onclick="insertTRPGBox('secret')" class="px-2 h-7 border border-purple-200 bg-purple-50 hover:bg-purple-100 rounded text-[10px] text-purple-700 font-bold">🤫 秘匿</button>
                            <button onclick="insertTRPGBox('gimmick')" class="px-2 h-7 border border-orange-200 bg-orange-50 hover:bg-orange-100 rounded text-[10px] text-orange-700 font-bold">⚙️ ギミック</button>
                            <button onclick="insertKPInfo()" class="px-2 h-7 border border-yellow-200 bg-yellow-50 hover:bg-yellow-100 rounded text-[10px] text-yellow-800 font-bold">📝 KP</button>
                            <button onclick="insertQuote()" class="px-2 h-7 border border-slate-200 bg-slate-50 hover:bg-slate-100 rounded text-[10px] text-slate-700 font-bold">💬 引用</button>
                            <button onclick="insertColorBox()" class="px-2 h-7 border border-indigo-200 bg-indigo-50 hover:bg-indigo-100 rounded text-[10px] text-indigo-700 font-bold">🎨 枠</button>
                            <button onclick="insertDetails()" class="px-2 h-7 border rounded bg-white hover:bg-slate-100 text-[10px] text-slate-600">▼ 畳む</button>
                            <button onclick="openTableModal()" class="px-2 h-7 border border-slate-300 bg-white hover:bg-slate-100 rounded text-[10px] font-bold text-slate-700">📊 表</button>
                        </div>

                        <div class="h-4 w-px bg-slate-300"></div>

                        <!-- 特別枠ボタン群 -->
                        <div class="flex flex-wrap gap-1">
                            <button onclick="insertSpecialBox('許諾')" class="px-2 h-7 border border-slate-300 bg-slate-50 hover:bg-slate-100 rounded text-[10px] text-slate-700 font-bold">⚖️ 許諾</button>
                            <button onclick="insertSpecialBox('シナリオ傾向')" class="px-2 h-7 border border-emerald-300 bg-emerald-50 hover:bg-emerald-100 rounded text-[10px] text-emerald-700 font-bold">📊 傾向</button>
                            <button onclick="insertSpecialBox('諸注意')" class="px-2 h-7 border border-amber-300 bg-amber-50 hover:bg-amber-100 rounded text-[10px] text-amber-700 font-bold">⚠️ 諸注意</button>
                            <button onclick="insertSpecialBox('HO')" class="px-2 h-7 border border-indigo-300 bg-indigo-50 hover:bg-indigo-100 rounded text-[10px] text-indigo-700 font-bold">🆔 HO</button>
                            <button onclick="insertSpecialBox('エネミー')" class="px-2 h-7 border border-rose-300 bg-rose-50 hover:bg-rose-100 rounded text-[10px] text-rose-700 font-bold">💀 エネミー</button>
                            <button onclick="insertSpecialBox('クレジット')" class="px-2 h-7 border border-slate-300 bg-slate-50 hover:bg-slate-100 rounded text-[10px] text-slate-600 font-bold">✒️ クレジット</button>
                        </div>

                        <button onclick="toggleSearchReplace()" class="w-7 h-7 flex items-center justify-center border rounded bg-white hover:bg-slate-100 text-xs text-slate-600">🔍</button>
                        <input type="file" id="image-upload" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
                    </div>

                    <!-- 検索バー -->
                    <div id="search-replace-bar" class="bg-white border border-slate-200 rounded-lg shadow-sm p-3 flex flex-wrap items-center gap-3 no-print">
                        <input type="text" id="search-input" placeholder="検索..." class="flex-1 bg-slate-50 border border-slate-200 rounded px-2 py-1 text-sm outline-none text-slate-900">
                        <input type="text" id="replace-input" placeholder="置換..." class="flex-1 bg-slate-50 border border-slate-200 rounded px-2 py-1 text-sm outline-none text-slate-900">
                        <div class="flex gap-1">
                            <button onclick="findNext()" class="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-xs font-medium text-slate-600">次へ</button>
                            <button onclick="replaceNext()" class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded text-xs font-bold">置換</button>
                            <button onclick="replaceAll()" class="px-2 py-1 bg-emerald-50 text-emerald-600 rounded text-xs font-bold">すべて置換</button>
                        </div>
                    </div>
                </div>
            </header>

            <main class="p-4 sm:p-10 flex-1 flex flex-col items-center overflow-y-auto">
                <div id="editor" contenteditable="true" class="w-full max-w-5xl border rounded-xl p-10 sm:p-20 shadow-xl" placeholder="本文を入力..."><p><br></p></div>
                <div class="w-full max-w-5xl mt-4 no-print flex justify-between text-xs text-slate-400 font-mono"><span id="char-count">文字数: 0</span><span id="save-status">自動保存済み</span></div>
            </main>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const tocContainer = document.getElementById('toc-container');
        const tocCount = document.getElementById('toc-count');
        const charCountDisplay = document.getElementById('char-count');
        const saveStatus = document.getElementById('save-status');
        const titleInput = document.getElementById('scenario-title');
        let currentFileHandle = null;
        let savedSelectionRange = null;

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        /* --- テーマ設定 --- */
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('weby_theme', theme);
        }

        /* --- 折り畳み機能 --- */
        function toggleToolbar() {
            const wrapper = document.getElementById('toolbar-wrapper');
            wrapper.classList.toggle('collapsed');
            const isCollapsed = wrapper.classList.contains('collapsed');
            localStorage.setItem('weby_toolbar_collapsed', isCollapsed);
        }

        /* --- 新規作成 --- */
        function confirmNewProject() {
            editor.innerHTML = '<p><br></p>';
            titleInput.value = '';
            currentFileHandle = null;
            updateTOC(); 
            updateCharCount();
            closeModal('confirm-modal');
            localStorage.removeItem('weby_autosave');
            localStorage.removeItem('weby_autosave_title');
            saveStatus.textContent = "新規プロジェクトを作成しました";
            editor.focus();
        }

        /* --- 保存処理 --- */
        function saveProject() {
            const overwriteBtn = document.getElementById('overwrite-btn');
            const desc = document.getElementById('save-modal-description');
            const canOverwrite = !!window.showSaveFilePicker;

            if (!currentFileHandle || !canOverwrite) {
                overwriteBtn.classList.add('hidden');
                desc.textContent = "プロジェクトをファイル（.weby）として保存しますか？";
            } else {
                overwriteBtn.classList.remove('hidden');
                desc.textContent = `現在開いているファイル「${currentFileHandle.name}」に上書き保存しますか？`;
            }
            openModal('save-modal');
        }

        async function executeSave(isOverwrite) {
            closeModal('save-modal');
            const title = titleInput.value.trim() || '名称未設定シナリオ';
            const data = { 
                title: title,
                content: editor.innerHTML, 
                timestamp: new Date().toISOString(), 
                version: "2.3" 
            };
            const jsonStr = JSON.stringify(data, null, 2);

            if (window.showSaveFilePicker) {
                try {
                    if (!isOverwrite || !currentFileHandle) {
                        currentFileHandle = await window.showSaveFilePicker({
                            suggestedName: `${title}.weby`,
                            types: [{ description: 'シナリオ書けるくんプロジェクト', accept: { 'application/json': ['.weby'] } }]
                        });
                    }
                    const writable = await currentFileHandle.createWritable();
                    await writable.write(jsonStr);
                    await writable.close();
                    saveStatus.textContent = `保存完了: ${currentFileHandle.name}`;
                } catch (err) {
                    if (err.name !== 'AbortError') fallbackDownload(jsonStr, `${title}.weby`);
                }
            } else {
                fallbackDownload(jsonStr, `${title}.weby`);
            }
        }

        function fallbackDownload(content, filename) {
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            saveStatus.textContent = "ファイルをダウンロードしました";
        }

        /* --- 読み込み処理 --- */
        function loadProject(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    let result = e.target.result;
                    try {
                        const data = JSON.parse(result);
                        if (data.content !== undefined) {
                            editor.innerHTML = data.content;
                            titleInput.value = data.title || '';
                            currentFileHandle = null; 
                            updateTOC(); 
                            updateCharCount(); 
                            saveStatus.textContent = "読み込み完了: " + input.files[0].name;
                            autoSave();
                        }
                    } catch (err) {
                        console.error("JSON Parse Error:", err);
                        alert("読み込みに失敗しました。正しいプロジェクトファイルではありません。");
                    }
                    input.value = '';
                };
                reader.readAsText(input.files[0]);
            }
        }

        /* --- エディタ機能 --- */
        function getSelectedHTML() {
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                const fragment = range.cloneContents();
                const div = document.createElement('div');
                div.appendChild(fragment);
                return div.innerHTML;
            }
            return "";
        }

        function saveSelection() {
            const sel = window.getSelection();
            if (sel.getRangeAt && sel.rangeCount) {
                savedSelectionRange = sel.getRangeAt(0);
            }
        }

        function restoreSelection() {
            if (savedSelectionRange) {
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(savedSelectionRange);
            }
        }

        function insertTRPGBox(type) {
            const html = getSelectedHTML();
            let className = "", label = "", defaultContent = "";
            const checkTemplate = "成功：<br>失敗：";

            switch(type) {
                case 'summary': className = "box-summary"; label = "概要"; defaultContent = html || "内容。"; break;
                case 'check': className = "box-check"; label = "判定：＜＞"; defaultContent = html || checkTemplate; break;
                case 'spot': className = "box-spot"; label = "判定：＜目星＞"; defaultContent = html || checkTemplate; break;
                case 'listen': className = "box-listen"; label = "判定：＜聞き耳＞"; defaultContent = html || checkTemplate; break;
                case 'library': className = "box-library"; label = "判定：＜図書館＞"; defaultContent = html || checkTemplate; break;
                case 'san': className = "box-san"; label = "正気度チェック"; defaultContent = html || "正気度喪失：()"; break;
                case 'search': className = "box-spot"; label = "探索箇所：　"; defaultContent = html || "詳細。"; break;
                case 'secret': className = "box-secret"; label = "秘匿描写"; defaultContent = html || "内容。"; break;
                case 'gimmick': className = "box-gimmick"; label = "ギミック"; defaultContent = html || "内容。"; break;
            }
            const wrapper = `<div class="${className}"><strong>【${label}】</strong><div class="mt-1">${defaultContent}</div></div><p><br></p>`;
            document.execCommand('insertHTML', false, wrapper);
            editor.focus();
            updateTOC();
        }

        function insertSpecialBox(label) {
            if (!label) return;
            let content = getSelectedHTML();
            let subClass = "";
            if (label === '許諾') {
                content = `二次創作ガイドライン等に基づく権利表記。`;
                subClass = "box-license";
            } else {
                content = content || "詳細。";
                if (label === 'シナリオ傾向') subClass = "box-trend";
                else if (label === '諸注意') subClass = "box-warning";
                else if (label === 'HO') subClass = "box-ho";
                else if (label === 'エネミー') subClass = "box-enemy";
                else if (label === 'クレジット') subClass = "box-credit";
            }
            const wrapper = `<div class="box-special ${subClass}"><strong>■ ${label}</strong><div class="mt-2 text-sm">${content}</div></div><p><br></p>`;
            document.execCommand('insertHTML', false, wrapper);
            editor.focus();
            updateTOC();
        }

        /* --- 視覚的テーブル作成機能 --- */
        function openTableModal() {
            saveSelection();
            const container = document.getElementById('table-grid-container');
            container.innerHTML = '';
            for (let r = 1; r <= 10; r++) {
                for (let c = 1; c <= 10; c++) {
                    const square = document.createElement('div');
                    square.className = 'grid-square';
                    square.dataset.row = r;
                    square.dataset.col = c;
                    square.onmouseover = () => updateTableGridHighlight(r, c);
                    square.onclick = () => insertTableWithDimensions(r, c);
                    container.appendChild(square);
                }
            }
            updateTableGridHighlight(1, 1);
            openModal('table-modal');
        }

        function updateTableGridHighlight(rows, cols) {
            const display = document.getElementById('table-size-display');
            display.textContent = `${cols} x ${rows}`;
            const squares = document.querySelectorAll('.grid-square');
            squares.forEach(sq => {
                const r = parseInt(sq.dataset.row);
                const c = parseInt(sq.dataset.col);
                if (r <= rows && c <= cols) sq.classList.add('active');
                else sq.classList.remove('active');
            });
        }

        function insertTableWithDimensions(rows, cols) {
            const headerColor = document.getElementById('bg-color-picker').value;
            let tableHtml = `<table style="width: 100%; margin: 1rem 0;"><thead><tr>`;
            for (let j = 0; j < cols; j++) {
                tableHtml += `<th style="background-color: ${headerColor}; color: white; padding: 10px;">ヘッダー</th>`;
            }
            tableHtml += `</tr></thead><tbody>`;
            for (let i = 0; i < rows; i++) {
                tableHtml += `<tr>`;
                for (let j = 0; j < cols; j++) {
                    tableHtml += `<td style="padding: 10px;">データ</td>`;
                }
                tableHtml += `</tr>`;
            }
            tableHtml += `</tbody></table><p><br></p>`;
            closeModal('table-modal');
            restoreSelection();
            editor.focus();
            document.execCommand('insertHTML', false, tableHtml);
            updateCharCount();
            autoSave();
        }

        /* --- リンク設定機能 --- */
        function insertLink() { saveSelection(); populateLinkModal(); openModal('link-modal'); }
        function populateLinkModal() {
            const list = document.getElementById('heading-link-list');
            list.innerHTML = '';
            const headers = Array.from(editor.querySelectorAll('h1, h2, h3, h4, h5, h6'));
            headers.forEach((h, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-2 hover:bg-slate-100 rounded text-xs truncate border-l-2 border-indigo-400 mb-1";
                btn.textContent = h.textContent || '見出し';
                btn.onclick = () => applyInternalLink(h.id);
                list.appendChild(btn);
            });
        }
        function applyInternalLink(id) {
            restoreSelection();
            if (id) document.execCommand('createLink', false, `#${id}`);
            closeModal('link-modal');
            autoSave();
        }
        function applyExternalLink() {
            const url = document.getElementById('external-url-input').value;
            restoreSelection();
            if (url) document.execCommand('createLink', false, url);
            closeModal('link-modal');
            autoSave();
        }

        function insertDivider() { document.execCommand('insertHTML', false, '<div class="divider"></div><p><br></p>'); }
        function insertKPInfo() { const c = getSelectedHTML() || "KP情報。"; document.execCommand('insertHTML', false, `<div class="kp-info"><strong>KP情報:</strong> ${c}</div><p><br></p>`); }
        function insertQuote() { const c = getSelectedHTML() || "引用。"; document.execCommand('insertHTML', false, `<div class="quote">${c}</div><p><br></p>`); }
        function insertColorBox() {
            const c = getSelectedHTML() || "内容。";
            const col = document.getElementById('bg-color-picker').value;
            document.execCommand('insertHTML', false, `<div class="color-box" style="background-color: ${col};">${c}</div><p><br></p>`);
        }
        function insertDetails() {
            const t = prompt("タイトル:", "クリックして表示");
            if (t) document.execCommand('insertHTML', false, `<details><summary>${t}</summary><div class="pt-2">詳細内容。</div></details><p><br></p>`);
        }

        /* --- 独自インデント処理 (タグを壊さない方式) --- */
        function manualIndent(isIndent) {
            editor.focus();
            const selection = window.getSelection();
            if (selection.rangeCount === 0) return;

            const range = selection.getRangeAt(0);
            let container = range.commonAncestorContainer;
            if (container.nodeType === 3) container = container.parentNode;

            // カーソル位置の直近の「ブロック要素」を探す（枠、見出し、段落）
            const blockTags = ['P', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'TABLE', 'DIV', 'DETAILS', 'BLOCKQUOTE'];
            let target = container;
            while (target && target !== editor) {
                if (blockTags.includes(target.tagName) || target.classList.contains('divider')) {
                    break;
                }
                target = target.parentNode;
            }

            if (!target || target === editor) {
                // ブロックが見つからない場合、選択範囲をPで囲んでから処理
                document.execCommand('formatBlock', false, 'p');
                manualIndent(isIndent); // 再帰実行
                return;
            }

            // margin-leftを直接操作
            let currentMargin = parseFloat(target.style.marginLeft) || 0;
            const step = 2; // em単位
            if (isIndent) {
                target.style.marginLeft = (currentMargin + step) + 'em';
            } else {
                target.style.marginLeft = Math.max(0, currentMargin - step) + 'em';
            }

            autoSave();
            updateTOC();
        }

        /* --- 基礎機能 --- */
        function execCommand(cmd) { 
            editor.focus(); 
            // インデントコマンドは独自処理に飛ばす
            if (cmd === 'indent') return manualIndent(true);
            if (cmd === 'outdent') return manualIndent(false);
            
            document.execCommand(cmd, false, null); 
            updateTOC(); 
        }

        function execCommandWithParam(cmd, param) { editor.focus(); document.execCommand(cmd, false, param); updateTOC(); }
        function handleHeadingChange(val) {
            if (val.startsWith('div_')) applyCustomBlock(val.replace('div_', ''));
            else document.execCommand('formatBlock', false, val);
            editor.focus(); updateTOC();
        }
        function applyCustomBlock(cls) {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const div = document.createElement('div');
                div.className = cls; div.innerHTML = range.toString() || "見出し";
                range.deleteContents(); range.insertNode(div); div.after(document.createElement('br'));
            }
        }
        function handleImageUpload(input) {
            if (input.files?.[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const imgHtml = `<p style="text-align: center;"><img src="${e.target.result}" style="max-width: 100%; height: auto; border-radius: 0.5rem;"></p><p><br></p>`;
                    document.execCommand('insertHTML', false, imgHtml);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateCharCount() { charCountDisplay.textContent = `文字数: ${(editor.innerText || "").length}`; }
        function autoSave() { 
            try {
                localStorage.setItem('weby_autosave', editor.innerHTML); 
                localStorage.setItem('weby_autosave_title', titleInput.value);
                saveStatus.textContent = "自動保存済み";
                saveStatus.classList.remove('text-red-500');
            } catch (e) {
                saveStatus.textContent = "⚠️ 保存エラー（容量制限）";
                saveStatus.classList.add('text-red-500');
            }
        }

        function updateTOC() {
            const hs = Array.from(editor.querySelectorAll('h1, h2, h3, h4, h5, h6'));
            tocContainer.innerHTML = hs.length ? '' : '<p class="p-4 text-slate-400 italic">見出しなし</p>';
            tocCount.textContent = hs.length;
            hs.forEach((h, i) => {
                const id = `h-${i}`; h.id = id;
                const link = document.createElement('a'); link.href = `#${id}`; link.textContent = h.textContent || '見出し';
                link.className = 'block py-2 px-4 hover:bg-slate-50 truncate border-r-4 border-transparent';
                let lv = parseInt(h.tagName[1]) - 1;
                link.style.paddingLeft = `${lv + 1}em`;
                link.onclick = (e) => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth' }); };
                tocContainer.appendChild(link);
            });
        }

        function toggleSearchReplace() { document.getElementById('search-replace-bar').classList.toggle('active'); }
        function findNext() { const s = document.getElementById('search-input').value; if (s) window.find(s, false, false, true); }
        function replaceNext() {
            const s = document.getElementById('search-input').value, r = document.getElementById('replace-input').value;
            if (s && window.getSelection().toString() === s) { document.execCommand('insertHTML', false, r); findNext(); } else findNext();
        }
        function replaceAll() {
            const s = document.getElementById('search-input').value, r = document.getElementById('replace-input').value;
            if (s) { editor.innerHTML = editor.innerHTML.replace(new RegExp(s, 'g'), r); updateTOC(); updateCharCount(); }
        }

        function exportWord() {
            const content = editor.innerHTML;
            const title = titleInput.value.trim() || 'シナリオ';
            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob); 
            const link = document.createElement('a'); link.href = url; link.download = `${title}.doc`; link.click();
        }

        function exportHTML() {
            const content = editor.innerHTML;
            const title = titleInput.value.trim() || 'シナリオ';
            const blob = new Blob([content], { type: 'text/html' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${title}.html`; a.click();
        }

        function throttle(fn, wait) { let time = Date.now(); return () => { if ((time + wait - Date.now()) < 0) { fn(); time = Date.now(); } } }
        
        window.onload = () => {
            document.execCommand('styleWithCSS', false, true);
            document.execCommand('defaultParagraphSeparator', false, 'p');
            const savedContent = localStorage.getItem('weby_autosave'); 
            const savedTitle = localStorage.getItem('weby_autosave_title');
            if (savedContent) editor.innerHTML = savedContent;
            if (savedTitle) titleInput.value = savedTitle;
            const theme = localStorage.getItem('weby_theme') || 'standard';
            setTheme(theme);
            
            // Tabキーイベントの制御
            editor.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    manualIndent(!e.shiftKey);
                }
            });

            updateTOC(); 
            updateCharCount();
        };

        editor.oninput = throttle(() => { updateCharCount(); updateTOC(); autoSave(); }, 1000);
    </script>
</body>
</html>

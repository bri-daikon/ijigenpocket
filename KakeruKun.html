<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シナリオ書けるくん - TRPG制作特化版</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/kakerukun.css">
</head>
<body data-theme="standard">

    <!-- 通知 -->
    <div id="toast">保存しました</div>

    <!-- モーダル類 -->
    <div id="confirm-modal" class="modal-overlay no-print text-slate-900">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold mb-2">新規作成しますか？</h3>
            <p class="text-slate-500 text-sm mb-6">保存していない現在の内容は失われます。</p>
            <div class="flex justify-end gap-3">
                <button onclick="closeModal('confirm-modal')" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm transition">キャンセル</button>
                <button onclick="confirmNewProject()" class="px-4 py-2 bg-red-600 text-white hover:bg-red-700 rounded-lg text-sm font-bold transition">新しく作成</button>
            </div>
        </div>
    </div>

    <div id="link-modal" class="modal-overlay no-print text-slate-900">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-md w-full mx-4 flex flex-col max-h-[80vh]">
            <h3 class="text-lg font-bold mb-2">リンクを設定</h3>
            <div class="mb-4">
                <label class="block text-xs font-bold text-slate-400 mb-1">外部URL</label>
                <div class="flex gap-2">
                    <input type="text" id="external-url-input" placeholder="https://..." class="flex-1 bg-slate-50 border border-slate-200 rounded px-2 py-1 text-sm outline-none focus:border-indigo-400">
                    <button onclick="applyExternalLink()" class="px-3 py-1 bg-indigo-600 text-white rounded text-sm font-bold hover:bg-indigo-700 transition">適用</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto">
                <label class="block text-xs font-bold text-slate-400 mb-1">ドキュメント内の見出しへジャンプ</label>
                <div id="heading-link-list" class="space-y-1"></div>
            </div>
            <div class="mt-4 pt-4 border-t border-slate-100 flex justify-end">
                <button onclick="closeModal('link-modal')" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm transition">閉じる</button>
            </div>
        </div>
    </div>

    <div id="table-modal" class="modal-overlay no-print text-slate-900">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-xs w-full mx-4 text-center">
            <h3 class="text-lg font-bold mb-1">テーブルを挿入</h3>
            <p id="table-size-display" class="text-indigo-600 font-bold mb-4">1 x 1</p>
            <div id="table-grid-container"></div>
            <div class="mt-4 pt-4 border-t border-slate-100 flex justify-center">
                <button onclick="closeModal('table-modal')" class="px-4 py-2 text-slate-500 text-sm transition">キャンセル</button>
            </div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="no-print w-64 bg-white border-r border-slate-200 sticky top-0 h-screen overflow-hidden flex flex-col hidden lg:flex">
            <div class="p-4 border-bottom bg-slate-50 font-bold text-slate-700">📋 目次</div>
            <nav id="toc-container" class="flex-1 overflow-y-auto py-4 text-sm"></nav>
            <div class="p-4 border-t border-slate-100 bg-slate-50 space-y-2 text-slate-900">
                <button onclick="openModal('confirm-modal')" class="w-full py-2 bg-white border border-slate-200 rounded text-xs hover:bg-slate-100 transition font-medium">➕ 新規作成</button>
                <button onclick="executeDirectSave()" class="w-full py-2 bg-indigo-50 border border-indigo-100 rounded text-xs text-indigo-600 hover:bg-indigo-100 transition font-medium">💾 保存 (.weby)</button>
                <button onclick="loadProjectWithPicker()" class="w-full py-2 bg-white border border-slate-200 rounded text-xs hover:bg-slate-100 transition font-medium">📂 読み込み</button>
                <div class="pt-2 text-[9px] text-slate-300 text-center font-mono opacity-50">Powered by 異次元ポケット</div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col">
            <header class="no-print border-b p-4 sticky top-0 z-30 bg-white shadow-sm">
                <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                    <div class="flex flex-col flex-1">
                        <h1 class="text-xl font-extrabold text-indigo-700 mb-1">シナリオ書けるくん</h1>
                        <div class="flex items-center gap-2 w-full max-w-sm">
                            <input type="text" id="scenario-title" placeholder="シナリオタイトル..." class="bg-transparent border-b border-transparent hover:border-slate-200 focus:border-indigo-400 outline-none text-sm font-bold text-slate-700 transition-all flex-1">
                            <button onclick="toggleToolbar()" class="text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-500 px-2 py-1 rounded transition">🛠️ 切替</button>
                        </div>
                        <div id="current-section-display" class="text-[10px] text-slate-400 font-medium mt-1">執筆中: <span>本文</span></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="flex bg-slate-100 rounded-lg p-1 mr-2 border border-slate-200 gap-1 text-slate-900">
                            <button onclick="openModal('confirm-modal')" class="p-2 hover:bg-white rounded transition text-slate-600 text-xs" title="新規">➕</button>
                            <button onclick="executeDirectSave()" class="p-2 hover:bg-white rounded transition text-indigo-600 text-xs" title="保存">💾</button>
                            <button onclick="loadProjectWithPicker()" class="p-2 hover:bg-white rounded transition text-slate-600 text-xs" title="読込">📂</button>
                        </div>
                        <div class="flex bg-slate-100 rounded-lg p-1 mr-2 border border-slate-200 text-slate-900">
                            <button onclick="setTheme('standard')" class="p-2 hover:bg-white rounded transition" title="標準">☀️</button>
                            <button onclick="setTheme('dark')" class="p-2 hover:bg-white rounded transition" title="ダーク">🌙</button>
                            <button onclick="setTheme('sepia')" class="p-2 hover:bg-white rounded transition" title="セピア">👁️</button>
                        </div>

                        <div class="flex items-center gap-1 bg-slate-100 rounded-lg p-1 border border-slate-200">
                            <select id="export-layout-select" class="bg-white border-none rounded px-2 py-1 text-[10px] font-bold outline-none text-slate-600">
                                <option value="1">1段組</option>
                                <option value="2">2段組</option>
                            </select>
                            <button onclick="exportHTML()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-bold py-1 px-3 rounded shadow transition">HTML</button>
                        </div>
                        <button onclick="exportWord()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2 px-3 rounded shadow transition">Word</button>
                    </div>
                </div>

                <div id="toolbar-wrapper" class="max-w-6xl mx-auto mt-3">
                    <div class="p-2 bg-slate-50 border border-slate-200 rounded-lg flex flex-wrap gap-2 items-center text-slate-900">
                        <div class="flex items-center gap-1">
                            <select id="heading-selector" onchange="handleHeadingChange(this.value); this.selectedIndex=0;" class="bg-white border border-slate-200 rounded px-2 py-1 text-xs outline-none">
                                <option value="">見出し選択...</option>
                                <option value="H1">見出し1</option><option value="H2">見出し2</option>
                                <option value="H3">見出し3</option><option value="H4">見出し4</option>
                                <option value="H5">見出し5</option><option value="H6">見出し6</option>
                                <option value="div_h7">見出し7</option><option value="div_h8">見出し8</option>
                                <option value="P">本文</option>
                            </select>
                            <button onclick="handleHeadingChange('P')" class="px-2 py-1 bg-indigo-600 text-white rounded text-[10px] font-bold hover:bg-indigo-700 shadow-sm transition" title="標準テキストに戻す">本文</button>
                            <!-- 文字サイズ調整ボタン -->
                            <div class="flex items-center gap-1 bg-white border border-slate-200 rounded px-1 ml-1">
                                <span class="text-[9px] font-bold text-slate-400 px-1">選択サイズ</span>
                                <button onclick="changeSelectionFontSize(-2)" class="w-6 h-6 hover:bg-slate-100 text-xs rounded" title="小さく">－</button>
                                <span id="current-font-size-display" class="text-[10px] font-bold min-w-[20px] text-center">16</span>
                                <button onclick="changeSelectionFontSize(2)" class="w-6 h-6 hover:bg-slate-100 text-xs rounded" title="大きく">＋</button>
                            </div>
                        </div>

                        <div class="flex items-center gap-1 bg-white border border-slate-200 rounded px-1">
                            <input type="color" id="text-color-picker" oninput="execCommandWithParam('foreColor', this.value)" class="w-6 h-6 border-none cursor-pointer bg-transparent" title="文字色">
                            <input type="color" id="bg-color-picker" value="#f1f5f9" class="w-6 h-6 border-none cursor-pointer bg-transparent" title="枠・背景の色">
                        </div>

                        <div class="flex bg-white border border-slate-200 rounded p-0.5 gap-0.5">
                            <button onclick="handleAlignment('justifyLeft')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="左寄せ">⬅️</button>
                            <button onclick="handleAlignment('justifyCenter')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="中央寄せ">↔️</button>
                            <button onclick="handleAlignment('justifyRight')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="右寄せ">➡️</button>
                        </div>

                        <div class="flex bg-white border border-slate-200 rounded p-0.5 gap-0.5">
                            <button onclick="manualIndent(false)" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="インデント戻す (Shift+Tab)">⇤</button>
                            <button onclick="manualIndent(true)" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="インデント進む (Tab)">⇥</button>
                        </div>

                        <div class="flex bg-white border border-slate-200 rounded p-0.5 gap-0.5">
                            <button onclick="execCommand('undo')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="やり直し">↩️</button>
                            <button onclick="execCommand('redo')" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="再実行">↪️</button>
                            <button onclick="execCommand('bold')" class="w-6 h-6 hover:bg-slate-100 rounded font-bold text-xs" title="太字">B</button>
                            <button onclick="insertLink()" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="リンク">🔗</button>
                            <button onclick="insertFold()" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="折りたたみ">📁</button>
                            <button onclick="saveRange(); document.getElementById('image-upload').click()" class="w-6 h-6 hover:bg-slate-100 rounded text-xs" title="画像">🖼️</button>
                            <input type="file" id="image-upload" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
                        </div>

                        <!-- 記号挿入ボタン -->
                        <div class="flex bg-white border border-slate-200 rounded p-0.5 gap-0.5">
                            <button onclick="insertQuickSymbol('「', '」')" class="w-7 h-6 hover:bg-slate-100 rounded text-xs font-bold" title="鉤括弧">「」</button>
                            <button onclick="insertQuickSymbol('『', '』')" class="w-7 h-6 hover:bg-slate-100 rounded text-xs font-bold" title="二重鉤括弧">『』</button>
                            <button onclick="insertQuickSymbol('【', '】')" class="w-7 h-6 hover:bg-slate-100 rounded text-xs font-bold" title="隅付き括弧">【】</button>
                            <button onclick="insertQuickSymbol('――', '')" class="w-7 h-6 hover:bg-slate-100 rounded text-xs font-bold" title="ダッシュ">――</button>
                        </div>

                        <div class="flex flex-wrap gap-1 border-l pl-2">
                            <button onclick="insertDivider()" class="px-2 h-7 border rounded bg-white text-[10px]">線 —</button>
                            <button onclick="insertTRPGBox('summary')" class="px-2 h-7 border border-blue-200 bg-blue-50 rounded text-[10px] text-blue-700 font-bold">📄 概要</button>
                            <button onclick="insertTRPGBox('check')" class="px-2 h-7 border border-green-200 bg-green-50 rounded text-[10px] text-green-700 font-bold">🎲 判定</button>
                            <button onclick="insertTRPGBox('spot')" class="px-2 h-7 border border-emerald-300 bg-emerald-50 rounded text-[10px] text-emerald-800 font-bold">👀 目星</button>
                            <button onclick="insertTRPGBox('search')" class="px-2 h-7 border border-emerald-300 bg-emerald-50 rounded text-[10px] text-emerald-800 font-bold">🔎 探索箇所</button>
                            <button onclick="insertTRPGBox('listen')" class="px-2 h-7 border border-amber-300 bg-amber-50 rounded text-[10px] text-amber-800 font-bold">👂 聞き耳</button>
                            <button onclick="insertTRPGBox('library')" class="px-2 h-7 border border-cyan-300 bg-cyan-50 rounded text-[10px] text-cyan-800 font-bold">📚 図書館</button>
                            <button onclick="insertTRPGBox('san')" class="px-2 h-7 border border-rose-300 bg-rose-50 rounded text-[10px] text-rose-800 font-bold">🌀 正気度</button>
                            <button onclick="insertTRPGBox('secret')" class="px-2 h-7 border border-purple-200 bg-purple-50 rounded text-[10px] text-purple-700 font-bold">🤫 秘匿</button>
                            <button onclick="insertTRPGBox('gimmick')" class="px-2 h-7 border border-orange-300 bg-orange-50 rounded text-[10px] text-orange-700 font-bold">⚙️ ギミック</button>
                            <button onclick="insertTRPGBox('tendency')" class="px-2 h-7 border border-fuchsia-300 bg-fuchsia-50 rounded text-[10px] text-fuchsia-700 font-bold">📉 傾向</button>
                            <button onclick="insertBorderBox()" class="px-2 h-7 border border-slate-300 bg-white rounded text-[10px] text-slate-800 font-bold">🔳 枠</button>
                            <button onclick="insertKPInfo()" class="px-2 h-7 border border-yellow-300 bg-yellow-50 rounded text-[10px] text-yellow-800 font-bold">📝 KP</button>
                            <button onclick="insertQuote()" class="px-2 h-7 border border-slate-300 bg-slate-50 rounded text-[10px] text-slate-700 font-bold">💬 引用</button>
                            <button onclick="openTableModal()" class="px-2 h-7 border border-slate-300 bg-white rounded text-[10px] font-bold">📊 表</button>
                        </div>

                        <div class="flex flex-wrap gap-1 border-l pl-2">
                            <button onclick="insertSpecialBox('許諾')" class="px-2 h-7 border border-slate-300 bg-slate-50 rounded text-[10px] text-slate-700 font-bold">⚖️ 許諾</button>
                            <button onclick="insertSpecialBox('諸注意')" class="px-2 h-7 border border-amber-300 bg-amber-50 rounded text-[10px] text-amber-700 font-bold">⚠️ 注意</button>
                            <button onclick="insertSpecialBox('HO')" class="px-2 h-7 border border-indigo-300 bg-indigo-50 rounded text-[10px] text-indigo-700 font-bold">🆔 HO</button>
                            <button onclick="insertSpecialBox('エネミー')" class="px-2 h-7 border border-rose-300 bg-rose-50 rounded text-[10px] text-rose-700 font-bold">💀 敵</button>
                            <button onclick="insertSpecialBox('クレジット')" class="px-2 h-7 border border-slate-300 bg-slate-50 rounded text-[10px] text-slate-600 font-bold">✒️ 作</button>
                        </div>

                        <div class="flex gap-1 border-l pl-2">
                            <button onclick="toggleSearchReplace()" class="w-7 h-7 flex items-center justify-center border rounded bg-white hover:bg-slate-100 text-xs text-slate-600" title="検索と置換">🔍</button>
                        </div>
                    </div>
                </div>

                <div id="search-replace-bar" class="max-w-6xl mx-auto p-2 items-center gap-2 text-slate-900">
                    <input type="text" id="search-input" placeholder="検索語句..." class="bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none flex-1">
                    <input type="text" id="replace-input" placeholder="置換後..." class="bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs outline-none flex-1">
                    <button onclick="findNext()" class="px-3 py-1 bg-slate-200 rounded text-[10px] font-bold">次へ</button>
                    <button onclick="replaceAll()" class="px-3 py-1 bg-indigo-600 text-white rounded text-[10px] font-bold">すべて置換</button>
                </div>
            </header>

            <main class="p-4 sm:p-10 flex-1 flex flex-col items-center overflow-y-auto">
                <div id="editor" contenteditable="true" class="w-full max-w-5xl border rounded-xl shadow-xl bg-white" placeholder="本文を入力..."><p><br></p></div>
                <div class="w-full max-w-5xl mt-4 flex justify-between text-xs text-slate-400 font-mono"><span id="char-count">文字数: 0</span><span id="save-status">未保存</span></div>
            </main>
        </div>
    </div>


    <!-- マスコットキャラクターの表示要素 -->
    <div class="mascot-container no-print">
        <img src="E188355.png" alt="Mascot Character" onerror="this.style.display='none'">
    </div>

    <!-- ファイル読込用ダミー -->
    <input type="file" id="project-load-fallback" class="hidden" accept=".weby" onchange="loadProjectFallback(this)">

    <script src="js/common.js"></script>
    <script src="js/kakerukun.js"></script>
</body>
</html>

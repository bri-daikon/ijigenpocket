<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrap Kiritan Ver.4 | 異次元ポケット</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cropper.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/scrapkiritan.css">
</head>
<body class="min-h-screen flex flex-col selection:bg-blue-100">

    <div class="flex-grow w-full max-w-6xl mx-auto p-4 md:p-10 flex flex-col justify-start">
        <div class="glass-card shadow-[0_40px_80px_-15px_rgba(0,0,0,0.5)] rounded-[40px] overflow-hidden border border-white/20 mb-10">
            
            <header class="pt-10 pb-6 px-8 text-center border-b border-slate-100">
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">Scrap Kiritan <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600"> Ver.4</span></h1>
                
                <!-- Main Tabs -->
                <div class="flex justify-center mt-8 space-x-2 bg-slate-100 p-1.5 rounded-2xl w-fit mx-auto">
                    <button onclick="switchMainTab('editor')" id="main-tab-editor" class="tab-btn active px-6 py-2.5 rounded-xl text-sm font-bold transition-all">スクショエディタ</button>
                    <button onclick="switchMainTab('resizer')" id="main-tab-resizer" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-900 transition-all">一括リサイズ</button>
                    <button onclick="switchMainTab('color')" id="main-tab-color" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-900 transition-all">カラーツール</button>
                </div>
            </header>

            <div class="p-6 md:p-10">
                
                <!-- SECTION: MAIN EDITOR -->
                <div id="view-editor" class="main-view">
                    <div class="flex flex-wrap gap-5 mb-10 justify-center">
                        <label class="btn-hover bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold cursor-pointer flex items-center gap-3 text-base shadow-xl shadow-slate-900/10">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                            </svg>
                            <span>画像を選択 / 貼り付け</span>
                            <input type="file" id="fileInput" class="hidden" accept="image/*">
                        </label>
                        
                        <button id="cropButton" class="hidden btn-hover bg-emerald-500 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 text-base shadow-xl shadow-emerald-500/10">
                            <span>✂️</span>
                            <span>切り抜いて編集へ</span>
                        </button>
                    </div>

                    <div id="dropZone" class="img-container relative group ring-1 ring-slate-100">
                        <img id="imageToCrop" src="" alt="Editor" class="hidden">
                        <div id="initialGuide" class="flex flex-col items-center justify-center text-center p-12 transition-all duration-500">
                            <div class="w-20 h-20 bg-slate-50 rounded-[1.5rem] flex items-center justify-center mb-6 group-hover:scale-110 group-hover:rotate-6 transition-all duration-500 shadow-inner">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <p class="text-xl font-bold text-slate-700">画像をドロップまたは貼り付け</p>
                        </div>
                    </div>

                    <div id="resultWrapper" class="hidden mt-16">
                        <div class="flex items-center gap-6 mb-8">
                            <div class="h-px flex-grow bg-slate-100"></div>
                            <h2 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Editor & Preview</h2>
                            <div class="h-px flex-grow bg-slate-100"></div>
                        </div>
                        
                        <div class="flex flex-col items-center gap-8">
                            <!-- 編集ツールバー -->
                            <div class="flex flex-wrap items-center justify-center gap-3 bg-slate-50 p-3 rounded-3xl border border-slate-200">
                                <button id="toolMosaic" class="tool-btn active px-5 py-2.5 rounded-xl font-bold bg-white text-slate-600 shadow-sm transition-all flex items-center gap-2"><span>🖌️</span> モザイク</button>
                                <button id="toolStamp" class="tool-btn px-5 py-2.5 rounded-xl font-bold bg-white text-slate-600 shadow-sm transition-all flex items-center gap-2"><span>🎨</span> スタンプ</button>
                                <button id="toolRect" class="tool-btn px-5 py-2.5 rounded-xl font-bold bg-white text-slate-600 shadow-sm transition-all flex items-center gap-2"><span>⬜</span> 枠入れ</button>
                                <button id="toolText" class="tool-btn px-5 py-2.5 rounded-xl font-bold bg-white text-slate-600 shadow-sm transition-all flex items-center gap-2"><span>T</span> 文字入れ</button>
                                
                                <div class="w-px h-6 bg-slate-200 mx-1"></div>
                                
                                <div id="stampList" class="hidden flex gap-1">
                                    <button class="stamp-option p-1.5 text-xl hover:scale-125 transition-transform" data-emoji="❤️">❤️</button>
                                    <button class="stamp-option p-1.5 text-xl hover:scale-125 transition-transform" data-emoji="✅">✅</button>
                                    <button class="stamp-option p-1.5 text-xl hover:scale-125 transition-transform" data-emoji="❌">❌</button>
                                    <button class="stamp-option p-1.5 text-xl hover:scale-125 transition-transform" data-emoji="💡">💡</button>
                                    <button class="stamp-option p-1.5 text-xl hover:scale-125 transition-transform" data-emoji="👉️">👉️</button>
                                </div>

                                <div id="colorPanel" class="hidden flex items-center gap-2 px-2">
                                    <div class="w-10 h-10 color-picker-wrapper">
                                        <input type="color" id="mainColor" value="#3b82f6">
                                    </div>
                                </div>

                                <div id="textInputWrapper" class="hidden">
                                    <input type="text" id="textToInsert" placeholder="文字を入力..." class="px-4 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-sm">
                                </div>

                                <div id="sizeControl" class="flex items-center gap-3 px-2">
                                    <input type="range" id="brushSize" min="2" max="150" value="40" class="accent-blue-600 w-24">
                                </div>
                                
                                <button id="resetEdit" class="px-5 py-2.5 rounded-xl font-bold bg-red-50 text-red-500 hover:bg-red-100 transition-all">リセット</button>
                            </div>

                            <div class="relative p-2 bg-white shadow-2xl rounded-2xl border border-slate-100 overflow-hidden">
                                <canvas id="editorCanvas"></canvas>
                            </div>

                            <button id="downloadButton" class="btn-hover bg-blue-600 text-white px-10 py-5 rounded-[1.5rem] font-bold flex items-center gap-4 text-lg shadow-2xl shadow-blue-600/20">
                                <span>加工して保存する</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- SECTION: BATCH RESIZER -->
                <div id="view-resizer" class="main-view hidden animate-in fade-in duration-500">
                    <div class="max-w-2xl mx-auto">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div class="space-y-4">
                                <label class="block text-sm font-bold text-slate-700">1. 設定</label>
                                <div class="flex space-x-3 mb-3">
                                    <button onclick="setResizeMode('px')" id="mode-px" class="flex-1 py-2 rounded-xl border-2 border-blue-600 bg-blue-50 text-blue-700 font-bold text-xs transition-all">ピクセル (px)</button>
                                    <button onclick="setResizeMode('percent')" id="mode-percent" class="flex-1 py-2 rounded-xl border-2 border-slate-200 text-slate-400 font-bold text-xs transition-all">パーセント (%)</button>
                                </div>
                                <div class="relative">
                                    <input type="number" id="batch-resize-value" value="800" class="w-full border-2 border-slate-100 rounded-2xl px-4 py-4 focus:ring-2 focus:ring-blue-500 outline-none font-black text-xl text-slate-700">
                                    <span id="batch-unit-label" class="absolute right-4 top-5 text-slate-300 font-bold">px</span>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <label class="block text-sm font-bold text-slate-700">2. 画像を選択</label>
                                <div class="relative h-28 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center bg-slate-50/50 hover:bg-slate-50 transition-colors">
                                    <input type="file" id="batch-file-input" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                                    <span class="text-blue-500 font-bold text-sm">ファイルをドロップ</span>
                                    <span class="text-slate-400 text-[10px] mt-1">複数選択可能 / 出力: PNG</span>
                                </div>
                            </div>
                        </div>

                        <div id="batch-preview-container" class="grid grid-cols-4 sm:grid-cols-6 gap-2 mb-8"></div>

                        <button id="batch-exec-btn" disabled class="w-full btn-hover bg-slate-900 text-white py-5 rounded-2xl font-black text-lg disabled:opacity-20 shadow-xl">
                            PNGリサイズして個別保存
                        </button>
                        <div id="batch-status" class="mt-4 text-center text-xs font-bold text-blue-600 hidden"></div>
                    </div>
                </div>

                <!-- SECTION: COLOR TOOL -->
                <div id="view-color" class="main-view hidden animate-in fade-in duration-500">
                    <div class="max-w-md mx-auto py-6">
                        <div class="flex flex-col items-center">
                            <div class="w-48 h-48 mb-10 relative color-picker-wrapper">
                                <input type="color" id="utility-color-input" value="#3b82f6" class="shadow-2xl">
                            </div>
                            
                            <div class="w-full space-y-4">
                                <div class="flex items-center justify-between bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                    <span class="font-mono text-2xl font-black text-slate-700 tracking-tight" id="utility-hex">#3B82F6</span>
                                    <button onclick="copyToClipboard('utility-hex')" class="bg-white border px-4 py-2 rounded-xl text-xs font-black shadow-sm hover:bg-slate-100 transition-all">HEXをコピー</button>
                                </div>
                                <div class="flex items-center justify-between bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                    <span class="font-mono text-lg font-bold text-slate-400" id="utility-rgb">rgb(59, 130, 246)</span>
                                    <button onclick="copyToClipboard('utility-rgb')" class="bg-white border px-4 py-2 rounded-xl text-xs font-black shadow-sm hover:bg-slate-100 transition-all">RGBをコピー</button>
                                </div>
                            </div>
                            <div id="utility-notif" class="mt-6 text-emerald-500 font-black text-sm opacity-0 transition-opacity">COPIED!</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="w-full py-10 px-6 flex flex-col items-center">
        <div class="group flex flex-col items-center">
            <span class="text-slate-500 text-[9px] uppercase tracking-[0.3em] font-black mb-4 opacity-40">Integrated Creative Toolkit</span>
            <div class="flex items-center gap-2">
                <span class="text-lg font-bold text-white tracking-tight">Product by 異次元ポケット</span>
            </div>
            <a href="https://ijigenpocket.booth.pm/" target="_blank" rel="noopener noreferrer" class="mt-4 px-5 py-1.5 rounded-full bg-white/5 text-white/40 text-[10px] font-bold hover:bg-white/10 hover:text-white transition-all border border-white/5 backdrop-blur-sm">
                ijigenpocket.booth.pm
            </a>
        </div>
    </footer>

    <!-- Cropper.js JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/scrapkiritan.js"></script>
</body>
</html>

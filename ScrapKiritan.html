<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrap Kiritan | 異次元ポケット</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cropper.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        
        .img-container {
            min-height: 400px;
            max-height: 65vh;
            width: 100%;
            background-image: radial-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 24px;
            border: 2px dashed #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drop-active {
            border-color: #3b82f6 !important;
            background-color: #f0f7ff !important;
            transform: scale(1.01);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2);
        }

        .btn-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.2);
        }
        .btn-hover:active { transform: translateY(-1px); }

        /* エディター用キャンバス */
        #editorCanvas {
            max-width: 100%;
            height: auto;
            cursor: crosshair;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tool-btn.active {
            background-color: #3b82f6 !important;
            color: white !important;
            ring: 4px;
            ring-color: #3b82f6;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* カラーピッカーのスタイル調整 */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-blue-100">

    <div class="flex-grow w-full max-w-6xl mx-auto p-4 md:p-10 flex flex-col justify-center">
        <div class="glass-card shadow-[0_40px_80px_-15px_rgba(0,0,0,0.5)] rounded-[40px] overflow-hidden border border-white/20">
            
            <header class="pt-12 pb-6 px-8 text-center">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-600 rounded-3xl shadow-2xl shadow-blue-500/20 mb-8 transform -rotate-3 hover:rotate-0 transition-transform duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758L5 19m0-14l4.121 4.121" />
                    </svg>
                </div>
                <h1 class="text-5xl font-black text-slate-900 tracking-tighter">Scrap Kiritan <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">Ver.3</span></h1>
                <p class="text-slate-500 mt-4 text-lg font-medium opacity-80">スクショ貼り付け、切り取り、モザイク・スタンプ・文字入れ加工ができるツール</p>
            </header>

            <div class="p-6 md:p-12">
                <!-- アクションエリア -->
                <div class="flex flex-wrap gap-5 mb-12 justify-center">
                    <label class="btn-hover bg-slate-900 text-white px-10 py-5 rounded-2xl font-bold cursor-pointer flex items-center gap-3 text-lg shadow-xl shadow-slate-900/10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                        <span>ファイルを選択</span>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                    </label>
                    
                    <button id="cropButton" class="hidden btn-hover bg-emerald-500 text-white px-10 py-5 rounded-2xl font-bold flex items-center gap-3 text-lg shadow-xl shadow-emerald-500/10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4z" />
                            <path fill-rule="evenodd" d="M3 8h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V8zm5 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" clip-rule="evenodd" />
                        </svg>
                        <span>切り抜いて編集へ</span>
                    </button>
                </div>

                <!-- ワークスペース -->
                <div id="dropZone" class="img-container relative group ring-1 ring-slate-100">
                    <img id="imageToCrop" src="" alt="Editor" class="hidden">
                    <div id="initialGuide" class="flex flex-col items-center justify-center text-center p-12 transition-all duration-500">
                        <div class="w-24 h-24 bg-slate-50 rounded-[2rem] flex items-center justify-center mb-8 group-hover:scale-110 group-hover:rotate-6 transition-all duration-500 shadow-inner">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <p class="text-2xl font-bold text-slate-700">ここに画像をドロップ</p>
                        <p class="mt-4 text-slate-400 font-medium">または Ctrl+V で貼り付け</p>
                    </div>
                </div>

                <!-- 結果・編集セクション -->
                <div id="resultWrapper" class="hidden mt-20 animate-in fade-in slide-in-from-bottom-12 duration-1000">
                    <div class="flex items-center gap-6 mb-10">
                        <div class="h-px flex-grow bg-slate-100"></div>
                        <h2 class="text-xs font-black text-slate-300 uppercase tracking-[0.4em] text-center">Editor & Preview</h2>
                        <div class="h-px flex-grow bg-slate-100"></div>
                    </div>
                    
                    <div class="flex flex-col items-center gap-8">
                        <!-- 編集ツールバー -->
                        <div class="flex flex-wrap items-center justify-center gap-4 bg-slate-50 p-4 rounded-3xl border border-slate-200">
                            <button id="toolMosaic" class="tool-btn active px-6 py-3 rounded-xl font-bold bg-white text-slate-600 shadow-sm transition-all flex items-center gap-2">
                                <span>🖌️</span> モザイク
                            </button>
                            <button id="toolStamp" class="tool-btn px-6 py-3 rounded-xl font-bold bg-white text-slate-600 shadow-sm transition-all flex items-center gap-2">
                                <span>🎨</span> スタンプ
                            </button>
                            <button id="toolText" class="tool-btn px-6 py-3 rounded-xl font-bold bg-white text-slate-600 shadow-sm transition-all flex items-center gap-2">
                                <span>T</span> 文字入れ
                            </button>
                            
                            <div class="w-px h-8 bg-slate-200 mx-2"></div>
                            
                            <!-- スタンプ選択 -->
                            <div id="stampList" class="hidden flex gap-2">
                                <button class="stamp-option p-2 text-2xl hover:scale-125 transition-transform" data-emoji="❤️">❤️</button>
                                <button class="stamp-option p-2 text-2xl hover:scale-125 transition-transform" data-emoji="⭐">⭐</button>
                                <button class="stamp-option p-2 text-2xl hover:scale-125 transition-transform" data-emoji="✅">✅</button>
                                <button class="stamp-option p-2 text-2xl hover:scale-125 transition-transform" data-emoji="❌">❌</button>
                                <button class="stamp-option p-2 text-2xl hover:scale-125 transition-transform" data-emoji="🔥">🔥</button>
                                <button class="stamp-option p-2 text-2xl hover:scale-125 transition-transform" data-emoji="💡">💡</button>
                            </div>

                            <!-- テキスト入力設定 -->
                            <div id="textInputWrapper" class="hidden flex items-center gap-3">
                                <input type="text" id="textToInsert" placeholder="ここに入力..." class="px-4 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold text-slate-400">COLOR</span>
                                    <input type="color" id="textColor" value="#000000">
                                </div>
                            </div>

                            <!-- 共通サイズ設定 -->
                            <div id="mosaicControl" class="flex items-center gap-3 px-2">
                                <span class="text-xs font-bold text-slate-400">SIZE</span>
                                <input type="range" id="brushSize" min="10" max="150" value="40" class="accent-blue-600">
                            </div>
                            
                            <button id="resetEdit" class="px-6 py-3 rounded-xl font-bold bg-red-50 text-red-500 hover:bg-red-100 transition-all flex items-center gap-2">
                                <span>🔄</span> リセット
                            </button>
                        </div>

                        <!-- 編集キャンバス本体 -->
                        <div class="relative p-2 bg-white shadow-2xl rounded-2xl border border-slate-100 overflow-hidden">
                            <canvas id="editorCanvas"></canvas>
                        </div>

                        <!-- 保存ボタン -->
                        <button id="downloadButton" class="btn-hover bg-blue-600 text-white px-12 py-6 rounded-[2rem] font-bold flex items-center gap-4 text-xl shadow-2xl shadow-blue-600/20">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                            <span>加工して保存する</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="w-full py-16 px-6 flex flex-col items-center">
        <div class="group flex flex-col items-center">
            <span class="text-slate-500 text-[10px] uppercase tracking-[0.3em] font-black mb-4 opacity-50">Authorized Application</span>
            <div class="flex items-center gap-2">
                <span class="text-xl font-bold text-white tracking-tight">Product by 異次元ポケット</span>
            </div>
            <a href="https://ijigenpocket.booth.pm/" target="_blank" rel="noopener noreferrer" class="mt-6 px-6 py-2 rounded-full bg-white/10 text-white/60 text-xs font-bold hover:bg-white/20 hover:text-white transition-all border border-white/10 backdrop-blur-sm">
                ijigenpocket.booth.pm
            </a>
        </div>
    </footer>

    <!-- Cropper.js JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        const fileInput = document.getElementById('fileInput');
        const imageToCrop = document.getElementById('imageToCrop');
        const cropButton = document.getElementById('cropButton');
        const downloadButton = document.getElementById('downloadButton');
        const resultWrapper = document.getElementById('resultWrapper');
        const dropZone = document.getElementById('dropZone');
        const initialGuide = document.getElementById('initialGuide');

        // エディター関連
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const toolMosaic = document.getElementById('toolMosaic');
        const toolStamp = document.getElementById('toolStamp');
        const toolText = document.getElementById('toolText');
        const stampList = document.getElementById('stampList');
        const textInputWrapper = document.getElementById('textInputWrapper');
        const textToInsert = document.getElementById('textToInsert');
        const textColorInput = document.getElementById('textColor');
        const brushSizeInput = document.getElementById('brushSize');
        const resetEditBtn = document.getElementById('resetEdit');

        let cropper = null;
        let originalCroppedImage = null; 
        let currentTool = 'mosaic';
        let isDrawing = false;
        let selectedEmoji = '❤️';

        // 1. ファイル読み込み
        function loadFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                if (cropper) cropper.destroy();
                imageToCrop.src = e.target.result;
                imageToCrop.classList.remove('hidden');
                initialGuide.classList.add('hidden');
                cropButton.classList.remove('hidden');
                resultWrapper.classList.add('hidden');
                cropper = new Cropper(imageToCrop, {
                    viewMode: 1, dragMode: 'move', aspectRatio: NaN,
                    autoCropArea: 0.8, responsive: true, modal: true,
                    guides: true, center: true, highlight: true
                });
            };
            reader.readAsDataURL(file);
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
        });

        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) loadFile(items[i].getAsFile());
            }
        });

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
            dropZone.addEventListener(n, e => { e.preventDefault(); e.stopPropagation(); });
        });
        dropZone.addEventListener('dragover', () => dropZone.classList.add('drop-active'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drop-active'));
        dropZone.addEventListener('drop', (e) => {
            dropZone.classList.remove('drop-active');
            if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
        });

        // 2. 切り抜き実行
        cropButton.addEventListener('click', () => {
            if (!cropper) return;
            const croppedCanvas = cropper.getCroppedCanvas({ imageSmoothingQuality: 'high' });
            canvas.width = croppedCanvas.width;
            canvas.height = croppedCanvas.height;
            ctx.drawImage(croppedCanvas, 0, 0);
            originalCroppedImage = croppedCanvas;
            resultWrapper.classList.remove('hidden');
            setTimeout(() => resultWrapper.scrollIntoView({ behavior: 'smooth' }), 100);
        });

        // 3. 描画ロジック
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function applyMosaic(x, y) {
            const size = parseInt(brushSizeInput.value);
            const pixelSize = 10;
            const startX = Math.max(0, x - size/2);
            const startY = Math.max(0, y - size/2);
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = size / pixelSize;
            tempCanvas.height = size / pixelSize;
            tempCtx.drawImage(canvas, startX, startY, size, size, 0, 0, tempCanvas.width, tempCanvas.height);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height, startX, startY, size, size);
            ctx.imageSmoothingEnabled = true;
        }

        function applyStamp(x, y) {
            const size = parseInt(brushSizeInput.value) * 1.5;
            ctx.font = `${size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(selectedEmoji, x, y);
        }

        function applyText(x, y) {
            const text = textToInsert.value;
            if (!text) return;
            const size = parseInt(brushSizeInput.value);
            const color = textColorInput.value;
            
            ctx.font = `bold ${size}px 'Inter', 'Noto Sans JP', sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            
            // 白い縁取り（視認性向上）
            ctx.strokeStyle = 'white';
            ctx.lineWidth = size * 0.15;
            ctx.strokeText(text, x, y);
            
            // 選択された色で塗りつぶし
            ctx.fillStyle = color;
            ctx.fillText(text, x, y);
        }

        const startAction = (e) => {
            isDrawing = true;
            const pos = getMousePos(e);
            if (currentTool === 'mosaic') applyMosaic(pos.x, pos.y);
            else if (currentTool === 'stamp') applyStamp(pos.x, pos.y);
            else if (currentTool === 'text') applyText(pos.x, pos.y);
        };

        const moveAction = (e) => {
            if (!isDrawing || currentTool !== 'mosaic') return;
            e.preventDefault();
            const pos = getMousePos(e);
            applyMosaic(pos.x, pos.y);
        };

        canvas.addEventListener('mousedown', startAction);
        canvas.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', () => { isDrawing = false; });
        canvas.addEventListener('touchstart', startAction, { passive: false });
        canvas.addEventListener('touchmove', moveAction, { passive: false });
        window.addEventListener('touchend', () => { isDrawing = false; });

        // 4. ツール切り替え
        function switchTool(tool) {
            currentTool = tool;
            [toolMosaic, toolStamp, toolText].forEach(btn => btn.classList.remove('active'));
            stampList.classList.add('hidden');
            textInputWrapper.classList.add('hidden');

            if (tool === 'mosaic') {
                toolMosaic.classList.add('active');
            } else if (tool === 'stamp') {
                toolStamp.classList.add('active');
                stampList.classList.remove('hidden');
            } else if (tool === 'text') {
                toolText.classList.add('active');
                textInputWrapper.classList.remove('hidden');
                textToInsert.focus();
            }
        }

        toolMosaic.addEventListener('click', () => switchTool('mosaic'));
        toolStamp.addEventListener('click', () => switchTool('stamp'));
        toolText.addEventListener('click', () => switchTool('text'));

        document.querySelectorAll('.stamp-option').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedEmoji = btn.dataset.emoji;
                document.querySelectorAll('.stamp-option').forEach(b => b.classList.remove('ring-2', 'ring-blue-500', 'rounded-lg'));
                btn.classList.add('ring-2', 'ring-blue-500', 'rounded-lg');
            });
        });

        resetEditBtn.addEventListener('click', () => {
            if (originalCroppedImage) ctx.drawImage(originalCroppedImage, 0, 0);
        });

        downloadButton.addEventListener('click', () => {
            const date = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `kiritan-edit-${date}.png`;
            link.click();
        });
    </script>
</body>
</html>

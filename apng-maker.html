<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡単アニメ画像メーカー</title>
    <!-- 見た目を整えるTailwind CSSを読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- APNGを生成するためのライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/1.0.11/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <!-- GIFを生成するためのライブラリ（新しく追加！） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
</head>
<body class="bg-blue-50 min-h-screen p-8 text-gray-800 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">✨ 簡単アニメ画像メーカー ✨</h1>

        <!-- 1. 画像アップロード部分 -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">1. 画像を選んでください</label>
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/gif" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>

        <!-- 2. エフェクト選択部分 -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">2. エフェクトを選んでください</label>
            <div class="flex flex-wrap gap-4">
                <label class="flex items-center space-x-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-lg border">
                    <input type="radio" name="effect" value="shake" checked class="text-blue-600">
                    <span>揺らす</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-lg border">
                    <input type="radio" name="effect" value="blink" class="text-blue-600">
                    <span>点滅する</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-lg border">
                    <input type="radio" name="effect" value="scatter" class="text-blue-600">
                    <span>散らばる</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-lg border">
                    <input type="radio" name="effect" value="zoomIn" class="text-blue-600">
                    <span>ズームイン</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-lg border">
                    <input type="radio" name="effect" value="zoomOut" class="text-blue-600">
                    <span>ズームアウト</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-lg border">
                    <input type="radio" name="effect" value="zoomInWhite" class="text-blue-600">
                    <span>ズームイン(白)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-lg border">
                    <input type="radio" name="effect" value="zoomOutWhite" class="text-blue-600">
                    <span>ズームアウト(白)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-lg border">
                    <input type="radio" name="effect" value="zoomInBlack" class="text-blue-600">
                    <span>ズームイン(黒)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-lg border">
                    <input type="radio" name="effect" value="zoomOutBlack" class="text-blue-600">
                    <span>ズームアウト(黒)</span>
                </label>
            </div>
        </div>

        <!-- 新しいエフェクト選択部分 -->
        <div class="mb-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
            <label class="block text-sm font-bold text-blue-800 mb-2">🆕 新しいエフェクト</label>
            
            <div class="mb-4">
                <span class="block text-xs font-semibold text-gray-600 mb-1">🌀 回転</span>
                <div class="flex flex-wrap gap-2">
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="rotateRight" class="text-blue-600">
                        <span>右回転</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="rotateLeft" class="text-blue-600">
                        <span>左回転</span>
                    </label>
                </div>
            </div>
            
            <div class="mb-4">
                <span class="block text-xs font-semibold text-gray-600 mb-1">⬆️⬇️ 直線移動</span>
                <div class="flex flex-wrap gap-2">
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="moveDown" class="text-blue-600">
                        <span>上から下へ</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="moveUp" class="text-blue-600">
                        <span>下から上へ</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="moveLeft" class="text-blue-600">
                        <span>右から左へ</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="moveRight" class="text-blue-600">
                        <span>左から右へ</span>
                    </label>
                </div>
            </div>

            <div>
                <span class="block text-xs font-semibold text-gray-600 mb-1">↗️↘️ 斜め移動</span>
                <div class="flex flex-wrap gap-2">
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="moveDownLeft" class="text-blue-600">
                        <span>斜め右上→左下</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="moveDownRight" class="text-blue-600">
                        <span>斜め左上→右下</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="moveUpLeft" class="text-blue-600">
                        <span>斜め右下→左上</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-1 rounded-lg border">
                        <input type="radio" name="effect" value="moveUpRight" class="text-blue-600">
                        <span>斜め左下→右上</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 3. 保存形式の選択（新しく追加！） -->
        <div class="mb-8 p-4 bg-yellow-50 rounded-lg border border-yellow-200">
            <label class="block text-sm font-bold text-yellow-800 mb-2">3. どこで使いますか？（保存形式）</label>
            <div class="flex flex-wrap gap-4">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" name="format" value="gif" checked class="text-blue-600">
                    <span class="font-medium">X (Twitter)用 (GIF形式)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" name="format" value="apng" class="text-blue-600">
                    <span class="font-medium">高画質用 (APNG形式)</span>
                </label>
            </div>
            <p class="text-xs text-yellow-700 mt-2">※Xに投稿する場合は必ず「X用 (GIF形式)」を選んでくださいね。</p>
        </div>

        <!-- 4. 作成ボタン -->
        <div class="text-center mb-8">
            <button id="generateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition-colors w-full sm:w-auto shadow-md">
                アニメ画像を作成する！
            </button>
            <p id="loadingMsg" class="text-blue-500 mt-4 hidden animate-pulse font-bold">🪄 一生懸命作っています... 少しお待ちください！</p>
        </div>

        <!-- 5. プレビューとダウンロード部分 -->
        <div id="resultArea" class="hidden border-t pt-6">
            <h2 class="text-xl font-bold text-center mb-4">完成したプレビュー</h2>
            <div class="flex justify-center mb-4 bg-gray-100 rounded-lg p-4 min-h-[200px] items-center">
                <img id="previewImg" src="" alt="アニメプレビュー" class="max-w-full max-h-[300px]">
            </div>
            <div class="text-center">
                <a id="downloadLink" href="#" download="animated.gif" class="inline-block bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition-colors shadow-md text-lg">
                    ⬇️ 画像をダウンロード
                </a>
            </div>
        </div>
    </div>

    <!-- 画像を処理するための見えないキャンバス -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const imageInput = document.getElementById('imageInput');
        const generateBtn = document.getElementById('generateBtn');
        const effectRadios = document.getElementsByName('effect');
        const formatRadios = document.getElementsByName('format');
        const resultArea = document.getElementById('resultArea');
        const previewImg = document.getElementById('previewImg');
        const downloadLink = document.getElementById('downloadLink');
        const loadingMsg = document.getElementById('loadingMsg');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let loadedImage = new Image();
        // クロスオリジンエラーを防ぐためのおまじない
        loadedImage.crossOrigin = "anonymous";

        // 画像アップロード時の処理
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                loadedImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 作成ボタンが押されたときの処理
        generateBtn.addEventListener('click', function() {
            if (!loadedImage.src) {
                alert('まずは画像を選択してくださいね！');
                return;
            }

            // 処理中画面に切り替え
            generateBtn.disabled = true;
            loadingMsg.classList.remove('hidden');
            resultArea.classList.add('hidden');

            // 選択されたエフェクトと形式を取得
            let selectedEffect = 'shake';
            effectRadios.forEach(radio => { if (radio.checked) selectedEffect = radio.value; });
            
            let selectedFormat = 'gif';
            formatRadios.forEach(radio => { if (radio.checked) selectedFormat = radio.value; });

            // 画面が固まらないように少し遅らせて処理開始
            setTimeout(() => {
                createAnimation(selectedEffect, selectedFormat);
            }, 50);
        });

        // アニメーションを生成するメイン関数
        function createAnimation(effect, format) {
            // サイズを調整（大きすぎると処理が重くなるため、最大500pxに制限）
            const maxSize = 500;
            let width = loadedImage.width;
            let height = loadedImage.height;
            
            if (width > maxSize || height > maxSize) {
                if (width > height) {
                    height = Math.floor(height * (maxSize / width));
                    width = maxSize;
                } else {
                    width = Math.floor(width * (maxSize / height));
                    height = maxSize;
                }
            }

            canvas.width = width;
            canvas.height = height;

            const framesAPNG = []; // APNG用のデータ配列
            const framesGIF = [];  // GIF用のデータ配列
            const delays = [];     
            const frameCount = 10; // コマ数

            // 1コマずつ描画
            for (let i = 0; i < frameCount; i++) {
                // 進行度を計算 (0.0 から 1.0)
                const progress = i / (frameCount - 1);

                ctx.clearRect(0, 0, width, height);
                // 描画設定をリセット（回転などの影響を次のコマに残さないため）
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.globalAlpha = 1.0;

                // 背景色が必要なエフェクト用
                if (effect === 'zoomInWhite' || effect === 'zoomOutWhite') {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, width, height);
                } else if (effect === 'zoomInBlack' || effect === 'zoomOutBlack') {
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, width, height);
                }

                if (effect === 'shake') {
                    const offsetX = (Math.random() - 0.5) * (width * 0.05); // サイズに合わせて揺れ幅を調整
                    const offsetY = (Math.random() - 0.5) * (height * 0.05);
                    ctx.drawImage(loadedImage, offsetX, offsetY, width, height);
                } 
                else if (effect === 'blink') {
                    ctx.globalAlpha = (i % 2 === 0) ? 1.0 : 0.0;
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.globalAlpha = 1.0;
                } 
                else if (effect === 'scatter') {
                    for (let j = 0; j < 5; j++) {
                        const size = width * (0.3 + Math.random() * 0.4);
                        const x = Math.random() * (width - size);
                        const y = Math.random() * (height - size);
                        ctx.drawImage(loadedImage, x, y, size, size);
                    }
                }
                else if (effect.startsWith('zoom')) {
                    // 進行度を計算 (0.0 から 1.0)
                    // const progress = i / (frameCount - 1); // 上で計算済みなのでコメントアウト
                    let scale;
                    
                    if (effect.includes('In')) {
                        // ズームイン: 1.0倍から1.5倍に拡大
                        scale = 1.0 + progress * 0.5;
                    } else {
                        // ズームアウト
                        if (effect.includes('White') || effect.includes('Black')) {
                            // 白・黒背景付きの場合は最後まで縮小して消える (1.0 -> 0.0)
                            scale = Math.max(0, 1.0 - progress); 
                        } else {
                            // 通常は0.5倍まで (1.0 -> 0.5)
                            scale = 1.0 - progress * 0.5;
                        }
                    }
                    
                    const dw = width * scale;
                    const dh = height * scale;
                    const dx = (width - dw) / 2;
                    const dy = (height - dh) / 2;

                    // 白・黒背景付きの場合は、徐々に透明にして背景色に溶け込ませる
                    if (effect.includes('White') || effect.includes('Black')) {
                        // progressが1.0に近づくにつれて透明(0.0)になる
                        ctx.globalAlpha = Math.max(0, 1.0 - progress);
                    }

                    // 画像のサイズが0より大きい時だけ描画する（エラー防止）
                    if (dw > 0 && dh > 0) {
                        ctx.drawImage(loadedImage, dx, dy, dw, dh);
                    }
                    
                    ctx.globalAlpha = 1.0; // 次の処理のために透明度を元に戻す
                }
                // --- 新しいエフェクトの実装 ---
                else if (effect.startsWith('rotate')) {
                    // 1回転（360度 = 2πラジアン）
                    const maxAngle = 2 * Math.PI; 
                    let angle = progress * maxAngle;
                    
                    if (effect === 'rotateLeft') {
                        angle = -angle; // 左回転は逆方向
                    }

                    // キャンバスの中心を基準に回転させる
                    ctx.translate(width / 2, height / 2); // 中心に移動
                    ctx.rotate(angle);                    // 回転
                    ctx.translate(-width / 2, -height / 2); // 元の位置に戻す
                    
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect.startsWith('move')) {
                    let dx = 0;
                    let dy = 0;
                    
                    // 進行度に基づいて位置を計算
                    // 垂直方向 (Down: 上から下, Up: 下から上)
                    if (effect.includes('Down')) {
                        dy = (progress - 1.0) * height; // -height から 0 へ
                    } else if (effect.includes('Up')) {
                        dy = (1.0 - progress) * height; // height から 0 へ
                    }
                    
                    // 水平方向 (Left: 右から左, Right: 左から右)
                    if (effect.includes('Left')) {
                        dx = (1.0 - progress) * width; // width から 0 へ
                    } else if (effect.includes('Right')) {
                        dx = (progress - 1.0) * width; // -width から 0 へ
                    }

                    ctx.drawImage(loadedImage, dx, dy, width, height);
                }

                // フォーマットに応じてデータを保存
                if (format === 'apng') {
                    const imageData = ctx.getImageData(0, 0, width, height);
                    framesAPNG.push(imageData.data.buffer);
                    delays.push(150);
                } else {
                    // GIFの場合はブラウザで扱いやすいURL形式でコマを保存
                    framesGIF.push(canvas.toDataURL('image/png'));
                }
            }

            // --- APNGを作る場合 ---
            if (format === 'apng') {
                const apngArrayBuffer = UPNG.encode(framesAPNG, width, height, 0, delays);
                const blob = new Blob([apngArrayBuffer], { type: 'image/png' });
                const url = URL.createObjectURL(blob);
                
                finishGeneration(url, 'animated.png');
            } 
            // --- GIFを作る場合 ---
            else {
                // gifshotライブラリを使ってGIFを作成
                gifshot.createGIF({
                    images: framesGIF,
                    interval: 0.15, // 1コマの秒数（0.15秒 = 150ミリ秒）
                    gifWidth: width,
                    gifHeight: height,
                    numWorkers: 2 // 処理を少し早くするおまじない
                }, function(obj) {
                    if (!obj.error) {
                        finishGeneration(obj.image, 'animated.gif');
                    } else {
                        alert('GIFの作成に失敗しました。別の画像で試してみてください。');
                        resetButton();
                    }
                });
            }
        }

        // 共通の完了処理
        function finishGeneration(url, filename) {
            previewImg.src = url;
            downloadLink.href = url;
            downloadLink.download = filename;

            loadingMsg.classList.add('hidden');
            generateBtn.disabled = false;
            resultArea.classList.remove('hidden');
        }

        function resetButton() {
            loadingMsg.classList.add('hidden');
            generateBtn.disabled = false;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡単アニメ画像メーカー</title>
    <!-- 見た目を整えるTailwind CSSを読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- APNGを生成するためのライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/1.0.11/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <!-- GIFを生成するためのライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-cyan-50 min-h-screen p-4 sm:p-8 text-gray-800 font-sans">
    <div class="max-w-7xl mx-auto">
        
        <!-- ヘッダー部分 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-2">
                ✨ 簡単アニメ画像メーカー
            </h1>
            <p class="text-gray-500 font-medium">画像をアップロードして、魔法のエフェクトをかけよう！</p>
        </div>

        <!-- 左右2カラムのコンテナ -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- 【左カラム】設定・操作メニュー (全体の7/12幅) -->
            <div class="lg:col-span-7 xl:col-span-8 bg-white/80 backdrop-blur-md p-6 sm:p-8 rounded-2xl shadow-xl border border-white/50 space-y-6">
                
                <!-- 1. 画像アップロード部分 -->
                <div>
                    <label class="flex items-center text-sm font-bold text-gray-700 mb-3 uppercase tracking-wider">
                        <span class="bg-blue-100 text-blue-700 rounded-full w-6 h-6 flex items-center justify-center mr-2 text-xs">1</span>
                        画像を選ぶ
                    </label>
                    <div class="relative">
                        <input type="file" id="imageInput" accept="image/png, image/jpeg, image/gif" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gradient-to-r file:from-blue-50 file:to-indigo-50 file:text-blue-700 hover:file:bg-indigo-100 transition-colors cursor-pointer border-2 border-dashed border-blue-200 rounded-xl p-4 bg-white/50 hover:bg-white hover:border-blue-400 focus:outline-none">
                    </div>
                </div>

                <!-- 2. エフェクト選択部分（チェックボックス化！） -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="flex items-center text-sm font-bold text-gray-700 uppercase tracking-wider">
                            <span class="bg-purple-100 text-purple-700 rounded-full w-6 h-6 flex items-center justify-center mr-2 text-xs">2</span>
                            エフェクトを選ぶ（複数選択OK！ 組み合わせ自由）
                        </label>
                        <button id="clearEffectsBtn" class="text-xs text-red-500 hover:text-red-700 font-bold bg-red-50 hover:bg-red-100 px-2.5 py-1 rounded-full transition-colors">
                            選択をクリア
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- 🌟 基本のエフェクト -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-gray-800 mb-3"><span class="text-base mr-2">🌟</span> 基本エフェクト</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="shake" class="peer sr-only" checked>
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">揺らす</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="blink" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">点滅する</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="scatter" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">散らばる</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="zoomIn" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームイン</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="zoomOut" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームアウト</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="zoomInWhite" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームイン(白)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="zoomOutWhite" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームアウト(白)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="zoomInBlack" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームイン(黒)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="zoomOutBlack" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームアウト(黒)</div>
                                </label>
                            </div>
                        </div>

                        <!-- 🌀 回転・移動 -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-blue-800 mb-3"><span class="text-base mr-2">🌀</span> 回転・移動</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="rotateRight" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">右回転</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="rotateLeft" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">左回転</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="moveDown" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">上から下</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="moveUp" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">下から上</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="moveLeft" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">右から左</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="moveDownRight" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">斜め移動</div>
                                </label>
                            </div>
                        </div>

                        <!-- 🎨 魔法・色 -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-purple-800 mb-3"><span class="text-base mr-2">🎨</span> 魔法・色</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="rainbow" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">🌈 虹色変化</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="fadeInWhite" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">👻 Fイン(白)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="fadeInBlack" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">🖤 Fイン(黒)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="fadeOutWhite" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">🌫️ Fアウト(白)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="fadeOutBlack" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">🖤 Fアウト(黒)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="blur" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">💧 ぼかす</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="mosaic" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">👾 モザイク</div>
                                </label>
                            </div>
                        </div>

                        <!-- 👻 ユニーク・かっこいい演出 -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-orange-800 mb-3"><span class="text-base mr-2">🎬</span> ユニーク・演出</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="slime" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🍮 ぷるぷる</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="wave" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🌊 波打ち</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="heartbeat" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">❤️ 鼓動</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="bounce" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🏀 バウンド</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="pendulum" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🕰️ 振り子</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="tornado" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🌪️ 竜巻</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="checkbox" name="effect" value="glitch" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">📺 ノイズ</div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3. 保存形式の選択 -->
                <div>
                    <label class="flex items-center text-sm font-bold text-gray-700 mb-3 uppercase tracking-wider">
                        <span class="bg-yellow-100 text-yellow-700 rounded-full w-6 h-6 flex items-center justify-center mr-2 text-xs">3</span>
                        保存形式を選ぶ
                    </label>
                    <div class="p-4 bg-gradient-to-r from-yellow-50 to-orange-50 rounded-xl border border-yellow-200">
                        <div class="flex flex-wrap gap-3">
                            <label class="cursor-pointer relative">
                                <input type="radio" name="format" value="gif" checked class="peer sr-only">
                                <div class="px-4 py-2.5 rounded-lg border border-yellow-200 bg-white text-xs font-bold text-gray-700 transition-all hover:shadow-md peer-checked:border-yellow-500 peer-checked:bg-yellow-400 peer-checked:text-yellow-900 peer-checked:shadow-inner flex items-center">
                                    <span class="text-base mr-1.5">🐦</span> X (Twitter)用 (GIF)
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="format" value="apng" class="peer sr-only">
                                <div class="px-4 py-2.5 rounded-lg border border-yellow-200 bg-white text-xs font-bold text-gray-700 transition-all hover:shadow-md peer-checked:border-yellow-500 peer-checked:bg-yellow-400 peer-checked:text-yellow-900 peer-checked:shadow-inner flex items-center">
                                    <span class="text-base mr-1.5">✨</span> 高画質用 (APNG)
                                </div>
                            </label>
                        </div>
                        <p class="text-[11px] text-yellow-800 mt-2 font-medium flex items-center">
                            <svg class="w-3.5 h-3.5 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                            Xに投稿する場合は必ず「X用 (GIF形式)」を選んでください。
                        </p>
                    </div>
                </div>

                <!-- 4. ループ（繰り返し）設定 -->
                <div>
                    <label class="flex items-center text-sm font-bold text-gray-700 mb-3 uppercase tracking-wider">
                        <span class="bg-teal-100 text-teal-700 rounded-full w-6 h-6 flex items-center justify-center mr-2 text-xs">4</span>
                        繰り返し（ループ）設定
                    </label>
                    <div class="p-4 bg-gradient-to-r from-teal-50 to-emerald-50 rounded-xl border border-teal-200">
                        <div class="flex flex-wrap gap-3">
                            <label class="cursor-pointer relative">
                                <input type="radio" name="loop" value="infinite" checked class="peer sr-only">
                                <div class="px-4 py-2.5 rounded-lg border border-teal-200 bg-white text-xs font-bold text-gray-700 transition-all hover:shadow-md peer-checked:border-teal-500 peer-checked:bg-teal-400 peer-checked:text-teal-900 peer-checked:shadow-inner flex items-center">
                                    🔄 無限ループ
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="loop" value="once" class="peer sr-only">
                                <div class="px-4 py-2.5 rounded-lg border border-teal-200 bg-white text-xs font-bold text-gray-700 transition-all hover:shadow-md peer-checked:border-teal-500 peer-checked:bg-teal-400 peer-checked:text-teal-900 peer-checked:shadow-inner flex items-center">
                                    ⏱️ 1回だけ再生して停止
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

            </div>

            <!-- 【右カラム】完成プレビュー画面 (全体の5/12幅 & スクロール追従) -->
            <div class="lg:col-span-5 xl:col-span-4 lg:sticky lg:top-8 space-y-6">
                
                <!-- 操作とプレビューを統合したスタイリッシュな右パネル -->
                <div class="bg-white/80 backdrop-blur-md p-6 sm:p-8 rounded-2xl shadow-xl border border-white/50 space-y-6">
                    
                    <!-- 5. 魔法をかけるボタン -->
                    <div class="bg-gradient-to-r from-blue-50/50 to-purple-50/50 p-4 rounded-xl border border-blue-100/50">
                        <label class="flex items-center text-xs font-bold text-blue-700 mb-2.5 uppercase tracking-wider">
                            <span class="bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center mr-2 text-[10px]">GO</span>
                            アニメーションの生成
                        </label>
                        <button id="generateBtn" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-extrabold py-3.5 px-6 rounded-full transition-all transform hover:-translate-y-0.5 hover:shadow-xl w-full shadow-lg text-base flex items-center justify-center mx-auto">
                            <svg class="w-5 h-5 mr-2 animate-spin hidden" id="spinner" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span id="btnText">魔法をかける！</span>
                        </button>
                        <p id="loadingMsg" class="text-blue-600 mt-3 text-center hidden text-xs animate-pulse font-bold">🪄 一生懸命作成しています...</p>
                    </div>

                    <div class="border-t border-gray-200/60 my-2"></div>

                    <h2 class="text-xl font-extrabold text-gray-800 mb-2 flex items-center">
                        <span class="mr-2">🎉</span>
                        プレビュー＆ダウンロード
                    </h2>

                    <!-- デフォルト時のプレースホルダー -->
                    <div id="placeholderArea" class="flex flex-col items-center justify-center bg-gray-50/50 rounded-2xl p-6 min-h-[300px] border-2 border-dashed border-gray-200 text-center">
                        <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-4 shadow-sm">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <p class="text-gray-500 text-sm font-bold mb-1">まだアニメが作成されていません</p>
                        <p class="text-gray-400 text-xs max-w-[200px]">上の設定を終えたら「魔法をかける！」ボタンを押してくださいね。</p>
                    </div>

                    <!-- 完成後の表示部分（最初は非表示） -->
                    <div id="resultArea" class="hidden space-y-4">
                        <div class="flex justify-center bg-gray-50 rounded-2xl p-4 min-h-[250px] items-center border border-gray-100 shadow-inner">
                            <img id="previewImg" src="" alt="プレビュー" class="max-w-full max-h-[320px] rounded-lg shadow-md">
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2 justify-center">
                            <button id="replayBtn" class="inline-flex items-center justify-center bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-3 px-5 rounded-full transition-all text-sm border border-blue-200 shadow-sm">
                                🔁 もう一度再生
                            </button>
                            <a id="downloadLink" href="#" download="animated.gif" class="inline-flex items-center justify-center bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3.5 px-6 rounded-full transition-all transform hover:-translate-y-1 hover:shadow-lg shadow-md text-base flex-1">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                </svg>
                                ダウンロード
                            </a>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- 画像を処理するための見えないキャンバス -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const imageInput = document.getElementById('imageInput');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const effectCheckboxes = document.getElementsByName('effect');
        const formatRadios = document.getElementsByName('format');
        const loopRadios = document.getElementsByName('loop');
        const placeholderArea = document.getElementById('placeholderArea');
        const resultArea = document.getElementById('resultArea');
        const replayBtn = document.getElementById('replayBtn');
        const clearEffectsBtn = document.getElementById('clearEffectsBtn');
        
        let previewImg = document.getElementById('previewImg');
        
        const downloadLink = document.getElementById('downloadLink');
        const loadingMsg = document.getElementById('loadingMsg');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let loadedImage = new Image();
        loadedImage.crossOrigin = "anonymous";

        // エフェクト選択をすべてクリアするボタン
        clearEffectsBtn.addEventListener('click', function() {
            effectCheckboxes.forEach(cb => cb.checked = false);
        });

        // CRC32計算用のハックテーブル（APNG書き換え用）
        const crcTable = [];
        for (let n = 0; n < 256; n++) {
            let k = n;
            for (let i = 0; i < 8; i++) {
                if (k & 1) k = 0xedb88320 ^ (k >>> 1);
                else k = k >>> 1;
            }
            crcTable[n] = k;
        }

        function crc32(uint8Array) {
            let c = 0xffffffff;
            for (let i = 0; i < uint8Array.length; i++) {
                c = crcTable[(c ^ uint8Array[i]) & 0xff] ^ (c >>> 8);
            }
            return (c ^ 0xffffffff) >>> 0;
        }

        // APNGバイナリのacTLチャンク（ループパラメータ）を強制上書きしてCRCを再計算するハック
        function setApngLoopCount(arrayBuffer, loopCount) {
            const view = new DataView(arrayBuffer);
            const len = arrayBuffer.byteLength;
            let offset = 8;

            while (offset < len) {
                if (offset + 8 > len) break;
                const chunkLength = view.getUint32(offset);
                if (offset + 12 + chunkLength > len) break;
                
                const chunkType = String.fromCharCode(
                    view.getUint8(offset + 4),
                    view.getUint8(offset + 5),
                    view.getUint8(offset + 6),
                    view.getUint8(offset + 7)
                );

                if (chunkType === "acTL") {
                    view.setUint32(offset + 12, loopCount);
                    const crcData = new Uint8Array(arrayBuffer, offset + 4, 12);
                    const crc = crc32(crcData);
                    view.setUint32(offset + 16, crc);
                    break;
                }
                offset += 12 + chunkLength;
            }
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                loadedImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        generateBtn.addEventListener('click', function() {
            if (!loadedImage.src) {
                alert('まずは画像を選択してくださいね！');
                return;
            }

            // 選択されたエフェクトの一覧（配列）を取得する
            let selectedEffects = [];
            effectCheckboxes.forEach(cb => { if (cb.checked) selectedEffects.push(cb.value); });
            
            if (selectedEffects.length === 0) {
                alert('エフェクトを1つ以上選んでくださいね！');
                return;
            }

            // UIを処理中状態にする
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-75', 'cursor-not-allowed');
            spinner.classList.remove('hidden');
            btnText.textContent = "作成中...";
            loadingMsg.classList.remove('hidden');
            
            resultArea.classList.add('hidden');
            placeholderArea.classList.remove('hidden');

            let selectedFormat = 'gif';
            formatRadios.forEach(radio => { if (radio.checked) selectedFormat = radio.value; });

            let selectedLoop = 'infinite';
            loopRadios.forEach(radio => { if (radio.checked) selectedLoop = radio.value; });

            setTimeout(() => {
                createAnimation(selectedEffects, selectedFormat, selectedLoop);
            }, 50);
        });

        function createAnimation(effects, format, loopSetting) {
            const maxSize = 500;
            let width = loadedImage.width;
            let height = loadedImage.height;
            
            if (width > maxSize || height > maxSize) {
                if (width > height) {
                    height = Math.floor(height * (maxSize / width));
                    width = maxSize;
                } else {
                    width = Math.floor(width * (maxSize / height));
                    height = maxSize;
                }
            }

            canvas.width = width;
            canvas.height = height;

            const framesAPNG = []; 
            const framesGIF = [];  
            const delays = [];     
            const frameCount = 10; 

            // 1コマずつ描画
            for (let i = 0; i < frameCount; i++) {
                const progress = i / (frameCount - 1);

                ctx.clearRect(0, 0, width, height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.globalAlpha = 1.0;
                ctx.filter = 'none';

                // 背景色の決定（白背景、黒背景を含むエフェクトが選ばれているか）
                let hasWhiteBg = false;
                let hasBlackBg = false;
                
                if (format === 'gif') {
                    // GIFは透過の残像を防ぐため、デフォルトでクリーンな白背景を敷く
                    hasWhiteBg = true;
                }
                
                effects.forEach(eff => {
                    if (eff.includes('White') || eff === 'fadeInWhite' || eff === 'fadeOutWhite') {
                        hasWhiteBg = true;
                        hasBlackBg = false;
                    }
                    else if (eff.includes('Black') || eff === 'fadeInBlack' || eff === 'fadeOutBlack') {
                        hasBlackBg = true;
                        hasWhiteBg = false;
                    }
                });

                if (hasWhiteBg) {
                    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, width, height);
                } else if (hasBlackBg) {
                    ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, width, height);
                }

                // ==========================================
                // 1. 不透明度(フェード)・フィルター(色・ぼかし)の設定
                // ==========================================
                let filterString = '';
                effects.forEach(eff => {
                    if (eff === 'rainbow') {
                        filterString += ` hue-rotate(${progress * 360}deg)`;
                    }
                    if (eff === 'blur') {
                        filterString += ` blur(${progress * 15}px)`;
                    }
                    if (eff.startsWith('fadeIn')) {
                        ctx.globalAlpha *= progress;
                    }
                    if (eff.startsWith('fadeOut')) {
                        ctx.globalAlpha *= (1.0 - progress);
                    }
                    // ズームイン/アウトに白黒背景が付随する場合の自動フェードアウト
                    if (eff.startsWith('zoom') && (eff.includes('White') || eff.includes('Black'))) {
                        ctx.globalAlpha *= Math.max(0, 1.0 - progress);
                    }
                });

                if (filterString.trim() !== '') {
                    ctx.filter = filterString.trim();
                }

                // ==========================================
                // 2. 座標系の変形（スケール、回転、移動の重ね合わせ）
                // ==========================================
                
                // 回転・スケール・ぷるぷるなど「画像の中心」を軸としたい変形の一括適用
                let hasCenterTransform = false;
                effects.forEach(eff => {
                    if (eff.startsWith('rotate') || eff.startsWith('zoom') || eff === 'slime' || eff === 'heartbeat' || eff === 'tornado') {
                        hasCenterTransform = true;
                    }
                });

                if (hasCenterTransform) {
                    ctx.translate(width / 2, height / 2);
                }

                effects.forEach(eff => {
                    if (eff === 'shake') {
                        // 揺らし成分を適用
                        const offsetX = (Math.random() - 0.5) * (width * 0.05);
                        const offsetY = (Math.random() - 0.5) * (height * 0.05);
                        // 中心を軸にしているかどうかでオフセット方向を補正
                        ctx.translate(offsetX, offsetY);
                    }
                    if (eff.startsWith('zoom')) {
                        let scale = 1.0;
                        if (eff.includes('In')) scale = 1.0 + progress * 0.5;
                        else scale = (eff.includes('White') || eff.includes('Black')) ? Math.max(0, 1.0 - progress) : 1.0 - progress * 0.5;
                        ctx.scale(scale, scale);
                    }
                    if (effect.startsWith('rotate')) {
                        let angle = progress * (2 * Math.PI);
                        if (eff === 'rotateLeft') angle = -angle; 
                        ctx.rotate(angle);
                    }
                    if (eff === 'slime') {
                        const scaleX = 1.0 + Math.sin(progress * Math.PI * 4) * 0.15;
                        const scaleY = 1.0 - Math.sin(progress * Math.PI * 4) * 0.15;
                        ctx.scale(scaleX, scaleY);
                    }
                    if (eff === 'heartbeat') {
                        let scale = 1.0;
                        if (i === 2 || i === 5) scale = 1.15;
                        ctx.scale(scale, scale);
                    }
                    if (eff === 'tornado') {
                        ctx.rotate(progress * Math.PI * 4);
                        ctx.scale(progress, progress);
                    }
                });

                if (hasCenterTransform) {
                    ctx.translate(-width / 2, -height / 2);
                }

                // 中心軸ではない全体平行移動（移動、バウンド、振り子）の適用
                effects.forEach(eff => {
                    if (eff.startsWith('move')) {
                        let dx = 0; let dy = 0;
                        if (eff.includes('Down')) dy = (progress - 1.0) * height;
                        else if (eff.includes('Up')) dy = (1.0 - progress) * height;
                        if (eff.includes('Left')) dx = (1.0 - progress) * width;
                        else if (eff.includes('Right')) dx = (progress - 1.0) * width;
                        ctx.translate(dx, dy);
                    }
                    if (eff === 'bounce') {
                        const bounceY = -Math.abs(Math.sin(progress * Math.PI * 2)) * (height * 0.2);
                        ctx.translate(0, bounceY);
                    }
                    if (eff === 'pendulum') {
                        ctx.translate(width / 2, 0);
                        ctx.rotate(Math.sin(progress * Math.PI * 2) * 0.2);
                        ctx.translate(-width / 2, 0);
                    }
                });

                // ==========================================
                // 3. 基本画像の描画
                // ==========================================
                let isScatter = effects.includes('scatter');
                let isWave = effects.includes('wave');
                let isMosaic = effects.includes('mosaic');

                if (isScatter) {
                    for (let j = 0; j < 5; j++) {
                        const size = width * (0.3 + Math.random() * 0.4);
                        const x = Math.random() * (width - size);
                        const y = Math.random() * (height - size);
                        ctx.drawImage(loadedImage, x, y, size, size);
                    }
                } 
                else if (isWave) {
                    for (let y = 0; y < height; y += 4) {
                        const offsetX = Math.sin((y * 0.05) + (progress * Math.PI * 4)) * (width * 0.05);
                        ctx.drawImage(loadedImage, 0, y, width, 4, offsetX, y, width, 4);
                    }
                }
                else if (isMosaic) {
                    const ratio = Math.max(0.01, 1.0 - progress * 0.95); 
                    const tWidth = Math.max(1, width * ratio);
                    const tHeight = Math.max(1, height * ratio);
                    
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = tWidth; tempCanvas.height = tHeight;
                    tempCanvas.getContext('2d').drawImage(loadedImage, 0, 0, tWidth, tHeight);
                    
                    ctx.imageSmoothingEnabled = false;
                    ctx.drawImage(tempCanvas, 0, 0, width, height);
                    ctx.imageSmoothingEnabled = true;
                }
                else {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }

                // ==========================================
                // 4. 後処理・オーバーレイループ (グリッチノイズ等)
                // ==========================================
                if (effects.includes('glitch')) {
                    if (Math.random() > 0.3) {
                        const prevAlpha = ctx.globalAlpha;
                        ctx.globalAlpha = 0.5;
                        ctx.drawImage(loadedImage, (Math.random() - 0.5) * 20, 0, width, height);
                        ctx.globalAlpha = prevAlpha;
                        for (let k = 0; k < 4; k++) {
                            const sliceY = Math.random() * height;
                            const sliceH = Math.random() * (height * 0.15);
                            const sliceX = (Math.random() - 0.5) * (width * 0.15);
                            ctx.drawImage(canvas, 0, sliceY, width, sliceH, sliceX, sliceY, width, sliceH);
                        }
                    }
                }

                if (format === 'apng') {
                    const imageData = ctx.getImageData(0, 0, width, height);
                    framesAPNG.push(imageData.data.buffer);
                    delays.push(150);
                } else {
                    framesGIF.push(canvas.toDataURL('image/png'));
                }
            }

            // ループ設定パラメータ（APNG: 0は無限、1は1回 / GIF: 0は無限、nullはループなし）
            const numLoopsAPNG = (loopSetting === 'once') ? 1 : 0;
            const numLoopsGIF = (loopSetting === 'once') ? null : 0;

            if (format === 'apng') {
                const apngArrayBuffer = UPNG.encode(framesAPNG, width, height, 0, delays, numLoopsAPNG);
                setApngLoopCount(apngArrayBuffer, numLoopsAPNG);

                const blob = new Blob([apngArrayBuffer], { type: 'image/png' });
                const url = URL.createObjectURL(blob);
                finishGeneration(url, 'animated.png');
            } else {
                gifshot.createGIF({
                    images: framesGIF,
                    interval: 0.15,
                    gifWidth: width,
                    gifHeight: height,
                    numWorkers: 0, 
                    loop: numLoopsGIF 
                }, function(obj) {
                    if (!obj.error) {
                        finishGeneration(obj.image, 'animated.gif');
                    } else {
                        alert('GIFの作成に失敗しました。別の画像で試してみてください。');
                        resetButton();
                    }
                });
            }
        }

        function finishGeneration(url, filename) {
            if (previewImg.src && previewImg.src.startsWith('blob:')) {
                URL.revokeObjectURL(previewImg.src);
            }

            const newImg = document.createElement('img');
            newImg.id = 'previewImg';
            newImg.alt = 'プレビュー';
            newImg.className = 'max-w-full max-h-[320px] rounded-lg shadow-md';
            newImg.src = url;

            const parent = previewImg.parentNode;
            parent.replaceChild(newImg, previewImg);
            previewImg = newImg;

            downloadLink.href = url;
            downloadLink.download = filename;
            resetButton();
            placeholderArea.classList.add('hidden'); 
            resultArea.classList.remove('hidden');    
        }

        replayBtn.addEventListener('click', function() {
            if (!previewImg || !previewImg.src) return;
            const currentSrc = previewImg.src;
            previewImg.src = "";
            setTimeout(() => {
                previewImg.src = currentSrc;
            }, 50);
        });

        function resetButton() {
            loadingMsg.classList.add('hidden');
            generateBtn.disabled = false;
            generateBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            spinner.classList.add('hidden');
            btnText.textContent = "魔法をかける！";
        }
    </script>
</body>

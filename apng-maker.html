<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡単アニメ画像メーカー</title>
    <!-- 見た目を整えるTailwind CSSを読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- APNGを生成するためのライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/1.0.11/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <!-- GIFを生成するためのライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-cyan-50 min-h-screen p-4 sm:p-8 text-gray-800 font-sans">
    <div class="max-w-7xl mx-auto">
        
        <!-- ヘッダー部分 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-2">
                ✨ 簡単アニメ画像メーカー
            </h1>
            <p class="text-gray-500 font-medium">画像をアップロードして、魔法のエフェクトをかけよう！</p>
        </div>

        <!-- 左右2カラムのコンテナ -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- 【左カラム】設定・操作メニュー (全体の7/12幅) -->
            <div class="lg:col-span-7 xl:col-span-8 bg-white/80 backdrop-blur-md p-6 sm:p-8 rounded-2xl shadow-xl border border-white/50 space-y-6">
                
                <!-- 1. 画像アップロード部分 -->
                <div>
                    <label class="flex items-center text-sm font-bold text-gray-700 mb-3 uppercase tracking-wider">
                        <span class="bg-blue-100 text-blue-700 rounded-full w-6 h-6 flex items-center justify-center mr-2 text-xs">1</span>
                        画像を選ぶ
                    </label>
                    <div class="relative">
                        <input type="file" id="imageInput" accept="image/png, image/jpeg, image/gif" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gradient-to-r file:from-blue-50 file:to-indigo-50 file:text-blue-700 hover:file:bg-indigo-100 transition-colors cursor-pointer border-2 border-dashed border-blue-200 rounded-xl p-4 bg-white/50 hover:bg-white hover:border-blue-400 focus:outline-none">
                    </div>
                </div>

                <!-- 2. エフェクト選択部分 -->
                <div>
                    <label class="flex items-center text-sm font-bold text-gray-700 mb-4 uppercase tracking-wider">
                        <span class="bg-purple-100 text-purple-700 rounded-full w-6 h-6 flex items-center justify-center mr-2 text-xs">2</span>
                        エフェクトを選ぶ（1つ選んでね）
                    </label>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- 🌟 基本のエフェクト -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-gray-800 mb-3"><span class="text-base mr-2">🌟</span> 基本エフェクト</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="shake" class="peer sr-only" checked>
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">揺らす</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="blink" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">点滅する</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="scatter" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">散らばる</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="zoomIn" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームイン</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="zoomOut" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームアウト</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="zoomInWhite" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームイン(白)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="zoomOutWhite" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームアウト(白)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="zoomInBlack" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームイン(黒)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="zoomOutBlack" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 peer-checked:ring-1 peer-checked:ring-blue-500 shadow-sm">ズームアウト(黒)</div>
                                </label>
                            </div>
                        </div>

                        <!-- 🌀 回転・移動 -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-blue-800 mb-3"><span class="text-base mr-2">🌀</span> 回転・移動</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="rotateRight" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">右回転</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="rotateLeft" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">左回転</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="moveDown" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">上から下</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="moveUp" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">下から上</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="moveLeft" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">右から左</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="moveDownRight" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-blue-100 bg-blue-50/50 text-xs font-medium text-blue-600 transition-all hover:bg-blue-100 peer-checked:border-blue-500 peer-checked:bg-blue-500 peer-checked:text-white shadow-sm">斜め移動</div>
                                </label>
                            </div>
                        </div>

                        <!-- 🎨 魔法・色 -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-purple-800 mb-3"><span class="text-base mr-2">🎨</span> 魔法・色</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="rainbow" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">🌈 虹色変化</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="fadeInWhite" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-505 peer-checked:text-white shadow-sm">👻 Fイン(白)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="fadeInBlack" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">🖤 Fイン(黒)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="fadeOutWhite" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">🌫️ Fアウト(白)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="fadeOutBlack" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">🖤 Fアウト(黒)</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="blur" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">💧 ぼかす</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="mosaic" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-purple-100 bg-purple-50/50 text-xs font-medium text-purple-600 transition-all hover:bg-purple-100 peer-checked:border-purple-500 peer-checked:bg-purple-500 peer-checked:text-white shadow-sm">👾 モザイク</div>
                                </label>
                            </div>
                        </div>

                        <!-- 👻 ユニーク・かっこいい演出 -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-orange-800 mb-3"><span class="text-base mr-2">🎬</span> ユニーク・演出</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="slime" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🍮 ぷるぷる</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="wave" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🌊 波打ち</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="heartbeat" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">❤️ 鼓動</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="bounce" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🏀 バウンド</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="pendulum" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🕰️ 振り子</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="tornado" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">🌪️ 竜巻</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="glitch" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-orange-100 bg-orange-50/50 text-xs font-medium text-orange-600 transition-all hover:bg-orange-100 peer-checked:border-orange-500 peer-checked:bg-orange-500 peer-checked:text-white shadow-sm">📺 ノイズ</div>
                                </label>
                            </div>
                        </div>

                        <!-- 💥 破壊・ダメージ -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-red-800 mb-3"><span class="text-base mr-2">💥</span> 破壊・ダメージ</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="shatter" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-red-100 bg-red-50/50 text-xs font-medium text-red-600 transition-all hover:bg-red-100 peer-checked:border-red-500 peer-checked:bg-red-500 peer-checked:text-white shadow-sm">💥 砕け散る</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="glassCrack" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-red-100 bg-red-50/50 text-xs font-medium text-red-600 transition-all hover:bg-red-100 peer-checked:border-red-500 peer-checked:bg-red-500 peer-checked:text-white shadow-sm">⚡ ガラスヒビ割れ</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="glassShatter" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-red-100 bg-red-50/50 text-xs font-medium text-red-600 transition-all hover:bg-red-100 peer-checked:border-red-500 peer-checked:bg-red-500 peer-checked:text-white shadow-sm">🌩️ ガラス割れ砕け</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="bullet" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-red-100 bg-red-50/50 text-xs font-medium text-red-600 transition-all hover:bg-red-100 peer-checked:border-red-500 peer-checked:bg-red-500 peer-checked:text-white shadow-sm">🎯 銃弾</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="burn" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-red-100 bg-red-50/50 text-xs font-medium text-red-600 transition-all hover:bg-red-100 peer-checked:border-red-500 peer-checked:bg-red-500 peer-checked:text-white shadow-sm">🔥 燃える</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="rubble" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-red-100 bg-red-50/50 text-xs font-medium text-red-600 transition-all hover:bg-red-100 peer-checked:border-red-500 peer-checked:bg-red-500 peer-checked:text-white shadow-sm">🧱 瓦礫化</div>
                                </label>
                            </div>
                        </div>

                        <!-- 🎞️ トランジション -->
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <span class="flex items-center text-sm font-bold text-gray-800 mb-3"><span class="text-base mr-2">🎞️</span> トランジション</span>
                            <div class="flex flex-wrap gap-1.5">
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="curtain" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-gray-500 peer-checked:bg-gray-600 peer-checked:text-white shadow-sm">🎭 幕引き</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="shutterIn" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-gray-500 peer-checked:bg-gray-600 peer-checked:text-white shadow-sm">📷 シャッターIn</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="shutterOut" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-gray-500 peer-checked:bg-gray-600 peer-checked:text-white shadow-sm">📸 シャッターOut</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="blindIn" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-gray-500 peer-checked:bg-gray-600 peer-checked:text-white shadow-sm">🪟 縦ブラインドIn</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="blindOut" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-gray-500 peer-checked:bg-gray-600 peer-checked:text-white shadow-sm">🪟 縦ブラインドOut</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="hBlindIn" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-gray-500 peer-checked:bg-gray-600 peer-checked:text-white shadow-sm">🪟 横ブラインドIn</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="hBlindOut" class="peer sr-only">
                                    <div class="px-2.5 py-1.5 rounded-lg border border-gray-200 bg-gray-50 text-xs font-medium text-gray-600 transition-all hover:bg-gray-100 peer-checked:border-gray-500 peer-checked:bg-gray-600 peer-checked:text-white shadow-sm">🪟 横ブラインドOut</div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" name="effect" value="blinkIn" class="peer sr-only">

        const imageInput = document.getElementById('imageInput');

        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const effectRadios = document.getElementsByName('effect');
        const formatRadios = document.getElementsByName('format');
        const loopRadios = document.getElementsByName('loop');

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let loadedImage = new Image();
        loadedImage.crossOrigin = "anonymous";

        // CRC32計算用のハックテーブル（APNG書き換え用）
        const crcTable = [];
        for (let n = 0; n < 256; n++) {
            let k = n;
            for (let i = 0; i < 8; i++) {
                if (k & 1) k = 0xedb88320 ^ (k >>> 1);
                else k = k >>> 1;
            }
            crcTable[n] = k;
        }

        function crc32(uint8Array) {
            let c = 0xffffffff;
            for (let i = 0; i < uint8Array.length; i++) {
                c = crcTable[(c ^ uint8Array[i]) & 0xff] ^ (c >>> 8);
            }
            return (c ^ 0xffffffff) >>> 0;
        }

        // APNGバイナリのacTLチャンク（ループパラメータ）を強制上書きしてCRCを再計算するハック
        function setApngLoopCount(arrayBuffer, loopCount) {
            const view = new DataView(arrayBuffer);
            const len = arrayBuffer.byteLength;
            let offset = 8;

            while (offset < len) {
                if (offset + 8 > len) break;
                const chunkLength = view.getUint32(offset);
                if (offset + 12 + chunkLength > len) break;
                
                const chunkType = String.fromCharCode(
                    view.getUint8(offset + 4),
                    view.getUint8(offset + 5),
                    view.getUint8(offset + 6),
                    view.getUint8(offset + 7)
                );

                if (chunkType === "acTL") {
                    view.setUint32(offset + 12, loopCount);
                    const crcData = new Uint8Array(arrayBuffer, offset + 4, 12);
                    const crc = crc32(crcData);
                    view.setUint32(offset + 16, crc);
                    break;
                }
                offset += 12 + chunkLength;
            }
        }

        // Base64データをバイト配列に直す関数（GIFハック用）
        function base64ToUint8Array(base64) {
            const binaryString = atob(base64.split(',')[1]);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes;
        }

        // GIFバイナリを直接書き換えて「ループ停止設定」を確実にファイルに刻む独自ハック
        function setGifLoopCount(uint8Array, loopCount) {
            const needle = [0x4e, 0x45, 0x54, 0x53, 0x43, 0x41, 0x50, 0x45, 0x32, 0x2e, 0x30]; // "NETSCAPE2.0"
            let foundOffset = -1;
            
            for (let i = 0; i < uint8Array.length - needle.length; i++) {
                let match = true;
                for (let j = 0; j < needle.length; j++) {
                    if (uint8Array[i + j] !== needle[j]) {
                        match = false;
                        break;
                    }
                }
                if (match) {
                    foundOffset = i;
                    break;
                }
            }
            
            if (foundOffset !== -1) {
                if (uint8Array[foundOffset + 11] === 3 && uint8Array[foundOffset + 12] === 1) {
                    uint8Array[foundOffset + 13] = loopCount & 0xff;
                    uint8Array[foundOffset + 14] = (loopCount >> 8) & 0xff;
                }
            }
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                loadedImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        generateBtn.addEventListener('click', function() {
            if (!loadedImage.src) {
                alert('まずは画像を選択してくださいね！');
                return;
            }

            // UIを処理中状態にする
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-75', 'cursor-not-allowed');
            spinner.classList.remove('hidden');
            btnText.textContent = "作成中...";
            loadingMsg.classList.remove('hidden');
            
            resultArea.classList.add('hidden');
            placeholderArea.classList.remove('hidden');

            let selectedEffect = 'shake';
            effectRadios.forEach(radio => { if (radio.checked) selectedEffect = radio.value; });
            
            let selectedFormat = 'gif';
            formatRadios.forEach(radio => { if (radio.checked) selectedFormat = radio.value; });

            let selectedLoop = 'infinite';
            loopRadios.forEach(radio => { if (radio.checked) selectedLoop = radio.value; });

            setTimeout(() => {
                createAnimation(selectedEffect, selectedFormat, selectedLoop);
            }, 50);
        });

        function createAnimation(effect, format, loopSetting) {
            const maxSize = 500;
            let width = loadedImage.width;
            let height = loadedImage.height;
            
            if (width > maxSize || height > maxSize) {
                if (width > height) {
                    height = Math.floor(height * (maxSize / width));
                    width = maxSize;
                } else {
                    width = Math.floor(width * (maxSize / height));
                    height = maxSize;
                }
            }

            let paddingX = 0;
            let paddingY = 0;
            const uniqueEffects = ['slime', 'wave', 'heartbeat', 'bounce', 'pendulum', 'tornado', 'glitch'];
            if (uniqueEffects.includes(effect)) {
                paddingX = Math.floor(width * 0.2);
                paddingY = Math.floor(height * 0.2);
            }

            const canvasWidth = width + paddingX * 2;
            const canvasHeight = height + paddingY * 2;

            canvas.width = canvasWidth;
            canvas.height = canvasHeight;

            const framesAPNG = []; 
            const framesGIF = [];  
            const delays = [];     
            
            let frameCount = 10;
            const longEffects = ['burn', 'shatter', 'glassShatter', 'rubble'];
            if (longEffects.includes(effect)) {
                frameCount = 30; // 25 -> 30 
            } else if (['snow', 'leaves', 'cherryBlossoms'].includes(effect)) {
                frameCount = 40; // もっと長く
            }

            let particles = [];
            let pieces = [];
            let splashes = [];
            let drips = [];
            let bullets = [];

            if (['rain', 'heavyRain'].includes(effect)) {
                const count = effect === 'heavyRain' ? 150 : 60;
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvasWidth,
                        y: Math.random() * canvasHeight,
                        len: effect === 'heavyRain' ? 30 + Math.random() * 20 : 15 + Math.random() * 10,
                        speed: effect === 'heavyRain' ? 25 + Math.random() * 10 : 15 + Math.random() * 5
                    });
                }
            } else if (effect === 'snow') {
                for (let i = 0; i < 80; i++) {
                    particles.push({
                        x: Math.random() * canvasWidth,
                        y: Math.random() * canvasHeight,
                        size: 2 + Math.random() * 4,
                        speedY: 2 + Math.random() * 3,
                        speedX: (Math.random() - 0.5) * 2,
                        angle: Math.random() * Math.PI * 2
                    });
                }
            } else if (['leaves', 'cherryBlossoms'].includes(effect)) {
                for (let i = 0; i < 40; i++) {
                    particles.push({
                        x: Math.random() * canvasWidth,
                        y: Math.random() * canvasHeight,
                        size: 10 + Math.random() * 10,
                        speedY: 3 + Math.random() * 4,
                        speedX: 1 + Math.random() * 3,
                        rot: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.2
                    });
                }
            } else if (['sparkles', 'sparklesYellow', 'sparklesPastel', 'stars', 'hearts'].includes(effect)) {
                for (let i = 0; i < 30; i++) {
                    let c = '#fff';
                    if (effect === 'sparklesYellow' || effect === 'stars') c = '#FFD700';
                    else if (effect === 'hearts') c = '#FF69B4';
                    else if (effect === 'sparklesPastel') c = `hsl(${Math.random() * 360}, 100%, 75%)`;
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        baseSize: 20 + Math.random() * 30, // 星やハートを大きく
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.1 + Math.random() * 0.2,
                        color: c
                    });
                }
            } else if (['shatter', 'rubble', 'glassShatter'].includes(effect)) {
                if (effect === 'shatter') {
                    const cols = 6; const rows = 6;
                    const w = width / cols; const h = height / rows;
                    for (let y = 0; y < rows; y++) {
                        for (let x = 0; x < cols; x++) {
                            pieces.push({
                                type: 'rect', sx: x * w, sy: y * h, w: w, h: h, dx: x * w, dy: y * h,
                                vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, rot: 0, vrot: (Math.random() - 0.5) * 0.3
                            });
                        }
                    }
                } else if (effect === 'rubble') {
                    const cols = 5; const rows = 5;
                    const pts = [];
                    for(let y=0; y<=rows; y++){
                        let row = [];
                        for(let x=0; x<=cols; x++){
                            let px = (x/cols)*width;
                            let py = (y/rows)*height;
                            if (x>0 && x<cols) px += (Math.random()-0.5) * (width/cols)*0.8;
                            if (y>0 && y<rows) py += (Math.random()-0.5) * (height/rows)*0.8;
                            row.push({x:px, y:py});
                        }
                        pts.push(row);
                    }
                    for(let y=0; y<rows; y++){
                        for(let x=0; x<cols; x++){
                            let p1 = pts[y][x], p2 = pts[y][x+1], p3 = pts[y+1][x], p4 = pts[y+1][x+1];
                            let cx1 = (p1.x+p2.x+p3.x)/3, cy1 = (p1.y+p2.y+p3.y)/3;
                            pieces.push({ type:'poly', pts:[p1, p2, p3], cx: cx1, cy: cy1, x: cx1, y: cy1,
                                vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10-5, rot:0, vrot:(Math.random()-0.5)*0.2 });
                            let cx2 = (p2.x+p4.x+p3.x)/3, cy2 = (p2.y+p4.y+p3.y)/3;
                            pieces.push({ type:'poly', pts:[p2, p4, p3], cx: cx2, cy: cy2, x: cx2, y: cy2,
                                vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10-5, rot:0, vrot:(Math.random()-0.5)*0.2 });
                        }
                    }
                } else if (effect === 'glassShatter') {
                    const cx = width/2, cy = height/2;
                    const rings = 4;
                    const segments = 8;
                    const pts = [];
                    pts.push({x: cx, y: cy}); 
                    for(let r=1; r<=rings; r++){
                        let rRad = (r/rings)*width*0.8;
                        let ringPts = [];
                        for(let s=0; s<segments; s++){
                            let angle = (s/segments)*Math.PI*2 + (Math.random()-0.5)*0.3;
                            let rad = rRad + (Math.random()-0.5)*(width*0.1);
                            ringPts.push({x: cx + Math.cos(angle)*rad, y: cy + Math.sin(angle)*rad});
                        }
                        pts.push(ringPts);
                    }
                    for(let s=0; s<segments; s++){
                        let sNext = (s+1)%segments;
                        let p1 = pts[0]; 
                        let p2 = pts[1][s];
                        let p3 = pts[1][sNext];
                        let cxt = (p1.x+p2.x+p3.x)/3, cyt = (p1.y+p2.y+p3.y)/3;
                        pieces.push({ type:'poly', pts:[p1, p2, p3], cx:cxt, cy:cyt, x:cxt, y:cyt, vx:(cxt-cx)*0.1, vy:(cyt-cy)*0.1, rot:0, vrot:(Math.random()-0.5)*0.2 });
                        for(let r=1; r<rings; r++){
                            let pA = pts[r][s], pB = pts[r][sNext], pC = pts[r+1][s], pD = pts[r+1][sNext];
                            let c1x=(pA.x+pB.x+pC.x)/3, c1y=(pA.y+pB.y+pC.y)/3;
                            pieces.push({ type:'poly', pts:[pA, pB, pC], cx:c1x, cy:c1y, x:c1x, y:c1y, vx:(c1x-cx)*0.08, vy:(c1y-cy)*0.08, rot:0, vrot:(Math.random()-0.5)*0.2 });
                            let c2x=(pB.x+pD.x+pC.x)/3, c2y=(pB.y+pD.y+pC.y)/3;
                            pieces.push({ type:'poly', pts:[pB, pD, pC], cx:c2x, cy:c2y, x:c2x, y:c2y, vx:(c2x-cx)*0.08, vy:(c2y-cy)*0.08, rot:0, vrot:(Math.random()-0.5)*0.2 });
                        }
                    }
                }
            } else if (['liquidSplash', 'redPaint'].includes(effect)) {
                for (let i = 0; i < 3; i++) {
                    splashes.push({
                        x: width * 0.2 + Math.random() * width * 0.6,
                        y: height * 0.2 + Math.random() * height * 0.6,
                        size: width * 0.1 + Math.random() * width * 0.1
                    });
                }
            } else if (effect === 'drip') {
                for (let i = 0; i < 12; i++) {
                    drips.push({
                        x: Math.random() * width,
                        y: 0,
                        targetLen: height * 0.3 + Math.random() * height * 0.6,
                        width: 5 + Math.random() * 8
                    });
                }
            } else if (effect === 'bullet') {
                for (let i = 0; i < 5; i++) {
                    bullets.push({
                        x: width * 0.1 + Math.random() * width * 0.8,
                        y: height * 0.1 + Math.random() * height * 0.8,
                        frame: Math.floor(Math.random() * 8)
                    });
                }
                bullets.sort((a,b)=>a.frame-b.frame);
            }

            // 1コマずつ描画
            for (let i = 0; i < frameCount; i++) {
                const progress = i / (frameCount - 1);

                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.globalAlpha = 1.0;
                ctx.filter = 'none';

                if (format === 'gif') {
                    if (effect.includes('Black') || effect === 'fadeInBlack' || effect === 'fadeOutBlack') {
                        ctx.fillStyle = '#000000';
                    } else {
                        ctx.fillStyle = '#ffffff'; 
                    }
                    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                } else {
                    if (effect.includes('White') || effect === 'fadeInWhite' || effect === 'fadeOutWhite') {
                        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                    } else if (effect.includes('Black') || effect === 'fadeInBlack' || effect === 'fadeOutBlack') {
                        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                    }
                }

                ctx.translate(paddingX, paddingY);

                if (effect === 'shake') {
                    const offsetX = (Math.random() - 0.5) * (width * 0.05);
                    const offsetY = (Math.random() - 0.5) * (height * 0.05);
                    ctx.drawImage(loadedImage, offsetX, offsetY, width, height);
                } 
                else if (effect === 'blink') {
                    ctx.globalAlpha = (i % 2 === 0) ? 1.0 : 0.0;
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                } 
                else if (effect === 'scatter') {
                    for (let j = 0; j < 5; j++) {
                        const size = width * (0.3 + Math.random() * 0.4);
                        const x = Math.random() * (width - size);
                        const y = Math.random() * (height - size);
                        ctx.drawImage(loadedImage, x, y, size, size);
                    }
                }
                else if (effect.startsWith('zoom')) {
                    let scale = 1.0;
                    if (effect.includes('In')) scale = 1.0 + progress * 0.5;
                    else scale = effect.includes('White') || effect.includes('Black') ? Math.max(0, 1.0 - progress) : 1.0 - progress * 0.5;
                    
                    const dw = width * scale; const dh = height * scale;
                    const dx = (width - dw) / 2; const dy = (height - dh) / 2;
                    if (effect.includes('White') || effect.includes('Black')) ctx.globalAlpha = Math.max(0, 1.0 - progress);
                    if (dw > 0 && dh > 0) ctx.drawImage(loadedImage, dx, dy, dw, dh);
                }
                else if (effect.startsWith('rotate')) {
                    let angle = progress * (2 * Math.PI);
                    if (effect === 'rotateLeft') angle = -angle; 
                    ctx.translate(width / 2, height / 2);
                    ctx.rotate(angle);                    
                    ctx.translate(-width / 2, -height / 2);
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect.startsWith('move')) {
                    let dx = 0; let dy = 0;
                    if (effect.includes('Down')) dy = (progress - 1.0) * height;
                    else if (effect.includes('Up')) dy = (1.0 - progress) * height;
                    if (effect.includes('Left')) dx = (1.0 - progress) * width;
                    else if (effect.includes('Right')) dx = (progress - 1.0) * width;
                    ctx.drawImage(loadedImage, dx, dy, width, height);
                }
                else if (effect === 'rainbow') {
                    ctx.filter = `hue-rotate(${progress * 360}deg)`;
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect.startsWith('fadeIn')) {
                    ctx.globalAlpha = progress;
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect.startsWith('fadeOut')) {
                    ctx.globalAlpha = 1.0 - progress;
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect === 'blur') {
                    ctx.filter = `blur(${progress * 15}px)`;
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect === 'mosaic') {
                    const ratio = Math.max(0.01, 1.0 - progress * 0.95); 
                    const tWidth = Math.max(1, width * ratio);
                    const tHeight = Math.max(1, height * ratio);
                    
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = tWidth; tempCanvas.height = tHeight;
                    tempCanvas.getContext('2d').drawImage(loadedImage, 0, 0, tWidth, tHeight);
                    
                    ctx.imageSmoothingEnabled = false;
                    ctx.drawImage(tempCanvas, 0, 0, width, height);
                    ctx.imageSmoothingEnabled = true;
                }
                else if (effect === 'slime') {
                    const scaleX = 1.0 + Math.sin(progress * Math.PI * 4) * 0.15;
                    const scaleY = 1.0 - Math.sin(progress * Math.PI * 4) * 0.15;
                    ctx.translate(width / 2, height / 2);
                    ctx.scale(scaleX, scaleY);
                    ctx.translate(-width / 2, -height / 2);
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect === 'wave') {
                    const ratioY = loadedImage.height / height;
                    for (let y = 0; y < height; y += 4) {
                        const offsetX = Math.sin((y * 0.05) + (progress * Math.PI * 4)) * (width * 0.05);
                        ctx.drawImage(loadedImage, 0, y * ratioY, loadedImage.width, 4 * ratioY, offsetX, y, width, 4);
                    }
                }
                else if (effect === 'heartbeat') {
                    let scale = 1.0;
                    if (i === 2 || i === 5) scale = 1.15;
                    ctx.translate(width / 2, height / 2);
                    ctx.scale(scale, scale);
                    ctx.translate(-width / 2, -height / 2);
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect === 'bounce') {
                    const bounceY = -Math.abs(Math.sin(progress * Math.PI * 2)) * (height * 0.2);
                    ctx.translate(0, bounceY);
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect === 'pendulum') {
                    ctx.translate(width / 2, 0);
                    ctx.rotate(Math.sin(progress * Math.PI * 2) * 0.2);
                    ctx.translate(-width / 2, 0);
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect === 'tornado') {
                    ctx.translate(width / 2, height / 2);
                    ctx.rotate(progress * Math.PI * 4);
                    ctx.scale(progress, progress);
                    ctx.translate(-width / 2, -height / 2);
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                }
                else if (effect === 'glitch') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    if (Math.random() > 0.3) {
                        ctx.globalAlpha = 0.5;
                        ctx.drawImage(loadedImage, (Math.random() - 0.5) * 20, 0, width, height);
                        ctx.globalAlpha = 1.0;
                        for (let k = 0; k < 4; k++) {
                            const sliceY = Math.random() * height;
                            const sliceH = Math.random() * (height * 0.15);
                            const sliceX = (Math.random() - 0.5) * (width * 0.15);
                            ctx.drawImage(canvas, paddingX, paddingY + sliceY, width, sliceH, sliceX, sliceY, width, sliceH);
                        }
                    }
                }
                // --- 💥 破壊・ダメージ系 ---
                else if (effect === 'shatter' || effect === 'rubble') {
                    pieces.forEach(p => {
                        if (i > 2) {
                            if (p.type === 'rect') { p.dx += p.vx; p.dy += p.vy; }
                            else { p.x += p.vx; p.y += p.vy; }
                            if (effect === 'rubble') p.vy += 3; 
                            p.rot += p.vrot;
                        }
                        ctx.save();
                        if (p.type === 'rect') {
                            ctx.translate(p.dx + p.w/2, p.dy + p.h/2);
                            ctx.rotate(p.rot);
                            ctx.drawImage(loadedImage, p.sx * (loadedImage.width/width), p.sy * (loadedImage.height/height), p.w * (loadedImage.width/width), p.h * (loadedImage.height/height), -p.w/2, -p.h/2, p.w, p.h);
                        } else {
                            ctx.translate(p.x, p.y);
                            ctx.rotate(p.rot);
                            ctx.translate(-p.cx, -p.cy);
                            ctx.beginPath();
                            ctx.moveTo(p.pts[0].x, p.pts[0].y);
                            for(let pt=1; pt<p.pts.length; pt++) ctx.lineTo(p.pts[pt].x, p.pts[pt].y);
                            ctx.closePath();
                            ctx.clip();
                            ctx.drawImage(loadedImage, 0, 0, width, height);
                        }
                        ctx.restore();
                    });
                }
                else if (effect === 'glassCrack') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.save();
                    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const cx = width / 2;
                    const cy = height / 2;
                    for (let a = 0; a < 6; a++) {
                        let angle = (a / 6) * Math.PI * 2 + 0.5;
                        let dist = 0;
                        ctx.moveTo(cx, cy);
                        for (let s = 0; s < progress * 10; s++) {
                            dist += 20 + Math.sin(a*s)*10;
                            angle += (Math.sin(a+s)-0.5)*0.5;
                            ctx.lineTo(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist);
                        }
                    }
                    ctx.stroke();
                    ctx.restore();
                }
                else if (effect === 'glassShatter') {
                    if (progress < 0.2) {
                        ctx.drawImage(loadedImage, 0, 0, width, height);
                        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        const cx = width / 2, cy = height / 2;
                        for (let a = 0; a < 8; a++) {
                            let angle = (a / 8) * Math.PI * 2 + 0.5;
                            let dist = 0;
                            ctx.moveTo(cx, cy);
                            for (let s = 0; s < progress * 20; s++) {
                                dist += 30; angle += (Math.sin(a+s)-0.5)*0.5;
                                ctx.lineTo(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist);
                            }
                        }
                        ctx.stroke();
                    } else {
                        pieces.forEach(p => {
                            p.x += p.vx; p.y += p.vy; p.vy += 1; p.rot += p.vrot;
                            ctx.save();
                            ctx.translate(p.x, p.y);
                            ctx.rotate(p.rot);
                            ctx.translate(-p.cx, -p.cy);
                            ctx.beginPath();
                            ctx.moveTo(p.pts[0].x, p.pts[0].y);
                            for(let pt=1; pt<p.pts.length; pt++) ctx.lineTo(p.pts[pt].x, p.pts[pt].y);
                            ctx.closePath();
                            ctx.clip();
                            ctx.drawImage(loadedImage, 0, 0, width, height);
                            ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.stroke();
                            ctx.restore();
                        });
                    }
                }
                else if (effect === 'bullet') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
                    bullets.forEach(b => {
                        if (i >= b.frame) {
                            // Flash
                            if (i === b.frame) {
                                ctx.save();
                                ctx.globalCompositeOperation = 'screen';
                                const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 80);
                                g.addColorStop(0, 'rgba(255,255,200,1)'); g.addColorStop(0.5, 'rgba(255,150,0,0.8)'); g.addColorStop(1, 'rgba(0,0,0,0)');
                                ctx.fillStyle = g;
                                ctx.beginPath(); ctx.arc(b.x, b.y, 80, 0, Math.PI*2); ctx.fill();
                                ctx.restore();
                            }
                            // Hole
                            ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0, Math.PI*2); ctx.fill();
                            // Deep Cracks
                            ctx.lineWidth = 2.5;
                            for(let a=0; a<8; a++){
                                ctx.beginPath(); ctx.moveTo(b.x, b.y);
                                let angle = a*0.8 + Math.random()*0.4;
                                let len = 40 + Math.random()*40;
                                ctx.lineTo(b.x + Math.cos(angle)*len, b.y + Math.sin(angle)*len);
                                ctx.stroke();
                            }
                            // Fragments
                            const fragT = i - b.frame;
                            if (fragT < 5) {
                                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                                for(let f=0; f<5; f++){
                                    let fx = b.x + Math.cos(f)*20*fragT;
                                    let fy = b.y + Math.sin(f)*20*fragT + fragT*fragT*2;
                                    ctx.fillRect(fx, fy, 4, 4);
                                }
                            }
                        }
                    });
                }
                else if (effect === 'burn') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.save();
                    const burnY = height - (progress * height * 1.5);
                    const gradient = ctx.createLinearGradient(0, burnY, 0, height);
                    gradient.addColorStop(0, 'rgba(0,0,0,0)');
                    gradient.addColorStop(0.1, 'rgba(255,200,50,0.8)'); // 炎の先端
                    gradient.addColorStop(0.3, 'rgba(255,50,0,0.9)'); // メラメラ
                    gradient.addColorStop(0.5, 'rgba(30,30,30,1)'); // 焦げ
                    gradient.addColorStop(1, 'rgba(0,0,0,1)');
                    ctx.fillStyle = gradient;
                    
                    ctx.beginPath();
                    ctx.moveTo(0, height);
                    for(let x=0; x<=width; x+=10) {
                        let y = burnY + Math.sin(x*0.05 + i*0.5)*15 + Math.sin(x*0.1 - i*0.3)*10;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(width, height);
                    ctx.fill();

                    // 火の粉
                    ctx.fillStyle = 'rgba(255,150,0,0.7)';
                    for(let f=0; f<30; f++) {
                        const fx = Math.sin(f*5 + i)*15 + (f/30)*width;
                        const fy = burnY + Math.sin(f+i)*20 + Math.random()*50;
                        ctx.beginPath();
                        ctx.arc(fx, fy, 4 + Math.random()*8, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
                // --- 🎞️ トランジション系 ---
                else if (effect === 'curtain') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#111';
                    ctx.fillRect(0, 0, width * progress, height);
                }
                else if (effect === 'shutterIn') {
                    // シャッターが開いて画像が現れる
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#222';
                    const h2 = height / 2;
                    ctx.fillRect(0, 0, width, h2 * (1 - progress));
                    ctx.fillRect(0, height - h2 * (1 - progress), width, h2 * (1 - progress));
                }
                else if (effect === 'shutterOut') {
                    // シャッターが閉じて画像が隠れる
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#222';
                    const h2 = height / 2;
                    ctx.fillRect(0, 0, width, h2 * progress);
                    ctx.fillRect(0, height - h2 * progress, width, h2 * progress);
                }
                else if (effect === 'blindIn') {
                    // ブラインドが開いて画像が現れる
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#111';
                    const count = 8;
                    const bw = width / count;
                    for (let j = 0; j < count; j++) {
                        ctx.fillRect(j * bw, 0, bw * (1 - progress), height);
                    }
                }
                else if (effect === 'blindOut') {
                    // ブラインドが閉じて画像が隠れる
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#111';
                    const count = 8;
                    const bw = width / count;
                    for (let j = 0; j < count; j++) {
                        ctx.fillRect(j * bw, 0, bw * progress, height);
                    }
                }
                else if (effect === 'hBlindIn') {
                    // 横ブラインドが開いて画像が現れる
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#111';
                    const count = 8;
                    const bh = height / count;
                    for (let j = 0; j < count; j++) {
                        ctx.fillRect(0, j * bh, width, bh * (1 - progress));
                    }
                }
                else if (effect === 'hBlindOut') {
                    // 横ブラインドが閉じて画像が隠れる
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#111';
                    const count = 8;
                    const bh = height / count;
                    for (let j = 0; j < count; j++) {
                        ctx.fillRect(0, j * bh, width, bh * progress);
                    }
                }
                else if (effect === 'blinkIn') {
                    // まぶたが開いて画像が現れる
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.rect(0, 0, width, height);
                    ctx.ellipse(width/2, height/2, width*0.8, height*0.6 * progress, 0, 0, Math.PI*2);
                    ctx.fill('evenodd');
                }
                else if (effect === 'blinkOut') {
                    // まぶたが閉じて画像が隠れる
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.rect(0, 0, width, height);
                    ctx.ellipse(width/2, height/2, width*0.8, height*0.6 * (1 - progress), 0, 0, Math.PI*2);
                    ctx.fill('evenodd');
                }
                // --- 🌸 自然・パーティクル系 ---
                else if (effect === 'rain' || effect === 'heavyRain') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = effect === 'heavyRain' ? 2 : 1.5;
                    particles.forEach(p => {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x - p.len*0.4, p.y + p.len);
                        ctx.stroke();
                        p.x -= p.speed * 0.4;
                        p.y += p.speed;
                        if (p.y > canvasHeight) { p.y = -p.len; p.x = Math.random() * canvasWidth; }
                    });
                }
                else if (effect === 'snow') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    particles.forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                        ctx.fill();
                        p.x += p.speedX + Math.sin(p.angle)*0.5;
                        p.y += p.speedY;
                        p.angle += 0.1;
                        if (p.y > canvasHeight) { p.y = -p.size; p.x = Math.random() * canvasWidth; }
                    });
                }
                else if (effect === 'leaves' || effect === 'cherryBlossoms') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = effect === 'leaves' ? 'rgba(210, 100, 30, 0.85)' : 'rgba(255, 180, 200, 0.85)';
                    particles.forEach(p => {
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.beginPath();
                        if (effect === 'leaves') {
                            ctx.ellipse(0, 0, p.size, p.size*0.5, 0, 0, Math.PI*2);
                        } else {
                            ctx.moveTo(0, p.size*0.5);
                            ctx.bezierCurveTo(p.size*0.5, p.size*0.5, p.size*0.4, 0, 0, 0);
                            ctx.bezierCurveTo(-p.size*0.4, 0, -p.size*0.5, p.size*0.5, 0, p.size*0.5);
                        }
                        ctx.fill();
                        ctx.restore();
                        p.x += p.speedX + Math.sin(p.rot)*1.5;
                        p.y += p.speedY;
                        p.rot += p.rotSpeed;
                        if (p.y > canvasHeight) { p.y = -p.size; p.x = Math.random() * canvasWidth; }
                    });
                }
                else if (['sparkles', 'sparklesYellow', 'sparklesPastel', 'stars', 'hearts'].includes(effect)) {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    particles.forEach(p => {
                        let size = p.baseSize * (0.5 + Math.sin(p.phase + i * p.speed) * 0.5);
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        if (effect.startsWith('sparkles')) {
                            ctx.fillStyle = p.color;
                            ctx.beginPath();
                            ctx.moveTo(0, -size);
                            ctx.quadraticCurveTo(0, 0, size*0.3, 0);
                            ctx.quadraticCurveTo(0, 0, 0, size);
                            ctx.quadraticCurveTo(0, 0, -size*0.3, 0);
                            ctx.quadraticCurveTo(0, 0, 0, -size);
                            ctx.fill();
                        } else if (effect === 'stars') {
                            ctx.fillStyle = '#FFD700';
                            ctx.beginPath();
                            for(let j=0; j<5; j++){
                                ctx.lineTo(Math.cos((18+j*72)/180*Math.PI)*size, -Math.sin((18+j*72)/180*Math.PI)*size);
                                ctx.lineTo(Math.cos((54+j*72)/180*Math.PI)*size*0.4, -Math.sin((54+j*72)/180*Math.PI)*size*0.4);
                            }
                            ctx.closePath();
                            ctx.fill();
                        } else if (effect === 'hearts') {
                            ctx.fillStyle = '#FF69B4';
                            ctx.beginPath();
                            ctx.moveTo(0, size*0.25);
                            ctx.bezierCurveTo(size*0.5, -size*0.5, size, size*0.3, 0, size);
                            ctx.bezierCurveTo(-size, size*0.3, -size*0.5, -size*0.5, 0, size*0.25);
                            ctx.fill();
                        }
                        ctx.restore();
                    });
                }
                else if (effect === 'centerGlow') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.save();
                    ctx.globalCompositeOperation = 'screen';
                    const rad = progress * width * 1.5;
                    if(rad > 0) {
                        const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, rad);
                        grad.addColorStop(0, 'rgba(255, 255, 200, 1)');
                        grad.addColorStop(0.5, 'rgba(255, 200, 50, 0.8)');
                        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                        ctx.fillStyle = grad;
                        ctx.globalAlpha = 1.0 - progress;
                        ctx.fillRect(0, 0, width, height);
                    }
                    ctx.restore();
                }
                // --- 💧 液体・特殊系 ---
                else if (effect === 'liquidSplash' || effect === 'redPaint') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = effect === 'redPaint' ? '#E11' : '#1BF';
                    ctx.globalAlpha = progress < 0.7 ? 1.0 : 1.0 - (progress - 0.7) * 3;
                    const splashP = Math.min(progress * 3, 1.0); 
                    splashes.forEach((s, idx) => {
                        if (progress > idx * 0.1) {
                            ctx.save();
                            ctx.translate(s.x, s.y);
                            ctx.scale(splashP, splashP);
                            ctx.beginPath();
                            const pts = 8;
                            for(let a=0; a<=pts; a++){
                                let angle = (a/pts)*Math.PI*2;
                                let r = s.size * (0.5 + Math.sin(a * 3 + idx)*0.5 + Math.random()*0.2);
                                let px = Math.cos(angle)*r;
                                let py = Math.sin(angle)*r;
                                if(a===0) ctx.moveTo(px, py);
                                else {
                                    let prevA = ((a-1)/pts)*Math.PI*2;
                                    let cpX = Math.cos(prevA + Math.PI/pts) * s.size * 1.5;
                                    let cpY = Math.sin(prevA + Math.PI/pts) * s.size * 1.5;
                                    ctx.quadraticCurveTo(cpX, cpY, px, py);
                                }
                            }
                            ctx.fill();
                            // 細かい飛沫
                            for(let a=0; a<8; a++){
                                const d = s.size * (1.2 + Math.random());
                                ctx.beginPath();
                                ctx.arc(Math.cos(a)*d, Math.sin(a)*d, s.size*0.1 + Math.random()*s.size*0.1, 0, Math.PI*2);
                                ctx.fill();
                            }
                            ctx.restore();
                        }
                    });
                }
                else if (effect === 'drip') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.fillStyle = 'rgba(20, 180, 255, 0.85)';
                    drips.forEach(d => {
                        const len = d.targetLen * progress;
                        ctx.fillRect(d.x, d.y, d.width, len);
                        ctx.beginPath();
                        ctx.arc(d.x + d.width/2, d.y + len, d.width/2, 0, Math.PI*2);
                        ctx.fill();
                    });
                }
                else if (effect === 'waterRipple') {
                    ctx.drawImage(loadedImage, 0, 0, width, height);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.lineWidth = 4;
                    const maxRad = width * 0.8;
                    for(let r=0; r<3; r++) {
                        let rp = (progress + r*0.33) % 1.0;
                        ctx.globalAlpha = 1.0 - rp;
                        ctx.beginPath();
                        ctx.arc(width/2, height/2, maxRad * rp, 0, Math.PI*2);
                        ctx.stroke();
                    }
                }

                if (format === 'apng') {
                    const imageData = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
                    framesAPNG.push(imageData.data.buffer);
                    delays.push(150);
                } else {
                    framesGIF.push(canvas.toDataURL('image/png'));
                }
            }

            const singleLoopEffects = ['curtain', 'shutterIn', 'shutterOut', 'blindIn', 'blindOut', 'hBlindIn', 'hBlindOut', 'blinkIn', 'blinkOut', 'hearts', 'stars'];
            const forceOnce = (loopSetting === 'once' || singleLoopEffects.includes(effect));
            const numLoopsAPNG = forceOnce ? 1 : 0;
            const numLoopsGIF = forceOnce ? 1 : 0;

            if (format === 'apng') {
                const apngArrayBuffer = UPNG.encode(framesAPNG, canvasWidth, canvasHeight, 0, delays, numLoopsAPNG);
                setApngLoopCount(apngArrayBuffer, numLoopsAPNG);

                const blob = new Blob([apngArrayBuffer], { type: 'image/png' });
                const url = URL.createObjectURL(blob);
                finishGeneration(url, 'animated.png');
            } else {
                gifshot.createGIF({
                    images: framesGIF,
                    interval: 0.15,
                    gifWidth: canvasWidth,
                    gifHeight: canvasHeight,
                    numWorkers: 2, 
                    loop: 0 
                }, function(obj) {
                    if (!obj.error) {
                        const gifBytes = base64ToUint8Array(obj.image);
                        setGifLoopCount(gifBytes, numLoopsGIF);

                        const blob = new Blob([gifBytes], { type: 'image/gif' });
                        const url = URL.createObjectURL(blob);
                        finishGeneration(url, 'animated.gif');
                    } else {
                        alert('GIFの作成に失敗しました。別の画像で試してみてください。');
                        resetButton();
                    }
                });
            }
        }

        function finishGeneration(url, filename) {
            if (previewImg.src && previewImg.src.startsWith('blob:')) {
                URL.revokeObjectURL(previewImg.src);
            }

            const newImg = document.createElement('img');
            newImg.id = 'previewImg';
            newImg.alt = 'プレビュー';
            newImg.className = 'max-w-full max-h-[320px] rounded-lg shadow-md';
            newImg.src = url;

            const parent = previewImg.parentNode;
            parent.replaceChild(newImg, previewImg);
            previewImg = newImg;

            downloadLink.href = url;
            downloadLink.download = filename;
            resetButton();
            placeholderArea.classList.add('hidden'); 
            resultArea.classList.remove('hidden');    
        }

        replayBtn.addEventListener('click', function() {
            if (!previewImg || !previewImg.src) return;
            const currentSrc = previewImg.src;
            previewImg.src = "";
            setTimeout(() => {
                previewImg.src = currentSrc;
            }, 50);
        });

        function resetButton() {
            loadingMsg.classList.add('hidden');
            generateBtn.disabled = false;
            generateBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            spinner.classList.add('hidden');
            btnText.textContent = "魔法をかける！";
        }
    </script>
</body>

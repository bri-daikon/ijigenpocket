<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日のお題 - インスピレーション・ジェネレーター</title>
    
    <!-- Google Fonts: エレガントな明朝体を使用 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <main class="container">
        <header>
            <p class="subtitle">Creative Inspiration</p>
            <h1>今日のお題</h1>
        </header>

        <section class="card glass">
            <div id="theme-display" class="theme-text">
                <!-- ここにお題が表示されます -->
                <span class="placeholder">準備中...</span>
            </div>
            
            <button id="generate-btn" class="generate-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                新しいお題を引く
            </button>
        </section>
        <div class="flex flex-wrap justify-center gap-4">
            <button onclick="shareOnX()" class="bg-slate-900 text-white px-6 py-3 rounded-full font-bold hover:bg-slate-800 transition-all flex items-center gap-2 shadow-lg">
                <svg class="h-4 w-4 fill-current" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                結果をポストする
            </button>
            <button onclick="copyToClipboard()" class="bg-white text-blue-600 border border-blue-200 px-6 py-3 rounded-full font-bold hover:bg-blue-50 transition-all shadow-md">
                お題をコピー
            </button>
        </div>

        <footer>
            <p class="instructions">イラストや文章のアイデアにご活用ください。</p>
            <p id="data-status" class="data-status"></p>
       		 &copy; 2026 異次元ポケット工房 | <a href="https://ijigenpocket.booth.pm/" class="hover:underline">BOOTH Shop</a>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>

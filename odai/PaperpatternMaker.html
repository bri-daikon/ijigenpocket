<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壁紙パターンメーカー</title>
    <!-- Tailwind CSSを使って、見た目をきれいに整えます -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* キャンバスに枠線をつけて見やすくします */
        #canvasContainer {
            border: 2px dashed #a0aec0;
            background-color: white;
            cursor: crosshair;
            width: 300px;
            height: 300px;
            box-sizing: content-box; /* 追加：キャンバスが枠線を覆い隠さないように調整 */
        }
        #baseCanvas {
            touch-action: none; /* スマホで描画中に画面がスクロールするのを防ぎます */
        }
        #patternCanvas {
            border: 2px solid #e2e8f0;
            background-color: white;
            width: 100%; /* 画面上では大きすぎるため、枠に収まるように縮小表示します */
            max-width: 500px;
            height: auto;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 font-sans text-gray-800">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">🎨 壁紙パターンメーカー</h1>

        <div class="flex flex-col md:flex-row gap-8">
            
            <!-- 左側：お絵かき・編集エリア -->
            <div class="flex-1 bg-white p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">1. 元のデザインを作る (300×300)</h2>
                
                <!-- ツールボックス（各種ツール選択） -->
                <div class="mb-4 bg-gray-100 p-3 rounded-lg">
                    <label class="block text-sm font-bold text-gray-700 mb-2">ツール選択:</label>
                    <div class="flex flex-wrap gap-2 mb-3">
                        <button class="tool-btn bg-indigo-600 text-white px-3 py-1 rounded text-sm transition" data-mode="pen">🖊️ ペン</button>
                        <button class="tool-btn bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 px-3 py-1 rounded text-sm transition" data-mode="eraser">🧽 消しゴム</button>
                        <button class="tool-btn bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 px-3 py-1 rounded text-sm transition" data-mode="fill">🪣 塗りつぶし</button>
                        <button class="tool-btn bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 px-3 py-1 rounded text-sm transition" data-mode="rect">⬜ 四角(線)</button>
                        <button class="tool-btn bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 px-3 py-1 rounded text-sm transition" data-mode="circle">◯ 丸(線)</button>
                        <button class="tool-btn bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 px-3 py-1 rounded text-sm transition" data-mode="triangle">△ 三角(線)</button>
                    </div>

                    <div class="flex flex-wrap gap-4 items-center">
                        <div>
                            <label class="text-sm font-bold text-gray-700">ペンの色:</label>
                            <input type="color" id="colorPicker" value="#000000" class="cursor-pointer">
                        </div>
                        <div>
                            <label class="text-sm font-bold text-gray-700">ペンの太さ:</label>
                            <input type="range" id="brushSize" min="1" max="50" value="5" class="cursor-pointer">
                        </div>
                        <div class="ml-2 border-l pl-4">
                            <label class="text-sm font-bold text-gray-700" title="数値を大きくすると、少し違う色も一緒に塗りつぶします（隙間対策）">塗り許容値(隙間調整):</label>
                            <input type="range" id="fillTolerance" min="0" max="255" value="30" class="cursor-pointer w-24">
                        </div>
                        <div class="ml-2 border-l pl-4">
                            <label class="text-sm font-bold text-gray-700">対称定規:</label>
                            <select id="symmetrySelect" class="border border-gray-300 p-1 rounded text-sm cursor-pointer ml-1">
                                <option value="none">なし</option>
                                <option value="horizontal">左右対称</option>
                                <option value="vertical">上下対称</option>
                                <option value="quad">四方(上下左右)</option>
                            </select>
                        </div>
                        <button id="clearBtn" class="ml-auto bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition">消去(クリア)</button>
                    </div>
                </div>

                <!-- 画像アップロード -->
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">画像をアップロードする:</label>
                    <input type="file" id="imageUpload" accept="image/*" class="text-sm">
                </div>

                <!-- 300x300のキャンバス -->
                <div class="flex justify-center mb-4">
                    <div class="relative" id="canvasContainer">
                        <canvas id="baseCanvas" width="300" height="300" class="absolute inset-0"></canvas>
                        <!-- 対称定規のガイド線 -->
                        <div id="guideH" class="absolute inset-0 pointer-events-none hidden" style="border-right: 1px dashed #ef4444; width: 50%; height: 100%;"></div>
                        <div id="guideV" class="absolute inset-0 pointer-events-none hidden" style="border-bottom: 1px dashed #ef4444; width: 100%; height: 50%;"></div>
                    </div>
                </div>

                <div class="text-center">
                    <button id="generateBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-full shadow-lg transition transform hover:scale-105">
                        ✨ パターンを展開する ✨
                    </button>
                </div>
            </div>

            <!-- 右側：プレビュー・保存エリア -->
            <div class="flex-1 bg-white p-6 rounded-xl shadow-md flex flex-col items-center">
                <h2 class="text-xl font-bold mb-4 border-b pb-2 w-full text-left">2. パターンプレビュー</h2>
                
                <!-- サイズ変更UI -->
                <div class="w-full mb-4 bg-gray-50 p-3 rounded border">
                    <label class="block text-sm font-bold text-gray-700 mb-2">完成サイズを変更 (ピクセル):</label>
                    <div class="flex gap-4 items-center">
                        <div>
                            <span class="text-sm text-gray-600">幅:</span>
                            <input type="number" id="outWidth" value="2100" class="w-24 p-1 border rounded text-right">
                        </div>
                        <span class="text-gray-400">×</span>
                        <div>
                            <span class="text-sm text-gray-600">高さ:</span>
                            <input type="number" id="outHeight" value="2100" class="w-24 p-1 border rounded text-right">
                        </div>
                    </div>
                </div>
                
                <p class="text-sm text-gray-500 mb-4">※画面上は縮小されて表示されていますが、指定したサイズで保存されます。</p>
                
                <!-- パターン表示用のキャンバス（初期サイズ2100x2100） -->
                <canvas id="patternCanvas" width="2100" height="2100" class="mb-6 shadow-inner"></canvas>

                <button id="saveBtn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded shadow transition">
                    💾 画像を保存する
                </button>
            </div>

        </div>
    </div>

    <!-- JavaScript：動作のプログラム -->
    <script>
        // --- HTMLの要素を取得 ---
        const baseCanvas = document.getElementById('baseCanvas');
        const ctxBase = baseCanvas.getContext('2d');
        const patternCanvas = document.getElementById('patternCanvas');
        const ctxPattern = patternCanvas.getContext('2d');
        
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const fillTolerance = document.getElementById('fillTolerance');
        const clearBtn = document.getElementById('clearBtn');
        const imageUpload = document.getElementById('imageUpload');
        const generateBtn = document.getElementById('generateBtn');
        const saveBtn = document.getElementById('saveBtn');
        const toolBtns = document.querySelectorAll('.tool-btn');
        const outWidthInput = document.getElementById('outWidth');
        const outHeightInput = document.getElementById('outHeight');
        const symmetrySelect = document.getElementById('symmetrySelect');
        const guideH = document.getElementById('guideH');
        const guideV = document.getElementById('guideV');

        // --- 状態管理変数 ---
        let isDrawing = false;
        let currentMode = 'pen'; // pen, eraser, fill, rect, circle, triangle
        let startX, startY;      // 図形描画時の始点
        let lastX, lastY;        // ペン描画時の直前の座標
        let snapshot;            // 図形描画中のプレビュー用スナップショット
        let symmetryMode = 'none'; // none, horizontal, vertical, quad

        // --- 初期設定 ---
        function initializeCanvas(ctx, width, height) {
            ctx.fillStyle = "#ffffff"; // 背景を白で塗りつぶす
            ctx.fillRect(0, 0, width, height);
        }
        initializeCanvas(ctxBase, baseCanvas.width, baseCanvas.height);
        initializeCanvas(ctxPattern, patternCanvas.width, patternCanvas.height);

        // --- ツール切り替え処理 ---
        toolBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // すべてのボタンの見た目をリセット
                toolBtns.forEach(b => {
                    b.classList.remove('bg-indigo-600', 'text-white');
                    b.classList.add('bg-white', 'text-gray-700');
                });
                // クリックされたボタンを強調表示
                btn.classList.remove('bg-white', 'text-gray-700');
                btn.classList.add('bg-indigo-600', 'text-white');
                // モードを更新
                currentMode = btn.dataset.mode;
            });
        });

        // 対称定規切り替え処理
        symmetrySelect.addEventListener('change', (e) => {
            symmetryMode = e.target.value;
            guideH.classList.add('hidden');
            guideV.classList.add('hidden');
            
            if (symmetryMode === 'horizontal' || symmetryMode === 'quad') {
                guideH.classList.remove('hidden');
            }
            if (symmetryMode === 'vertical' || symmetryMode === 'quad') {
                guideV.classList.remove('hidden');
            }
        });

        // 座標取得用関数（マウスとタッチ対応）
        function getCoords(e) {
            const rect = baseCanvas.getBoundingClientRect();
            let x, y;
            if (e.type.includes('touch')) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }
            return { x, y };
        }

        // --- お絵かきの処理 ---
        function startDrawing(e) {
            const coords = getCoords(e);
            startX = coords.x;
            startY = coords.y;
            lastX = coords.x;
            lastY = coords.y;

            // 塗りつぶしツールの場合は、クリックした時点で塗りつぶして終了
            if (currentMode === 'fill') {
                const W = baseCanvas.width;
                const H = baseCanvas.height;
                
                floodFill(startX, startY, colorPicker.value);
                
                // 対称塗りつぶし
                if (symmetryMode === 'horizontal' || symmetryMode === 'quad') {
                    floodFill(W - startX, startY, colorPicker.value);
                }
                if (symmetryMode === 'vertical' || symmetryMode === 'quad') {
                    floodFill(startX, H - startY, colorPicker.value);
                }
                if (symmetryMode === 'quad') {
                    floodFill(W - startX, H - startY, colorPicker.value);
                }
                return;
            }

            isDrawing = true;
            
            // 図形を描くモードの場合は、現在のキャンバスの状態をスナップショットとして保存
            if (['rect', 'circle', 'triangle'].includes(currentMode)) {
                snapshot = ctxBase.getImageData(0, 0, baseCanvas.width, baseCanvas.height);
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // タッチ操作時のスクロール防止

            const coords = getCoords(e);
            
            // 消しゴムは「白色」のペンとして扱う
            const color = currentMode === 'eraser' ? '#ffffff' : colorPicker.value;

            ctxBase.lineWidth = brushSize.value;
            ctxBase.lineCap = 'round';
            ctxBase.lineJoin = 'round';
            ctxBase.strokeStyle = color;

            const W = baseCanvas.width;
            const H = baseCanvas.height;

            if (currentMode === 'pen' || currentMode === 'eraser') {
                // 自由線の描画 (対象定規対応のため、少しずつ線を引いていく)
                function drawLine(x1, y1, x2, y2) {
                    ctxBase.beginPath();
                    ctxBase.moveTo(x1, y1);
                    ctxBase.lineTo(x2, y2);
                    ctxBase.stroke();
                }

                drawLine(lastX, lastY, coords.x, coords.y);

                if (symmetryMode === 'horizontal' || symmetryMode === 'quad') {
                    drawLine(W - lastX, lastY, W - coords.x, coords.y);
                }
                if (symmetryMode === 'vertical' || symmetryMode === 'quad') {
                    drawLine(lastX, H - lastY, coords.x, H - coords.y);
                }
                if (symmetryMode === 'quad') {
                    drawLine(W - lastX, H - lastY, W - coords.x, H - coords.y);
                }

                lastX = coords.x;
                lastY = coords.y;
                
            } else if (['rect', 'circle', 'triangle'].includes(currentMode)) {
                // 図形のプレビュー描画：スナップショットを元に戻してから新しい図形を描く
                ctxBase.putImageData(snapshot, 0, 0);

                function drawShape(sx, sy, cx, cy) {
                    ctxBase.beginPath();
                    if (currentMode === 'rect') {
                        // 四角
                        ctxBase.strokeRect(sx, sy, cx - sx, cy - sy);
                    } else if (currentMode === 'circle') {
                        // 丸（円）
                        const radius = Math.sqrt(Math.pow(cx - sx, 2) + Math.pow(cy - sy, 2));
                        ctxBase.arc(sx, sy, radius, 0, 2 * Math.PI);
                        ctxBase.stroke();
                    } else if (currentMode === 'triangle') {
                        // 三角（二等辺三角形）
                        ctxBase.moveTo(sx + (cx - sx) / 2, sy); // 頂点
                        ctxBase.lineTo(cx, cy); // 右下
                        ctxBase.lineTo(sx, cy); // 左下
                        ctxBase.closePath();
                        ctxBase.stroke();
                    }
                }

                // メインの図形
                drawShape(startX, startY, coords.x, coords.y);

                // 対称の図形
                if (symmetryMode === 'horizontal' || symmetryMode === 'quad') {
                    drawShape(W - startX, startY, W - coords.x, coords.y);
                }
                if (symmetryMode === 'vertical' || symmetryMode === 'quad') {
                    drawShape(startX, H - startY, coords.x, H - coords.y);
                }
                if (symmetryMode === 'quad') {
                    drawShape(W - startX, H - startY, W - coords.x, H - coords.y);
                }
            }
        }

        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            ctxBase.beginPath(); // 次の線と繋がらないようにリセット
        }

        // イベントリスナーの登録
        baseCanvas.addEventListener('mousedown', startDrawing);
        baseCanvas.addEventListener('mousemove', draw);
        baseCanvas.addEventListener('mouseup', stopDrawing);
        baseCanvas.addEventListener('mouseout', stopDrawing);

        baseCanvas.addEventListener('touchstart', startDrawing, {passive: false});
        baseCanvas.addEventListener('touchmove', draw, {passive: false});
        baseCanvas.addEventListener('touchend', stopDrawing);

        // --- 塗りつぶし（Flood Fill）のプログラム ---
        function floodFill(x, y, fillColorHex) {
            x = Math.floor(x);
            y = Math.floor(y);
            const imageData = ctxBase.getImageData(0, 0, baseCanvas.width, baseCanvas.height);
            const data = imageData.data;
            const width = baseCanvas.width;
            const height = baseCanvas.height;
            const tolerance = parseInt(fillTolerance.value, 10);
            
            // クリックした位置の元の色を取得
            const startPos = (y * width + x) * 4;
            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];
            const startA = data[startPos + 3];
            
            // 塗りつぶす色をRGBに変換
            const fillRgb = hexToRgb(fillColorHex);
            
            // 元の色と塗る色が同じなら何もしない
            if (startR === fillRgb.r && startG === fillRgb.g && startB === fillRgb.b && startA === 255) return;
            
            // アンチエイリアス（線の滑らかさ）を考慮した色の許容範囲チェック
            function matchStartColor(pos) {
                const r = data[pos];
                const g = data[pos + 1];
                const b = data[pos + 2];
                const a = data[pos + 3];
                // スライダーで設定した許容値を使って判定（隙間をなくすため）
                return Math.abs(r - startR) <= tolerance &&
                       Math.abs(g - startG) <= tolerance &&
                       Math.abs(b - startB) <= tolerance &&
                       Math.abs(a - startA) <= tolerance;
            }
            
            function colorPixel(pos) {
                data[pos] = fillRgb.r;
                data[pos + 1] = fillRgb.g;
                data[pos + 2] = fillRgb.b;
                data[pos + 3] = 255;
            }
            
            // 塗りつぶし処理（スタック方式）
            const stack = [[x, y]];
            
            while(stack.length) {
                const [cx, cy] = stack.pop();
                
                let upY = cy;
                while(upY >= 0 && matchStartColor((upY * width + cx) * 4)) { upY--; }
                upY++;
                
                let downY = cy;
                while(downY < height && matchStartColor((downY * width + cx) * 4)) { downY++; }
                downY--;
                
                let reachLeft = false;
                let reachRight = false;
                
                for (let i = upY; i <= downY; i++) {
                    const currentPos = (i * width + cx) * 4;
                    colorPixel(currentPos);
                    
                    if (cx > 0) {
                        if (matchStartColor(currentPos - 4)) {
                            if (!reachLeft) { stack.push([cx - 1, i]); reachLeft = true; }
                        } else if (reachLeft) { reachLeft = false; }
                    }
                    if (cx < width - 1) {
                        if (matchStartColor(currentPos + 4)) {
                            if (!reachRight) { stack.push([cx + 1, i]); reachRight = true; }
                        } else if (reachRight) { reachRight = false; }
                    }
                }
            }
            // 塗りつぶした結果をキャンバスに反映
            ctxBase.putImageData(imageData, 0, 0);
        }

        // HEXカラー(#RRGGBB)をRGBオブジェクトに変換する補助関数
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        // --- クリアボタンの処理 ---
        clearBtn.addEventListener('click', () => {
            initializeCanvas(ctxBase, baseCanvas.width, baseCanvas.height);
        });

        // --- 画像アップロードの処理 ---
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    ctxBase.drawImage(img, 0, 0, baseCanvas.width, baseCanvas.height);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // --- パターン展開の処理 ---
        generateBtn.addEventListener('click', () => {
            // 入力されたサイズを取得してキャンバスのサイズを更新
            const newWidth = parseInt(outWidthInput.value, 10);
            const newHeight = parseInt(outHeightInput.value, 10);
            patternCanvas.width = newWidth || 2100;
            patternCanvas.height = newHeight || 2100;

            // 背景を白で塗りつぶす
            ctxPattern.fillStyle = "#ffffff";
            ctxPattern.fillRect(0, 0, patternCanvas.width, patternCanvas.height);

            // 300x300のキャンバスをパターンとして作成
            const pattern = ctxPattern.createPattern(baseCanvas, 'repeat');
            
            // パターンを敷き詰める
            ctxPattern.fillStyle = pattern;
            ctxPattern.fillRect(0, 0, patternCanvas.width, patternCanvas.height);
        });

        // --- 画像保存の処理 ---
        saveBtn.addEventListener('click', () => {
            const dataURL = patternCanvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = 'wallpaper_pattern.png';
            link.href = dataURL;
            link.click();
        });

    </script>
</body>
</html>

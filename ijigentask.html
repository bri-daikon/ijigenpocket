<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現在のタスク一覧 Pro</title>
    <!-- html2canvasライブラリの読み込み（画像保存用） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/ijigentask.css">
</head>
<body>

<div class="content-wrapper">
    <div class="container" id="captureTarget">
        <h1>現在のタスク一覧</h1>

        <div class="input-group" id="inputSection">
            <div class="row">
                <input type="text" id="taskInput" placeholder="タスク名を入力...">
            </div>
            <div class="row">
                <input type="text" id="memoInput" placeholder="メモ・詳細（任意）">
            </div>
            <div class="row">
                <input type="text" id="tagInput" placeholder="タグ（カンマ区切りで複数または下から選択）">
            </div>
            <div id="tagSelection" class="tag-selection"></div>
            <div class="row">
                <select id="prioritySelect">
                    <option value="高">優先度：高</option>
                    <option value="中" selected>優先度：中</option>
                    <option value="低">優先度：低</option>
                </select>
                <input type="date" id="dateInput">
                <button onclick="addTask()">追加</button>
            </div>
        </div>

        <div class="filters" id="filterSection">
            <div class="filter-row">
                <div class="filter-item">
                    <span>月：</span>
                    <input type="month" id="monthFilter" onchange="renderTasks()">
                </div>
                <div class="filter-item">
                    <span>タグ：</span>
                    <select id="tagFilter" onchange="renderTasks()">
                        <option value="">すべて</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-item">
                    <label>
                        <input type="checkbox" id="hideCompleted" onchange="renderTasks()"> 完了済みを隠す
                    </label>
                </div>
            </div>
        </div>

        <ul id="taskList"></ul>

        <div class="data-actions" id="actionSection">
            <button class="btn-secondary" onclick="exportCSV()">CSV保存</button>
            <button class="btn-secondary" onclick="document.getElementById('csvFile').click()">CSV読込</button>
            <button class="btn-success" onclick="saveAsImage()">画像として保存</button>
            <input type="file" id="csvFile" accept=".csv" onchange="importCSV(event)">
        </div>
    </div>
</div>

<!-- カスタムモーダルUI -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-content">
        <div id="modalMsg" class="modal-msg"></div>
        <div class="modal-buttons" id="modalButtons"></div>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/ijigentask.js"></script>
</body>
</html>
